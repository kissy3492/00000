<html lang="ja">

<style>

,#3e657d,#2d5268);color:#fff;border-color:#24495e}.nav button.active .count{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.4);color:#fff}.side-section{border-top:1px solid var(--line);margin-top:12px;padding-top:12px}.side-note{font-size:12px;color:var(--muted);line-height:1.55;background:rgba(255,253,248,.72);border:1px solid var(--line);border-radius:14px;padding:10px}.view-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}.view-head h2{margin:0;font-size:20px}.view-head p{margin:4px 0 0;font-size:13px;color:var(--muted);line-height:1.45}.actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.cards{display:grid;gap:10px}.stat{background:rgba(255,253,248,.9);border:1px solid var(--line);border-radius:18px;padding:13px;box-shadow:0 8px 22px rgba(78,48,17,.08)}.stat strong{display:block;font-size:28px;line-height:1}.stat span{font-size:12px;color:var(--muted);font-weight:800}.panel{background:rgba(255,253,248,.9);border:1px solid var(--line);border-radius:18px;padding:13px;box-shadow:0 8px 22px rgba(78,48,17,.07)}.panel h3{font-size:15px;margin:0 0 8px}.panel p{margin:0;color:var(--muted);font-size:13px;line-height:1.5}.empty{border:1px dashed #d5c1a2;background:rgba(255,255,255,.48);border-radius:18px;padding:18px;text-align:center;color:var(--muted);line-height:1.55}.task-card{display:grid;gap:8px;text-align:left;border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,#fffdf9,#fff8ef);padding:11px;cursor:pointer}.task-card:hover{border-color:#d0ad7d;box-shadow:0 7px 20px rgba(78,48,17,.09)}.task-card.active{border-color:var(--brand);box-shadow:0 0 0 3px rgba(139,90,50,.16)}.task-top{display:flex;justify-content:space-between;align-items:flex-start;gap:9px;flex-wrap:wrap}.task-title{font-weight:900;font-size:14px;line-height:1.35;word-break:brea px 18px;border-top:1px solid var(--line);background:#fffaf2;display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}.toast-wrap{position:fixed;right:18px;top:72px;display:grid;gap:8px;z-index:100;pointer-events:none}.toast{pointer-events:auto;background:#2f281f;color:#fff;border-radius:14px;padding:10px 12px;box-shadow:0 10px 24px rgba(0,0,0,.22);font-size:13px;max-width:420px;line-height:1.45}.toast button{margin-left:8px}.palette-list{display:grid;gap:7px;max-height:52vh;overflow:auto}.palette-item{display:flex;justify-content:space-between;align-items:center;gap:12px;border:1px solid var(--line);border-radius:13px;background:#fffdf8;padding:10px;cursor:pointer}.palette-item:hover,.palette-item.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(62,101,125,.12)}.onboard{display:grid;gap:10px}.onboard-step{border:1px solid var(--line);border-radius:15px;background:#fffdf8;padding:12px}.onboard-step strong{display:block;margin-bottom:4px}.density-compact .task-card{padding:8px}.density-compact .next-line{-webkit-line-clamp:1}.density-compact .meta{display:none}
.toast{border-left:5px solid #b87838}.toast[data-tone=ok]{border-left-color:#7fd18c}.toast[data-tone=warn]{border-left-color:#f3c46a}.toast[data-tone=bad]{border-left-color:#f08f81}.toast button{color:var(--ink)}
.date-badge{white-space:pre-line}
input[type=range]{padding:0;border:0;background:transparent;flex:1;min-width:120px}input[type=range]:focus{box-shadow:none;border:0}
.check-line span{flex:1}
.log-line{display:grid;grid-template-columns:118px 1fr;gap:8px;border:1px solid var(--line);border-radius:12px;background:#fffdf8;padding:8px;font-size:12px;line-height:1.45}
.log-time{font-family:var(--mono);color:var(--muted);font-size:11px}

.cap-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.cap-card{border:1px solid var(--line);border-radius:15px;background:#fffdf8;padding:10px;display:grid;gap:6px}.cap-title{font-weight:900;font-size:13px}.cap-desc{font-size:12px;color:var(--muted);line-height:1.45}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--muted);margin-right:6px}.dot.ok{background:var(--ok)}.dot.warn{background:var(--warn)}.dot.bad{background:var(--danger)}.online-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;border:1px solid var(--line);border-radius:14px;background:#fffdf8;padding:10px}.stack{display:grid;gap:10px}.mini-note{font-size:12px;color:var(--muted);line-height:1.55}.sync-log{font-family:var(--mono);font-size:11px;color:var(--muted);word-break:break-all}
@media(max-width:1180px){body{overflow:auto}.app{min-width:0;height:auto;min-height:100vh}.topbar{grid-template-columns:1fr}.quick{grid-template-columns:1fr}.shell{grid-template-columns:1fr;overflow:visible}.side,.detail{border:0}.main,.side,.detail{overflow:visible}.board{grid-template-columns:1fr}.filters{grid-template-columns:1fr}.grid2,.grid3{grid-template-columns:1fr}.timeline-row{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.toast-wrap{top:auto;bottom:16px;left:16px;right:16px}.toast{max-width:none}.detail-head{position:static}.nav{display:flex;flex-wrap:wrap}.nav button{width:auto;flex:1 1 auto}.side-section{display:none}.side{padding:10px 14px;border-bottom:1px solid var(--line)}}

<body>
<div class="app">
  <header class="topbar">
    <div class="brand"><div class="logo" aria-hidden="true">C</div><div><h1>Continuum Commander</h1><p>作業を把握し、迷わず再開するための司令塔</p></div></div>
    <div class="quick"><input id="quickText" type="text" placeholder="作業・依頼・中断点を1行で追加  例: A銀行CSV確認 !高 @2026-06-14 #相続調査"><select id="quickType" aria-label="作業種別"></select><button id="quickAdd" class="primary">追加</button><button id="templateBtn">テンプレート</button></div>
    <div class="top-actions"><span id="saveStatus" class="save-pill">起動中</span><button id="paletteBtn">Ctrl+K</button><button id="dataBtn">データ</button></div>
  </header>
  <div class="shell">
    <aside class="side"><nav id="nav" class="nav"></nav><div class="side-section"><div class="side-note">普段の入口だけを左に置く。作業追加は上部、細かい操作は <span class="mono">Ctrl+K</span>、保存や書出はデータから。</div></div></aside>
    <main id="main" class="main"></main>
    <aside id="detail" class="detail"></aside>
  </div>
</div>
<div id="modal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle"><div class="modal"><div class="modal-head"><h2 id="modalTitle"></h2><button id="modalClose" class="small">閉じる</button></div><div id="modalBody" class="modal-body"></div><div id="modalFoot" class="modal-foot"></div></div></div>
<div id="toasts" class="toast-wrap" aria-live="polite"></div>
<input id="importFile" class="hidden" type="file" accept="application/json,.json">
<script>
(()=>{
'use strict';
const STORE='continuum_commander_store';
const SPEC_QUEUE='continuum_speculum_queue';
const SNAP_STORE='continuum_commander_snapshots';
const HANDLE_DB='continuum_commander_handles';
const HANDLE_STORE='handles';
const HANDLE_KEY='onedriveDataFile';
const VIEWS=[['overview','概況'],['today','今日'],['tasks','作業'],['board','ボード'],['dates','期限'],['review','点検']];
const STATUS=['Inbox','未着手','作業中','待ち','確認中','保留','完了'];
const TYPES=['汎用','相続調査','OCR後処理','開発修正','学習・答案訓練','連絡・確認待ち','資料確認'];
const PRIORITIES=['高','中','低'];
const DETAIL_TABS=[['summary','概要'],['links','リンク・資料'],['detail','詳細'],['history','履歴']];
const $=id=>document.getElementById(id);
const dom={quickText:$('quickText'),quickType:$('quickType'),quickAdd:$('quickAdd'),templateBtn:$('templateBtn'),saveStatus:$('saveStatus'),paletteBtn:$('paletteBtn'),dataBtn:$('dataBtn'),nav:$('nav'),main:$('main'),detail:$('detail'),modal:$('modal'),modalTitle:$('modalTitle'),modalBody:$('modalBody'),modalFoot:$('modalFoot'),modalClose:$('modalClose'),toasts:$('toasts'),importFile:$('importFile')};
let state=loadState();
let selectedId=state.ui.selectedId || firstId();
let currentView=state.ui.view || 'overview';
let detailTab=state.ui.detailTab || 'summary';
let searchText='';
let includeDone=false;
let density=state.ui.density || 'comfortable';
let fileHandle=null;
let fileDirty=false;
let fileTimer=null;
let writing=false;
let guideShown=false;
let savedHandleAvailable=false;
let lastSnapshotDay='';let storageWarned=false;
const undoStack=[];
let issuesCache=null;
const fsaSupported=('showSaveFilePicker' in window)&&('showOpenFilePicker' in window);
init();
function init(){TYPES.forEach(t=>dom.quickType.append(opt(t,t)));bindStatic();applyDensity();renderShell();restoreSaveFileHandle();registerOnlineShell();runStartupReminders();if(!state.settings.guideDone)setTimeout(showGuide,250);} 
function bindStatic(){dom.quickAdd.addEventListener('click',quickAdd);dom.quickText.addEventListener('keydown',e=>{if(e.key==='Enter'&&!imeEnter(e))quickAdd();});dom.templateBtn.addEventListener('click',openTemplates);dom.paletteBtn.addEventListener('click',openPalette);dom.dataBtn.addEventListener('click',openDataMenu);dom.modalClose.addEventListener('click',closeModal);dom.modal.addEventListener('click',e=>{if(e.target===dom.modal)closeModal();});dom.importFile.addEventListener('change',importJson);document.addEventListener('keydown',e=>{if(e.key==='Escape'&&dom.modal.classList.contains('show')){closeModal();return;}const mod=e.ctrlKey||e.metaKey;if(mod&&e.key.toLowerCase()==='k'){e.preventDefault();openPalette();}else if(!mod&&e.key.toLowerCase()==='n'&&isTypingTarget(e.target)===false){e.preventDefault();dom.quickText.focus();}else if(!mod&&e.key==='?'&&isTypingTarget(e.target)===false){e.preventDefault();openShortcuts();}else if(mod&&e.key.toLowerCase()==='z'){e.preventDefault();undoLast();}else if(!mod&&e.key.toLowerCase()==='e'&&selected()&&isTypingTarget(e.target)===false){e.preventDefault();detailTab='detail';uiChanged();renderDetail();}});window.addEventListener('beforeunload',e=>{if(fileDirty&&fileHandle){e.preventDefault();e.returnValue='';}});document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden'&&fileDirty&&fileHandle)writeFileNow(false);});}
function imeEnter(e){return e.isComposing||e.keyCode===229;}function isTypingTarget(t){return t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.tagName==='SELECT'||t.isContentEditable);}function uid(p){return p+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8);}function now(){return new Date().toISOString();}function today(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}function pad(n){return String(n).padStart(2,'0');}function dateOnly(v){return String(v||'').slice(0,10);}function daysBetween(a,b){if(!a||!b)return 9999;return Math.floor((new Date(a+'T00:00:00')-new Date(b+'T00:00:00'))/86400000);}function clone(x){return JSON.parse(JSON.stringify(x));}
function ce(tag,cls,text){const n=document.createElement(tag);if(cls)n.className=cls;if(text!==undefined)n.textContent=text;return n;}function opt(v,t){const o=document.createElement('option');o.value=v;o.textContent=t;return o;}function btn(text,fn,cls){const b=document.createElement('button');if(cls)b.className=cls;b.type='button';b.textContent=text;b.addEventListener('click',e=>{e.stopPropagation();fn(e);});return b;}function icon(text,fn,title){const b=btn(text,fn,'small icon');b.title=title||text;return b;}function empty(text){const d=ce('div','empty',text);return d;}function field(label,control){const w=ce('div');const l=ce('label','',label);w.append(l,control);return w;}function buttonGroup(arr){const g=ce('div','actions');arr.forEach(a=>g.append(btn(a[0],a[1],a[2]||'')));return g;}

function input(type,value,on){const i=document.createElement('input');i.type=type;i.value=value||'';i.addEventListener('input',()=>on(i.value));return i;}function select(value,pairs,on){const s=document.createElement('select');pairs.forEach(p=>s.append(opt(Array.isArray(p)?p[0]:p,Array.isArray(p)?p[1]:p)));s.value=value;s.addEventListener('change',()=>on(s.value));return s;}function inputBlock(value,on,type){const i=document.createElement('input');i.type=type||'text';i.value=value||'';i.addEventListener('change',()=>on(i.value));return i;}function selectBlock(value,arr,on){const s=document.createElement('select');arr.forEach(v=>s.append(opt(v,v)));s.value=value;s.addEventListener('change',()=>on(s.value));return s;}function textareaBlock(value,on,placeholder){const ta=document.createElement('textarea');ta.value=value||'';ta.placeholder=placeholder||'';let timer=null;ta.addEventListener('input',()=>{if(timer)clearTimeout(timer);timer=setTimeout(()=>on(ta.value),500);});ta.addEventListener('change',()=>on(ta.value));return ta;}
function checkText(t){return t.checklist.map(x=>(x.done?'[x] ':'[ ] ')+x.text).join('\n');}function parseChecklist(s){return String(s||'').split(/\r?\n/).map(x=>x.trim()).filter(Boolean).map(x=>({done:/^\[x\]/i.test(x),text:x.replace(/^\[[ xX]\]\s*/, '')}));}
function log(t,msg){t.updatedAt=now();if(msg){const last=t.logs[t.logs.length-1];const recent=last&&last.text===msg&&(Date.now()-new Date(last.at).getTime())<60000;if(recent)last.at=now();else t.logs.push({at:now(),text:msg});}t.logs=t.logs.slice(-80);}function snapshot(){return clone({state,selectedId,currentView,detailTab,searchText,includeDone,density});}function restore(snap){state=snap.state;selectedId=snap.selectedId;currentView=snap.currentView;detailTab=snap.detailTab;searchText=snap.searchText;includeDone=snap.includeDone;density=snap.density;applyDensity();dataChanged();renderShell();}

function parseQuick(s){let title=s;const out={today:false};const pri=s.match(/!(高|中|低)/);if(pri){out.priority=pri[1];title=title.replace(pri[0],'');}const type=s.match(/#([^\s!@+]+)/);if(type){const found=TYPES.find(x=>x===type[1]||x.includes(type[1]));if(found)out.type=found;title=title.replace(type[0],'');}const date=s.match(/@(\d{4}-\d{1,2}-\d{1,2}|今日|明日)/);if(date){out.deadline=resolveDateToken(date[1]);title=title.replace(date[0],'');}if(/\+今日/.test(title)){out.today=true;title=title.replace('+今日','');}out.title=title.trim()||s;return out;}

function issues(){if(issuesCache)return issuesCache;const out=[];active().forEach(t=>{if(t.status==='Inbox'&&daysBetween(today(),dateOnly(t.updatedAt))>=2)out.push({task:t,level:'warn',title:'Inbox滞留',text:'Inboxに2日以上残っています。整理が必要です。'});if(!t.nextAction.trim())out.push({task:t,level:'bad',title:'次の一手なし',text:'再開時に迷います。'});if(['作業中','確認中'].includes(t.status)&&!t.resumeMemo.trim())out.push({task:t,level:'warn',title:'戻るためのメモなし',text:'中断復帰が弱いです。'});if(t.deadline&&daysBetween(t.deadline,today())<0)out.push({task:t,level:'bad',title:'期限超過',text:t.deadline+' が過ぎています。'});if(t.status==='待ち'&&!t.waitingReason.trim())out.push({task:t,level:'warn',title:'待ち理由なし',text:'何待ちか不明です。'});if(t.speculum.wanted&&!speculumDate(t))out.push({task:t,level:'warn',title:'予定候補だが日付なし',text:'Speculumに渡す日付が必要です。'});});issuesCache=out;return out;}

function sortForList(a,b){const s=state.ui.sort||'important';if(s==='updated')return b.updatedAt.localeCompare(a.updatedAt);if(s==='deadline')return (a.deadline||'9999').localeCompare(b.deadline||'9999');if(s==='title')return a.title.localeCompare(b.title,'ja');return sortImportant(a,b);}function sortImportant(a,b){return score(b)-score(a);}function score(t){let s=0;if(t.today)s+=30;if(t.priority==='高')s+=22;if(t.priority==='中')s+=10;if(t.status==='作業中')s+=10;if(t.status==='確認中')s+=8;if(t.deadline){const d=daysBetween(t.deadline,today());if(d<0)s+=45;else if(d<=3)s+=30;else if(d<=7)s+=12;}if(t.resumeDate){const d=daysBetween(t.resumeDate,today());if(d<=0)s+=18;}if(issues().some(x=>x.task.id===t.id))s+=6;return s;}function taskHay(t){return [t.title,t.type,t.status,t.priority,t.nextAction,t.resumeMemo,t.waitingReason,t.notes,t.materials.join(' '),t.links.map(l=>l.title+' '+l.value).join(' ')].join(' ').toLowerCase();}

function openPalette(){const q=input('search','',()=>{});q.placeholder='作業、ビュー、リンク、定型文、操作を検索';const results=ce('div','palette-list');let idx=0;let current=[];function refresh(){const term=q.value.trim().toLowerCase();current=paletteItems().filter(x=>!term||x.label.toLowerCase().includes(term)||x.sub.toLowerCase().includes(term)).slice(0,60);if(idx>=current.length)idx=Math.max(0,current.length-1);results.replaceChildren(...current.map((it,i)=>{const row=ce('div','palette-item'+(i===idx?' active':''));row.tabIndex=0;row.append(ce('div','',it.label),ce('small','muted',it.sub));row.addEventListener('click',()=>{closeModal();it.run();});return row;}));if(!current.length)results.append(empty('該当なし'));}q.addEventListener('input',()=>{idx=0;refresh();});q.addEventListener('keydown',e=>{if(e.key==='ArrowDown'){e.preventDefault();if(current.length){idx=Math.min(idx+1,current.length-1);refresh();}}else if(e.key==='ArrowUp'){e.preventDefault();idx=Math.max(idx-1,0);refresh();}else if(e.key==='Enter'&&!imeEnter(e)){e.preventDefault();const item=current[idx];if(item){closeModal();item.run();}}});openModal('コマンドパレット',[q,results],[modalBtn('閉じる',closeModal)]);setTimeout(()=>{q.focus();refresh();},0);}

function openHandleDB(){return new Promise((resolve,reject)=>{if(!('indexedDB' in window)){reject(new Error('no indexedDB'));return;}const req=indexedDB.open(HANDLE_DB,1);req.onupgradeneeded=()=>{const db=req.result;if(!db.objectStoreNames.contains(HANDLE_STORE))db.createObjectStore(HANDLE_STORE);};req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error||new Error('indexedDB error'));});}
async function persistSaveFileHandle(handle){try{const db=await openHandleDB();await new Promise((resolve,reject)=>{const tx=db.transaction(HANDLE_STORE,'readwrite');tx.objectStore(HANDLE_STORE).put(handle,HANDLE_KEY);tx.oncomplete=resolve;tx.onerror=()=>reject(tx.error);});}catch(e){}}
async function readStoredHandle(){try{const db=await openHandleDB();return await new Promise((resolve,reject)=>{const tx=db.transaction(HANDLE_STORE,'readonly');const req=tx.objectStore(HANDLE_STORE).get(HANDLE_KEY);req.onsuccess=()=>resolve(req.result||null);req.onerror=()=>reject(req.error);});}catch(e){return null;}}
async function restoreSaveFileHandle(){if(!fsaSupported)return;const handle=await readStoredHandle();if(!handle)return;try{const perm=await handle.queryPermission({mode:'readwrite'});if(perm==='granted'){fileHandle=handle;fileDirty=false;savedHandleAvailable=false;renderSaveStatus();toast('前回のOneDrive保存先に再接続しました。','ok');}else{savedHandleAvailable=true;renderSaveStatus();}}catch(e){savedHandleAvailable=false;}}

function toast(msg,tone){const d=ce('div','toast',msg);if(tone)d.dataset.tone=tone;dom.toasts.append(d);setTimeout(()=>{d.style.opacity='0';d.style.transition='opacity .25s ease';},3300);setTimeout(()=>d.remove(),3700);}function toastUndo(msg,undo){const d=ce('div','toast');d.append(ce('span','',msg));d.append(btn('取り消し',()=>{d.remove();undo();},'small'));dom.toasts.append(d);setTimeout(()=>{d.style.opacity='0';d.style.transition='opacity .25s ease';},6500);setTimeout(()=>d.remove(),7000);}
function copyText(text,msg){navigator.clipboard?.writeText(String(text||'')).then(()=>toast(msg||'コピーしました。','ok')).catch(()=>{const ta=document.createElement('textarea');ta.value=String(text||'');document.body.append(ta);ta.select();document.execCommand('copy');ta.remove();toast(msg||'コピーしました。','ok');});}
function expand(text,t){const map={today:today(),title:t?.title||'',nextAction:t?.nextAction||'',resumeMemo:t?.resumeMemo||'',waitingReason:t?.waitingReason||'',notes:t?.notes||'',deadline:t?.deadline||'',resumeDate:t?.resumeDate||'',type:t?.type||'',status:t?.status||'',progress:t?String(t.progress):''};return String(text||'').replace(/\{([a-zA-Z0-9_]+)\}/g,(m,k)=>Object.prototype.hasOwnProperty.call(map,k)?map[k]:m);}function applyDensity(){document.body.classList.toggle('density-compact',density==='compact');}
})();
