    const issues=checkManualQuality(d);
    if(!issues.length){
      qcOut.appendChild(el('div',{class:'qcok'},'✓ 指摘なし。手順として読みやすい状態です。'));
      mascotReact('happy');
      return;
    }
    mascotReact('inspect');
    const warns=issues.filter(x=>x.level==='warn').length;
    qcOut.appendChild(el('div',{class:'qchead'},'品質チェック：要改善 '+warns+' 件 ／ 任意 '+(issues.length-warns)+' 件'));
    issues.forEach(it=>{
      const b=el('button',{class:'qcitem '+it.level,onclick:()=>{
        if(it.stepIndex!=null){
          const box=stepsBox.children[it.stepIndex];
          if(box){box.scrollIntoView({block:'center',behavior:'smooth'});box.classList.add('flash');setTimeout(()=>box.classList.remove('flash'),1400);}
        }
      }},(it.stepIndex!=null?('手順'+(it.stepIndex+1)+'：'):'')+it.msg);
      if(it.stepIndex==null)b.style.cursor='default';
      qcOut.appendChild(b);
    });
  }
  panel.appendChild(qcOut);

  if(pendingAutoQC){pendingAutoQC=false;setTimeout(()=>{try{runQC();qcOut.scrollIntoView({block:'center',behavior:'smooth'});}catch(e){}},80);}
  const actions=el('div',{class:'editactions'});
  if(!isNew)actions.appendChild(el('button',{class:'mini danger',onclick:()=>deleteManual(d.id)},'削除'));
  actions.appendChild(el('button',{class:'mini',style:isNew?{marginRight:'auto'}:null,onclick:runQC},'品質チェック'));
  actions.appendChild(el('button',{class:'mini',onclick:cancelEdit},'取消'));
  actions.appendChild(el('button',{class:'gold',onclick:()=>commitEdit(()=>revNote)},'保存'));
  panel.appendChild(actions);
  root.appendChild(panel);
  setTimeout(()=>{try{tIn.focus();}catch(e){}},30);
}
function cancelEdit(){
  editDraft=null;
  if(currentId&&DATA.manuals.some(m=>m.id===currentId)){renderDetail();}
  else{setView('list');renderList();}
}
function commitEdit(getRevNote){
  const d=editDraft;
  if(!str(d.title).trim()){notify('作業名は必須です。','warn');return;}
  const nt=normTitle(d.title);
  if(nt){
    const dupe=DATA.manuals.find(m=>m.id!==d.id&&normTitle(m.title)===nt);
    if(dupe&&!window.confirm('似た作業名「'+(dupe.title||'(無題)')+'」が既に存在します。このまま保存しますか？'))return;
  }
  d.tags=arr(d.tags).map(str).filter(Boolean);
  d.steps=arr(d.steps).map(s=>({id:s.id||uid('st'),text:str(s.text),note:str(s.note),link:(s.link&&(s.link.url||s.link.label))?{label:str(s.link.label),url:str(s.link.url)}:null,image:(s.image&&s.image.data)?{data:s.image.data,w:s.image.w,h:s.image.h}:null}));
  d.references=arr(d.references).map(r=>({label:str(r.label),url:str(r.url),image:(r.image&&r.image.data)?{data:r.image.data,w:r.image.w,h:r.image.h}:null})).filter(r=>r.label||r.url||r.image);
  d.updatedAt=nowIso();
  const idx=DATA.manuals.findIndex(m=>m.id===d.id);
  if(idx>=0){
    const note=getRevNote?str(getRevNote()).trim():'';
    d.revisions=arr(d.revisions);
    if(note)d.revisions.push({at:nowIso(),by:str(d.owner),note:note});
    DATA.manuals[idx]=normalizeManual(d);
  }else{
    d.createdAt=nowIso();
    DATA.manuals.push(normalizeManual(d));
  }
  currentId=d.id;editDraft=null;
  markChanged();
  notify('保存しました。');
  renderDetail();
}
async function deleteManual(id){
  const m=DATA.manuals.find(x=>x.id===id);if(!m)return;
  if(!window.confirm('「'+(m.title||'(無題)')+'」を削除します。よろしいですか？'))return;
  DATA.manuals=DATA.manuals.filter(x=>x.id!==id);
  editDraft=null;currentId=null;
  markChanged();
  notify('削除しました。');
  setView('list');renderList();
}

/* ---------- 設定モーダル ---------- */
function openSettings(){ $('settingsModal').classList.add('show'); $('mascotToggle').checked=mascotEnabled(); updateDataStat(); }
function closeSettings(){ $('settingsModal').classList.remove('show'); }
function updateDataStat(){
  const s=$('dataStat');if(!s)return;
  const bytes=approxBytes(),imgB=imageBytes();
  let t='登録 '+DATA.manuals.length+' 件 ／ 概算データ量 '+fmtBytes(bytes)+'（うち画像 '+fmtBytes(imgB)+'）';
  if(!FSA)t+=' ／ この環境では自動保存に対応していません（手動の書出し・取込で運用してください）';
  if(bytes>3145728)t+=' ／ データ量が大きくなっています。埋め込み画像の数を見直してください。';
  s.textContent=t;
}

/* ---------- 隠しファイル入力（フォールバック・取込） ---------- */
function wireFilePicker(){
  const fp=$('filePick');
  fp.addEventListener('change',e=>{
    const f=e.target.files&&e.target.files[0];const mode=fp.dataset.mode||'replace';fp.value='';
    if(!f)return;
    const rd=new FileReader();
    rd.onload=()=>{
      if(mode==='merge'){ showImportPreview(str(rd.result)); }
      else { loadFromText(str(rd.result), false); notify('読み込みました（自動保存は手動書出しで）。'); }
    };
    rd.onerror=()=>notify('ファイルの読み込みに失敗しました。','bad');
    rd.readAsText(f);
  });
}

/* ---------- 起動時：保存先ハンドルの再接続 ---------- */
async function tryReconnect(){
  if(!FSA)return;
  try{
    const h=await idbGet('handle');
    if(!h)return;
    $('rememberHandle').checked=true;
    if(h.queryPermission&&await h.queryPermission({mode:'readwrite'})==='granted'){
      const f=await h.getFile();loadFromText(await f.text(),false);
      fileHandle=h;dirty=false;setBadge('saved');
      notify('前回の保存先に再接続しました。');
    }else{
      $('banner').style.display='block';
      clearNode($('banner'));
      $('banner').appendChild(el('span',{},'前回の保存先があります。'));
      $('banner').appendChild(el('button',{class:'mini',style:{marginLeft:'10px'},onclick:async()=>{
        try{
          if(await h.requestPermission({mode:'readwrite'})==='granted'){
            const f=await h.getFile();loadFromText(await f.text(),false);
            fileHandle=h;dirty=false;setBadge('saved');$('banner').style.display='none';
            notify('保存先に再接続しました。');
          }else notify('許可が得られませんでした。','warn');
        }catch(e){notify('再接続に失敗しました。設定から指定し直してください。','warn');}
      }},'再接続する'));
    }
  }catch(e){}
}

/* ---------- 初期化 ---------- */
function init(){
  if(!FSA){
    $('banner').style.display='block';
    clearNode($('banner'));
    $('banner').appendChild(el('span',{},'この環境では自動保存（File System Access）が使えません。設定の「書出し／取込」で手動運用してください。localhost か https での起動を推奨します。'));
  }
  setBadge('off');
  $('q').addEventListener('input',e=>{query=e.target.value;if(view!=='list'){setView('list');}renderList();});
  $('qClear').addEventListener('click',()=>{$('q').value='';query='';renderList();$('q').focus();});
  $('sort').addEventListener('change',e=>{sortMode=e.target.value;if(view==='list')renderList();});
  $('newBtn').addEventListener('click',()=>startEdit(null));
  $('tplBtn').addEventListener('click',startTemplate);
  $('settingsBtn').addEventListener('click',openSettings);
  $('settingsClose').addEventListener('click',closeSettings);
  $('settingsModal').addEventListener('click',e=>{if(e.target===$('settingsModal'))closeSettings();});
  $('saveAsBtn').addEventListener('click',pickSaveFile);
  $('openBtn').addEventListener('click',pickOpenFile);
  $('exportBtn').addEventListener('click',exportBackup);
  $('importBtn').addEventListener('click',importMerge);
  $('tsvBtn').addEventListener('click',exportIndexTsv);
  $('diagBtn').addEventListener('click',runSelfCheck);
  $('rememberHandle').addEventListener('change',async e=>{DATA.settings.rememberHandle=e.target.checked;await rememberMaybe();markChanged();});
  $('mascotToggle').addEventListener('change',e=>{DATA.settings.mascot=e.target.checked;applyMascot();markChanged();});
  $('textoutSelect').addEventListener('click',()=>{const ta=$('textoutArea');ta.focus();ta.select();});
  $('textoutClose').addEventListener('click',()=>{$('textoutModal').classList.remove('show');});
  $('importConfirm').addEventListener('click',confirmImport);
  $('tplClose').addEventListener('click',()=>$('tplModal').classList.remove('show'));
  $('importCancel').addEventListener('click',closeImportPreview);
  $('runsTsvBtn').addEventListener('click',exportRunsMonthlyTsv);
  $('distHtmlBtn').addEventListener('click',exportDistHtml);
  $('mascot').addEventListener('click',toggleMascotPanel);
  $('mascot').addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleMascotPanel();}});
  document.addEventListener('pointerdown',e=>{
    const p=$('mpanel');
    if(!p||p.hidden)return;
    /* パネル・マスコット・モーダル内のクリックでは閉じない */
    if(p.contains(e.target)||$('mascot').contains(e.target))return;
    if(e.target&&e.target.closest&&e.target.closest('.modal-bg'))return;
    closeMascotPanel();
  });
  document.addEventListener('pointerdown',mascotIdleReset);
  document.addEventListener('keydown',mascotIdleReset);
  mascotIdleReset();
  applyMascot();
  wireFilePicker();

  document.addEventListener('keydown',e=>{
    if((e.ctrlKey||e.metaKey)&&e.key==='Enter'&&view==='edit'&&editDraft){e.preventDefault();commitEdit(editRevNoteGetter);return;}
    if(e.key==='Escape'){ const tp=$('tplModal'); if(tp&&tp.classList.contains('show')){tp.classList.remove('show');return;} const im=$('importModal'); if(im&&im.classList.contains('show')){closeImportPreview();return;} const tm=$('textoutModal'); if(tm&&tm.classList.contains('show')){tm.classList.remove('show');return;} const mp=$('mpanel'); if(mp&&!mp.hidden){closeMascotPanel();return;} if($('settingsModal').classList.contains('show'))closeSettings(); else if(view==='edit')cancelEdit(); else if(view==='run')renderDetail(); else if(view==='detail'){setView('list');renderList();} }
    if(e.key==='/'&&document.activeElement!==$('q')&&view==='list'){e.preventDefault();$('q').focus();}
    if(e.key==='a'&&!e.ctrlKey&&!e.metaKey&&!e.altKey){
      const ae=document.activeElement;
      const typing=ae&&/^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName);
      if(!typing&&!document.querySelector('.modal-bg.show')){
        e.preventDefault();toggleMascotPanel();
      }
    }
  });
  window.addEventListener('beforeunload',e=>{ if(dirty){e.preventDefault();e.returnValue='';} });

  setView('list');renderList();
  tryReconnect();
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
