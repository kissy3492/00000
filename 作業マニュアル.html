<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>作業マニュアル</title>
<style>
  :root{
    /* ---- トークンはこのブロックのみで管理する（多層上書き禁止） ---- */
    --bg:#f7edd7; --bg-2:#fff7e8;
    --surface:#fffaf1; --surface-2:#fbefd8; --surface-3:#f0dfbd;
    --ink:#352514; --ink-2:#684f30; --ink-3:#987d55;
    --line:#dfc393; --line-2:#ecd8b4; --line-strong:#bf9657;
    --accent:#d89d30; --accent-soft:#f3ce70; --accent-strong:#985f18; --accent-deep:#5a3418;
    --accent-tint:rgba(216,157,48,.16); --accent-tint2:rgba(216,157,48,.29);
    --warn:#9b6416; --danger:#b34a36; --ok:#7a8f38; --mark:#f5dda0;
    --font:"BIZ UDPGothic","Yu Gothic UI","Meiryo","Hiragino Maru Gothic ProN","Hiragino Sans","Noto Sans JP",sans-serif;
    --serif:"BIZ UDPGothic","Yu Gothic UI","Meiryo","Hiragino Maru Gothic ProN","Hiragino Sans","Noto Sans JP",sans-serif;
    --mono:"Consolas","BIZ UDGothic",ui-monospace,"SF Mono",Menlo,"Roboto Mono",monospace;
    --shadow:0 1px 3px rgba(81,48,16,.08),0 5px 14px rgba(81,48,16,.08);
    --shadow-md:0 12px 28px rgba(81,48,16,.14);
    --shadow-lg:0 22px 56px rgba(64,42,20,.22);
    --r:16px;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  html,body{margin:0;padding:0;max-width:100%}
  body{
    font-family:var(--font);color:var(--ink);line-height:1.7;-webkit-font-smoothing:antialiased;min-height:100vh;font-size:15px;letter-spacing:.005em;
    background:radial-gradient(1300px 760px at 50% -24%,#ffffff 0%,var(--bg) 64%);background-attachment:fixed;
  }
  body::before{content:"";position:fixed;top:0;left:0;right:0;height:3px;z-index:30;background:linear-gradient(90deg,var(--accent-soft),var(--accent) 55%,var(--accent-deep))}
  ::selection{background:var(--accent-tint2)}
  ::-webkit-scrollbar{width:12px;height:12px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(110,78,34,.18);border-radius:8px;border:3px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:rgba(110,78,34,.32)}
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit;max-width:100%;color:var(--ink)}
  img,canvas,svg{max-width:100%;height:auto}
  a{color:var(--accent-strong);text-decoration:none;overflow-wrap:anywhere}
  a:hover{color:var(--accent);text-decoration:underline}
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px 100px}

  /* overflow safety */
  header.top,.brand,.crow,.meta,.ops,.toolbar,.backrow,.editactions,.sehead,.modal .row{min-width:0}
  .card h3,.twocol>*,.stepedit,.refedit,.search,.fld,.runbody,.runtext{min-width:0}
  .card,.panel,.modal,.stepedit,.refedit,.banner,.reviewbar,.empty{max-width:100%}
  .card h3,.panel h2,.purpose,.purposeblk,.stext,.snote,.slink,.reflist li,.chip,.secnote,.runtext{overflow-wrap:anywhere;word-break:normal}
  input[type="date"],input[type="time"],input[type="datetime-local"],input[type="number"]{-webkit-appearance:none;appearance:none;min-width:0;max-width:100%;width:100%}

  /* ---- ヘッダー ---- */
  header.top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:15px 0 13px;position:sticky;top:3px;z-index:10;background:linear-gradient(180deg,rgba(237,243,239,.95),rgba(237,243,239,.72));backdrop-filter:blur(12px) saturate(1.1);border-bottom:1px solid var(--line);box-shadow:0 6px 16px -14px rgba(81,48,16,.5)}
  .brand{display:flex;align-items:center;gap:12px;flex:1 1 auto}
  .brand .label{display:none}
  .brand .name{font-family:var(--serif);font-size:1.32rem;font-weight:700;color:var(--ink);letter-spacing:.05em;display:flex;align-items:center;gap:11px}
  .brand .mark{width:31px;height:31px;flex:none;border-radius:9px;padding:5.5px;color:#fff;background:linear-gradient(150deg,var(--accent-soft),var(--accent-deep));box-shadow:0 2px 7px rgba(19,103,68,.35),inset 0 1px 0 rgba(255,255,255,.35)}
  .brand .tag{display:none;font-size:.76rem;color:var(--ink-3);letter-spacing:.04em;margin-top:3px}
  @media(min-width:760px){.brand .tag{display:inline}}
  .spacer{flex:0 0 0}
  .savebadge{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:.68rem;font-weight:500;letter-spacing:.02em;border:1px solid var(--line);border-radius:999px;padding:6px 13px;color:var(--ink-3);background:var(--surface);white-space:nowrap;flex:none;box-shadow:var(--shadow)}
  .savebadge::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor;flex:none}
  .savebadge.dirty{color:var(--warn);border-color:rgba(169,118,30,.35);background:rgba(169,118,30,.06)}
  .savebadge.saved{color:var(--ok);border-color:rgba(216,157,48,.35);background:var(--accent-tint)}
  .savebadge.off{color:var(--ink-3)}

  /* ---- ボタン ---- */
  button.gold{background:linear-gradient(180deg,var(--accent-soft),var(--accent));color:#fff;border:none;border-radius:11px;padding:10px 19px;font-weight:700;font-size:.86rem;box-shadow:0 2px 9px rgba(24,122,82,.3),inset 0 1px 0 rgba(255,255,255,.25);transition:filter .14s,transform .1s,box-shadow .14s;white-space:nowrap}
  button.gold:hover{filter:brightness(1.06);box-shadow:0 4px 15px rgba(24,122,82,.36)}
  button.gold:active{transform:translateY(1px)}
  button.gold:disabled{opacity:.45;cursor:default;filter:none;box-shadow:none}
  button.mini{background:var(--surface);color:var(--ink-2);border:1px solid var(--line);border-radius:10px;padding:8px 14px;font-size:.82rem;box-shadow:var(--shadow);transition:border-color .14s,color .14s,background .14s;white-space:nowrap}
  button.mini:hover{border-color:var(--accent);color:var(--accent-strong);background:var(--accent-tint)}
  button.danger{color:var(--danger);border-color:rgba(187,66,55,.4);background:var(--surface)}
  button.danger:hover{border-color:var(--danger);color:#fff;background:var(--danger)}
  button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,a:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:7px}

  /* ---- ツールバー・検索 ---- */
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:22px 0 12px}
  .search{flex:1 1 240px}
  .qwrap{position:relative}
  .qwrap input{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:12px;color:var(--ink);font-size:.93rem;padding:12px 40px 12px 15px;outline:none;box-shadow:var(--shadow);transition:border-color .14s,box-shadow .14s}
  .qwrap input::placeholder{color:var(--ink-3)}
  .qwrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
  .qclear{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:26px;height:26px;border:none;border-radius:50%;background:var(--surface-3);color:var(--ink-3);font-size:.7rem;line-height:1;display:flex;align-items:center;justify-content:center;transition:background .14s,color .14s}
  .qwrap input:placeholder-shown ~ .qclear{display:none}
  .qclear:hover{background:var(--accent-tint2);color:var(--accent-strong)}
  select.sort{flex:0 1 auto;max-width:100%;background:var(--surface);border:1px solid var(--line);border-radius:12px;color:var(--ink);font-size:.85rem;padding:11px 13px;outline:none;box-shadow:var(--shadow)}

  /* ---- 分類フィルタ・件数 ---- */
  .catbar{display:none;flex-wrap:nowrap;gap:8px;overflow-x:auto;padding:2px 2px 6px;margin:0 0 8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .catbar::-webkit-scrollbar{display:none}
  .catchip{flex:none;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);border-radius:999px;padding:7px 15px;font-size:.81rem;white-space:nowrap;box-shadow:var(--shadow);transition:border-color .14s,background .14s,color .14s}
  .catchip .catn{font-family:var(--mono);font-size:.68rem;opacity:.65;margin-left:4px}
  .catchip:hover{border-color:var(--accent);color:var(--accent-strong)}
  .catchip.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(24,122,82,.3)}
  .catchip.on .catn{opacity:.85}
  .countline{display:none;font-family:var(--mono);font-size:.72rem;color:var(--ink-3);margin:0 2px 12px;letter-spacing:.03em}

  /* ---- 帯・注記 ---- */
  .banner{display:none;border:1px solid rgba(169,118,30,.32);background:rgba(169,118,30,.08);border-radius:12px;padding:12px 15px;margin:10px 0;font-size:.86rem;color:var(--warn);line-height:1.6}
  .reviewbar{display:none;align-items:center;gap:10px;flex-wrap:wrap;border:1px solid rgba(169,118,30,.32);border-radius:12px;background:rgba(169,118,30,.08);padding:11px 15px;margin:0 0 12px;font-size:.85rem;color:var(--warn);line-height:1.6}
  .secnote{color:var(--ink-3);font-size:.81rem;margin:2px 0 14px;border-left:2px solid var(--line-strong);padding-left:12px;line-height:1.6}
  .empty{color:var(--ink-3);font-size:.95rem;padding:56px 24px;text-align:center;border:1px dashed var(--line-strong);border-radius:var(--r);background:rgba(255,255,255,.55);margin:4px 0;line-height:1.8}

  /* ---- 一覧カード ---- */
  #listView{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;align-items:start}
  #listView .empty{grid-column:1/-1}
  .card{--cat:transparent;position:relative;overflow:hidden;border:1px solid var(--line);border-radius:var(--r);background:var(--surface);box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.8);padding:18px 19px 15px;margin:0;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .15s}
  .card::before{content:"";position:absolute;left:0;right:0;top:0;height:3px;background:var(--cat)}
  .card:hover{border-color:var(--line-strong);box-shadow:var(--shadow-md);transform:translateY(-2px)}
  .card:hover h3{color:var(--accent-strong)}
  .card.pinned{border-left:3px solid var(--accent)}
  .card .crow{display:flex;align-items:flex-start;gap:10px}
  .card h3{margin:0;font-size:1.05rem;font-weight:700;color:var(--ink);line-height:1.55;flex:1 1 auto;transition:color .12s}
  .card .crow .iconbtn{flex:none;box-shadow:none}
  .card .meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px;align-items:center}
  .chip{display:inline-block;max-width:100%;font-family:var(--mono);font-size:.69rem;font-weight:500;border:1px solid var(--line);border-radius:7px;padding:3px 10px;color:var(--ink-2);background:var(--surface-2)}
  .chip.cat{color:var(--accent-strong);background:var(--accent-tint);border-color:rgba(216,157,48,.4)}
  .card .purpose{color:var(--ink-2);font-size:.87rem;margin-top:11px;line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .card .stat{font-family:var(--mono);font-size:.69rem;color:var(--ink-3);margin-top:13px;letter-spacing:.01em}
  .card .ops{display:flex;gap:7px;flex-wrap:wrap;margin-top:13px;padding-top:13px;border-top:1px solid var(--line-2)}
  .iconbtn{background:var(--surface);border:1px solid var(--line);border-radius:9px;color:var(--ink-3);font-size:.92rem;line-height:1;padding:7px 11px;transition:border-color .14s,color .14s,background .14s;flex:none}
  .iconbtn:hover{border-color:var(--accent);color:var(--accent-strong);background:var(--accent-tint)}
  .iconbtn.on{color:var(--accent-strong);border-color:rgba(216,157,48,.5);background:var(--accent-tint)}
  .iconbtn.fav.on{color:#fff;border-color:var(--accent);background:var(--accent);box-shadow:0 1px 4px rgba(24,122,82,.3)}
  .iconbtn:disabled{opacity:.4;cursor:default}
  mark{background:var(--mark);color:var(--ink);border-radius:4px;padding:0 3px}

  /* ---- 詳細パネル ---- */
  .panel{position:relative;border:1px solid var(--line);border-radius:18px;background:var(--surface);box-shadow:var(--shadow-md),inset 0 1px 0 rgba(255,255,255,.8);padding:32px 36px 28px;margin:2px auto;max-width:800px}
  .panel h2{font-family:var(--serif);font-size:1.62rem;font-weight:700;color:var(--ink);margin:0 0 10px;line-height:1.42;letter-spacing:.015em}
  .panel .seclabel{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:.67rem;font-weight:600;letter-spacing:.17em;color:var(--ink-3);margin:30px 0 13px;text-transform:uppercase}
  .panel .seclabel::before{content:"";width:7px;height:7px;border-radius:2px;background:var(--accent);flex:none;box-shadow:0 1px 3px rgba(24,122,82,.4)}
  .panel .seclabel::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line-strong),transparent)}
  .purposeblk{color:var(--ink-2);font-size:.98rem;line-height:1.9;white-space:pre-wrap}

  /* 手順：タイムライン */
  ol.steps{list-style:none;counter-reset:s;margin:0;padding:0}
  ol.steps li{counter-increment:s;position:relative;padding:13px 4px 13px 50px}
  ol.steps li::before{content:counter(s);position:absolute;left:0;top:11px;width:31px;height:31px;background:var(--surface);border:1.5px solid rgba(216,157,48,.5);border-radius:10px;color:var(--accent-strong);font-family:var(--mono);font-size:.84rem;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(19,103,68,.13);z-index:1}
  ol.steps li:not(:last-child)::after{content:"";position:absolute;left:15px;top:47px;bottom:-8px;width:2px;background:var(--line);border-radius:2px}
  ol.steps .stext{white-space:pre-wrap;color:var(--ink);font-size:.98rem;line-height:1.78}
  ol.steps .snote{color:var(--ink-2);font-size:.85rem;margin-top:8px;white-space:pre-wrap;line-height:1.65;background:var(--surface-2);border-left:2px solid var(--line-strong);padding:7px 11px;border-radius:0 9px 9px 0}
  ol.steps .slink{margin-top:7px;font-size:.86rem}

  .reflist{list-style:none;margin:0;padding:0}
  .reflist li{padding:11px 0;border-top:1px solid var(--line-2);font-size:.91rem}
  .reflist li:first-child{border-top:none}
  .linkkind{display:inline-block;font-family:var(--mono);font-size:.6rem;font-weight:600;border:1px solid var(--line);color:var(--ink-3);background:var(--surface-2);border-radius:5px;padding:1px 6px;margin-left:7px;vertical-align:middle;white-space:nowrap;text-transform:uppercase}
  .linkkind.bad{color:var(--danger);border-color:rgba(187,66,55,.4)}
  .backrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:18px auto;max-width:800px}
  .backrow.sticky{position:sticky;top:62px;z-index:8;background:rgba(237,243,239,.9);backdrop-filter:blur(9px);padding:8px 8px;margin:10px auto;border-radius:13px}
  .titleinfo{font-family:var(--mono);font-size:.72rem;color:var(--ink-3);margin-top:10px;letter-spacing:.02em}

  /* 文字サイズ切替（閲覧・実行） */
  body.fs1 .stext,body.fs1 .purposeblk{font-size:1.13rem;line-height:1.95}
  body.fs2 .stext,body.fs2 .purposeblk{font-size:1.3rem;line-height:2}
  body.fs1 ol.steps .snote,body.fs1 .runtext .snote,body.fs1 .runsub{font-size:.95rem}
  body.fs2 ol.steps .snote,body.fs2 .runtext .snote,body.fs2 .runsub{font-size:1.06rem}
  body.fs1 .panel h2{font-size:1.8rem}
  body.fs2 .panel h2{font-size:1.98rem}

  /* ---- フォーム ---- */
  label.fl{display:block;font-family:var(--mono);font-size:.65rem;font-weight:600;letter-spacing:.12em;color:var(--ink-3);margin:20px 0 7px;text-transform:uppercase}
  .fld{width:100%;background:var(--bg-2);border:1px solid var(--line);border-radius:10px;color:var(--ink);font-size:.93rem;padding:11px 13px;outline:none;transition:border-color .14s,box-shadow .14s,background .14s}
  .fld::placeholder{color:var(--ink-3)}
  .fld:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint);background:var(--surface)}
  textarea.fld{resize:vertical;min-height:58px;line-height:1.65}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .stepedit,.refedit{border:1px solid var(--line);border-radius:13px;padding:15px;margin-top:12px;background:var(--surface-2)}
  .stepedit .sehead,.refedit .sehead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:9px}
  .sehead .sn{font-family:var(--mono);font-size:.67rem;font-weight:600;letter-spacing:.08em;color:var(--accent-strong);text-transform:uppercase}
  .sehead .seops{display:flex;gap:5px;flex:none}
  .addrow{margin-top:13px}
  textarea.fld.grow{overflow:hidden;resize:none}
  details.adv{margin-top:24px;border:1px solid var(--line);border-radius:13px;background:var(--surface-2);padding:0 16px 15px}
  details.adv summary{cursor:pointer;list-style:none;display:flex;align-items:center;gap:9px;padding:14px 0;margin:0 -2px;font-family:var(--mono);font-size:.68rem;font-weight:600;letter-spacing:.13em;color:var(--ink-3);text-transform:uppercase;user-select:none}
  details.adv summary::-webkit-details-marker{display:none}
  details.adv summary::before{content:"▸";color:var(--accent-strong);font-size:.85rem;transition:transform .15s;flex:none}
  details.adv[open] summary::before{transform:rotate(90deg)}
  details.adv:not([open]){padding-bottom:0}
  details.adv label.fl{margin-top:14px}
  .editactions{display:flex;gap:9px;flex-wrap:wrap;justify-content:flex-end;align-items:center;position:sticky;bottom:-1px;z-index:6;background:rgba(255,255,255,.95);backdrop-filter:blur(9px);margin:30px -36px -28px;padding:15px 36px 17px;border-top:1px solid var(--line-2);border-radius:0 0 18px 18px}
  .editactions .danger{margin-right:auto}

  /* ---- モーダル・トースト ---- */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(15,32,24,.42);z-index:50;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(5px)}
  .modal-bg.show{display:flex}
  .modal{position:relative;width:100%;max-width:520px;background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow-lg);padding:28px;max-height:88vh;overflow:auto}
  .modal h3{font-family:var(--mono);font-size:.74rem;font-weight:600;letter-spacing:.13em;color:var(--ink-3);margin:0 0 12px;text-transform:uppercase}
  .modal .row{display:flex;gap:9px;flex-wrap:wrap;margin-top:16px;justify-content:flex-end}
  .toggle{display:flex;align-items:flex-start;gap:11px;margin-top:16px;font-size:.87rem;color:var(--ink-2);line-height:1.6}
  .toggle input{width:18px;height:18px;margin-top:2px;accent-color:var(--accent);flex:none}

  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:90;width:max-content;max-width:calc(100vw - 32px);padding:13px 20px;border-radius:13px;font-size:.9rem;line-height:1.5;color:#fff;background:#15201a;border-left:3px solid var(--accent-soft);box-shadow:var(--shadow-lg);display:none}
  #toast.show{display:block;animation:toastin .22s ease}
  #toast.warn{border-left-color:var(--warn)} #toast.bad{border-left-color:var(--danger)}
  @keyframes toastin{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}

  /* ---- 実行モード・画像 ---- */
  .stepimg{display:block;max-width:100%;width:auto;max-height:300px;object-fit:contain;border:1px solid var(--line);border-radius:11px;margin-top:10px;background:var(--surface-2)}
  .imgrow{margin-top:10px} .imgrow .stepimg{max-height:160px}
  .rvdate{font-family:var(--mono);font-size:.76em;color:var(--ink-3)}
  .runsub{color:var(--ink-2);font-size:.9rem;margin:2px 0 16px;line-height:1.6}
  .runhead{position:sticky;top:66px;z-index:5;background:rgba(255,255,255,.93);backdrop-filter:blur(8px);margin:0 -14px 14px;padding:10px 14px 4px;border-radius:12px}
  .progress{height:10px;border-radius:99px;background:var(--surface-3);overflow:hidden;border:1px solid var(--line)}
  .progfill{height:100%;width:0;background:linear-gradient(90deg,var(--accent-soft),var(--accent));border-radius:99px;transition:width .28s ease}
  .progtext{font-family:var(--mono);font-size:.72rem;color:var(--ink-3);margin:8px 0 4px;letter-spacing:.03em}
  .runsteps{display:flex;flex-direction:column;gap:10px}
  .runrow{display:flex;gap:13px;align-items:flex-start;min-width:0;border:1px solid var(--line);border-radius:13px;background:var(--surface);padding:15px 16px;cursor:pointer;box-shadow:var(--shadow);transition:border-color .14s,background .14s,box-shadow .14s}
  .runrow:hover{border-color:var(--accent);box-shadow:var(--shadow-md)}
  .runrow.done{background:var(--accent-tint);border-color:rgba(216,157,48,.4);box-shadow:none}
  .runrow.done .stext{color:var(--ink-3);text-decoration:line-through}
  .runrow.done .runnum{background:var(--accent);border-color:var(--accent);color:#fff}
  .runrow input[type="checkbox"]{width:22px;height:22px;margin-top:2px;accent-color:var(--accent);flex:none}
  .runbody{display:flex;gap:13px;align-items:flex-start;min-width:0;flex:1 1 auto}
  .runnum{font-family:var(--mono);font-size:.78rem;font-weight:700;color:var(--accent-strong);background:var(--accent-tint);border:1px solid rgba(216,157,48,.4);border-radius:8px;min-width:27px;height:27px;padding:0 4px;display:flex;align-items:center;justify-content:center;flex:none;transition:background .14s,color .14s,border-color .14s}
  .runtext{min-width:0;flex:1 1 auto}
  .chipx{background:none;border:none;color:var(--ink-3);font-size:.72rem;margin-left:6px;padding:0 1px;cursor:pointer;line-height:1}
  .chipx:hover{color:var(--danger)}

  /* 実行中チップ */
  .chip.run{color:#fff;background:var(--warn);border-color:var(--warn);font-weight:600}

  /* 次にやること（実行モード） */
  .nextline{margin-top:8px;min-height:0}
  .nextlabel{display:inline-block;font-family:var(--mono);font-size:.63rem;font-weight:600;letter-spacing:.14em;color:var(--ink-3);text-transform:uppercase;margin-right:9px;vertical-align:middle}
  .nextstep{display:inline-flex;align-items:center;gap:9px;max-width:100%;border:1px solid rgba(216,157,48,.45);background:var(--accent-tint);border-radius:11px;padding:8px 13px;font-size:.88rem;color:var(--ink);text-align:left;vertical-align:middle;transition:background .14s,border-color .14s}
  .nextstep:hover{background:var(--accent-tint2);border-color:var(--accent)}
  .nextstep .nexttext{min-width:0;overflow-wrap:anywhere;line-height:1.5}
  .nextdone{display:inline-block;color:var(--accent-strong);font-size:.88rem;font-weight:600;padding:6px 0 2px}

  /* 次のフロー */
  .nextflow{display:none;margin-top:18px;border:1px solid rgba(216,157,48,.4);border-radius:13px;background:var(--accent-tint);padding:14px 16px}
  .nextflow .nfttl{font-family:var(--mono);font-size:.66rem;font-weight:600;letter-spacing:.15em;color:var(--accent-strong);text-transform:uppercase;margin-bottom:10px}

  /* 品質チェック */
  .qcbox{margin-top:22px;border:1px solid var(--line);border-radius:13px;background:var(--surface-2);padding:14px 15px}
  .qchead{font-family:var(--mono);font-size:.72rem;font-weight:600;letter-spacing:.05em;color:var(--ink-2);margin-bottom:10px}
  .qcok{color:var(--accent-strong);font-size:.88rem;font-weight:600}
  .qcitem{display:block;width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px 12px 9px 30px;margin-top:7px;font-size:.84rem;color:var(--ink-2);line-height:1.6;position:relative;transition:border-color .14s,background .14s}
  .qcitem::before{content:"";position:absolute;left:12px;top:15px;width:8px;height:8px;border-radius:50%}
  .qcitem.warn::before{background:var(--warn)}
  .qcitem.info::before{background:var(--line-strong)}
  .qcitem:hover{border-color:var(--accent);background:var(--accent-tint)}
  .stepedit.flash{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint2)}
  .runbody .rowpen{align-self:flex-start;font-size:.85rem;padding:6px 9px;color:var(--ink-3)}
  .runrow.done .rowpen{opacity:.6}
  .rowedit{display:flex;gap:7px;justify-content:flex-end;margin-top:8px}
  .runtext textarea.fld{background:var(--surface)}

  /* ---- マスコット「アピス」：ツール世界観統一・Canvas版 ---- */
  .mascot{position:fixed;right:14px;bottom:14px;z-index:40;width:98px;height:98px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;overflow:visible}
  /* ---- 通知バッジ ---- */
  .mbadge{position:absolute;top:2px;right:2px;z-index:2;min-width:19px;height:19px;padding:0 5px;border-radius:999px;background:var(--danger);color:#fff;font-family:var(--mono);font-size:.68rem;font-weight:700;line-height:19px;text-align:center;border:2px solid var(--bg-2);box-shadow:0 1px 4px rgba(81,48,16,.3);pointer-events:none}
  /* ---- アピス・パネル ---- */
  .mpanel{position:fixed;right:14px;bottom:122px;z-index:45;width:312px;max-width:calc(100vw - 28px);max-height:min(62vh,520px);overflow:auto;background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-lg);padding:14px 14px 12px}
  .mpanel[hidden]{display:none}
  .mp-head{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--accent-deep);font-size:.92rem;margin:0 2px 4px}
  .mp-head .mp-x{margin-left:auto;background:var(--surface-3);border:none;border-radius:50%;width:24px;height:24px;color:var(--ink-3);font-size:.7rem;line-height:1;display:flex;align-items:center;justify-content:center}
  .mp-head .mp-x:hover{background:var(--accent-tint2);color:var(--accent-strong)}
  .mp-ttl{font-family:var(--mono);font-size:.64rem;font-weight:600;letter-spacing:.13em;color:var(--ink-3);text-transform:uppercase;margin:13px 2px 6px;display:flex;align-items:center;gap:7px}
  .mp-ttl::after{content:"";flex:1;height:1px;background:var(--line-2)}
  .mp-row{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:var(--bg-2);border:1px solid var(--line-2);border-radius:11px;padding:9px 11px;margin-top:6px;font-size:.85rem;color:var(--ink);line-height:1.5;transition:border-color .14s,background .14s}
  .mp-row:hover{border-color:var(--accent);background:var(--accent-tint)}
  .mp-row .t{flex:1 1 auto;min-width:0;overflow-wrap:anywhere}
  .mp-row .m{flex:none;font-family:var(--mono);font-size:.68rem;color:var(--ink-3);white-space:nowrap}
  .mp-row .m.warn{color:var(--warn);font-weight:700}
  .mp-bar{flex:none;width:46px;height:7px;border-radius:99px;background:var(--surface-3);overflow:hidden;border:1px solid var(--line-2)}
  .mp-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent-soft),var(--accent))}
  .mp-meta{font-size:.78rem;color:var(--ink-2);margin:6px 2px 0;line-height:1.6}
  .mp-tip{font-size:.74rem;color:var(--ink-3);margin:14px 2px 0;padding-top:10px;border-top:1px dashed var(--line);line-height:1.6}
  .mp-empty{font-size:.8rem;color:var(--ink-3);margin:4px 2px;line-height:1.6}
  @media(max-width:600px){.mpanel{bottom:96px;right:12px}}
  .mascot.hidden{display:none}
  @media(max-width:980px){.editactions{padding-right:120px}}
  #apisCanvas{position:absolute;inset:0;width:100%;height:100%;display:block;pointer-events:none}
  .mzzz{position:absolute;top:-7px;right:-1px;font-family:var(--mono);font-size:.72rem;font-weight:700;color:var(--ink-3);opacity:0;transition:opacity .4s;pointer-events:none;text-shadow:0 1px 0 rgba(255,255,255,.9)}
  .mascot.sleep .mzzz{opacity:1;animation:zfloat 2.4s ease-in-out infinite}
  @keyframes zfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .mbubble{position:absolute;bottom:102px;right:0;width:max-content;max-width:248px;background:var(--surface);border:1px solid var(--line);border-radius:13px 13px 3px 13px;box-shadow:var(--shadow-md);padding:10px 13px;font-size:.8rem;color:var(--ink-2);line-height:1.65;opacity:0;pointer-events:none;transform:translateY(6px);transition:opacity .2s,transform .2s;overflow-wrap:anywhere}
  .mascot.talk .mbubble{opacity:1;transform:translateY(0)}
  .mascot:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:50%}
  @media(max-width:600px){
    body{font-size:14.5px}
    .mascot{width:74px;height:74px;right:12px;bottom:12px}
    .mbubble{bottom:80px;max-width:206px}
    #listView{grid-template-columns:1fr}
    .twocol{grid-template-columns:1fr}
    .wrap{padding:0 15px 90px}
    .panel{padding:24px 18px 20px;border-radius:16px}
    .panel h2{font-size:1.36rem}
    .runhead{top:58px;margin:0 -8px 12px;padding:8px 8px 4px}
    .backrow.sticky{top:56px}
    .editactions{margin:24px -18px -20px;padding:13px 74px 15px 18px}
    .brand .name{font-size:1.18rem}
  }
  @media(prefers-reduced-motion:reduce){
    *{transition:none !important;animation:none !important}
  }
  @media print{
    body{background:#fff;color:#000} body::before{display:none}
    header.top,.toolbar,.catbar,.countline,.backrow,.editactions,.banner,.reviewbar,#toast,.modal-bg,.qclear,.mascot,.mpanel,.mbadge,::-webkit-scrollbar{display:none !important}
    *{color:#000 !important;box-shadow:none !important}
    .panel,.card{border:1px solid #ccc;background:#fff;max-width:none}
    ol.steps li:not(:last-child)::after{background:#ddd}
    mark{background:#c6efd6}
  }

/* ============================================================
   P1.7: ツール本体をアピス世界観へ統一
   - このファイル内のアピス実装は維持し、本体UIだけを
     蜂の魔法使いアシスタント世界観へ寄せる。

  /* :root はファイル先頭の1ブロックに統合済み */

  body{

      radial-gradient(900px 540px at 8% -6%, rgba(255,229,153,.58), transparent 58%),

  body::after{
    content:"";

    inset:0;

    opacity:.42;
    background:
      radial-gradient(circle at 14% 18%, rgba(255,213,96,.55) 0 2px, transparent 2.5px),
      radial-gradient(circle at 83% 15%, rgba(255,213,96,.35) 0 1.6px, transparent 2px),

/* ============================================================
   P1.9: フォント・色合い・背景装飾の再調整
   - 右下の丸い影は前回のbody::after背景装飾が原因のため削除。
   - 全テキストをアピス世界観に合わせ、丸みのある和文フォントへ統一。
   - 色合いを「蜂蜜色 × 濃紺 × 羊皮紙」に再調整。
   - マスコット本体と機能・JSは変更しない。
   ============================================================ */
  /* :root はファイル先頭の1ブロックに統合済み */

  /* 全称font-family上書きは廃止（数値系のmono指定を殺すため）。
     既定書体は body の font-family 継承で適用される */

  body{
    font-family:var(--font) !important;
    color:var(--ink) !important;
    letter-spacing:.012em;
    background:
      radial-gradient(780px 420px at 12% -4%, rgba(255,224,130,.58), transparent 62%),
      radial-gradient(760px 420px at 92% 0%, rgba(41,49,83,.12), transparent 48%),
      linear-gradient(180deg,#fff7e6 0%,#f8efd9 58%,#f2e3c5 100%) !important;
    background-attachment:fixed !important;
  }

  /* 丸い影の原因だった大きなradial-gradientを完全に撤去。
     代わりに小さな蜂蜜色の粒だけを置く。 */
  body::after{
    content:"" !important;
    position:fixed !important;
    inset:0 !important;
    pointer-events:none !important;
    z-index:-1 !important;
    opacity:.42 !important;
    background:
      radial-gradient(circle at 14% 19%, rgba(243,207,113,.52) 0 1.9px, transparent 2.4px),
      radial-gradient(circle at 85% 16%, rgba(243,207,113,.36) 0 1.5px, transparent 2px),
      radial-gradient(circle at 24% 86%, rgba(243,207,113,.30) 0 1.7px, transparent 2.2px),
      radial-gradient(circle at 94% 64%, rgba(243,207,113,.26) 0 1.3px, transparent 1.8px) !important;
  }

  body::before{
    height:4px !important;
    background:linear-gradient(90deg,var(--accent-soft),var(--accent),var(--accent-deep)) !important;
    box-shadow:0 1px 0 rgba(255,255,255,.42) !important;
  }

  .brand .name,
  .panel h2{
    font-family:var(--font) !important;
    color:var(--accent-deep) !important;
    font-weight:800 !important;
    letter-spacing:.045em !important;
  }
  .brand .name{
    font-size:1.34rem !important;
    text-shadow:0 1px 0 rgba(255,255,255,.72) !important;
  }
  .panel h2{

/* ---------- DOM ヘルパ ---------- */
function $(id){return document.getElementById(id);}
function clearNode(n){while(n&&n.firstChild)n.removeChild(n.firstChild);}
function el(tag,props){
  const e=document.createElement(tag);
  if(props)for(const k in props){
    const v=props[k];
    if(v==null||v===false)continue;
    if(k==='class')e.className=v;
    else if(k==='text')e.textContent=v;
    else if(k==='html')continue; /* 使用禁止 */
    else if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k==='dataset'&&typeof v==='object')Object.assign(e.dataset,v);
    else if(k.slice(0,2)==='on'&&typeof v==='function')e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(let i=2;i<arguments.length;i++){
    const c=arguments[i];
    if(c==null||c===false)continue;
    if(Array.isArray(c))c.forEach(x=>{if(x!=null&&x!==false)e.appendChild(typeof x==='object'?x:document.createTextNode(String(x)));});
    else e.appendChild(typeof c==='object'?c:document.createTextNode(String(c)));
  }
  return e;
}

/* ---------- 汎用 ---------- */
function uid(p){return (p||'man')+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
/* ISO(UTC)記録をローカル日付/年月へ（todayStrと同じ基準に揃える） */
function localDayStr(iso){const d=new Date(str(iso));if(isNaN(d.getTime()))return str(iso).slice(0,10);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function localYmStr(iso){return localDayStr(iso).slice(0,7);}
function nowIso(){return new Date().toISOString();}
function arr(x){return Array.isArray(x)?x:[];}
function str(x){return x==null?'':String(x);}

let toastTimer=null;
function notify(msg,level){
  const t=$('toast');if(!t)return;
  t.textContent=msg;t.className='show'+(level?(' '+level):'');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.className='';},3200);
}

/* ---------- リンク安全判定 ---------- */
function linkKind(url){
  const raw=str(url).trim();const u=raw.toLowerCase();
  if(!raw)return {label:'未入力',safe:false,href:null,code:'-'};
  if(/^(javascript|data|vbscript):/i.test(raw))return {label:'危険なため無効',safe:false,href:null,code:'!'};
  if(/^https?:\/\//i.test(raw))return {label:'Web',safe:true,href:raw,code:'web'};
  if(/^ms-(excel|word|powerpoint|access):/i.test(raw)||/^onenote:/i.test(raw))return {label:'Office',safe:true,href:raw,code:'office'};
  if(/^(file|mailto|tel):/i.test(raw))return {label:raw.split(':')[0],safe:true,href:raw,code:'local'};
  if(/^[\\/]/.test(raw)||/^[a-z]:\\/i.test(raw))return {label:'パス（リンク不可）',safe:false,href:null,code:'path'};
  return {label:'不明な形式',safe:false,href:null,code:'?'};
}
/* カテゴリ色：名前から淡い色を決定的に生成 */
function catColor(name){
  const s=str(name);let h=0;
  for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))%360;}
  return {bg:'hsl('+h+',42%,93%)',fg:'hsl('+h+',40%,31%)',border:'hsl('+h+',34%,79%)'};
}

const APIS_STATE={img:null,ready:false,mode:'idle',until:0,raf:0,lastAuto:0,seed:Math.random()*1000};
const APIS_RM=(typeof window.matchMedia==='function')?window.matchMedia('(prefers-reduced-motion: reduce)'):null;

function apisStopCanvas(){
  if(APIS_STATE.raf){cancelAnimationFrame(APIS_STATE.raf);APIS_STATE.raf=0;}
  const c=$('apisCanvas');
  if(c)c.getContext('2d').clearRect(0,0,c.width,c.height);
}
/* reduced-motion時: 動かない1フレームのみ描画 */
function apisDrawStatic(){
  const c=$('apisCanvas'); if(!c||!APIS_STATE.ready)return;
  const ctx=c.getContext('2d'); const W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.globalAlpha=.3;
  const grd=ctx.createRadialGradient(W/2,H-31,3,W/2,H-31,42);
  grd.addColorStop(0,'rgba(81,48,16,.34)');grd.addColorStop(1,'rgba(81,48,16,0)');
  ctx.fillStyle=grd;ctx.beginPath();ctx.ellipse(W/2,H-31,40,9,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  ctx.drawImage(APIS_STATE.img,0,0,W,H);
}

function mascotEnabled(){return !(DATA.settings&&DATA.settings.mascot===false);}
function applyMascot(){
  const mc=$('mascot');
  if(mc)mc.classList.toggle('hidden',!mascotEnabled());
  if(mascotEnabled())apisStartCanvas();
  else apisStopCanvas();
  updateMascotBadge();
}

function apisStartCanvas(){
  const c=$('apisCanvas'); if(!c)return;
  if(!APIS_STATE.img){
    APIS_STATE.img=new Image();
    APIS_STATE.img.onload=()=>{APIS_STATE.ready=true;apisLoop();};
    APIS_STATE.img.src=APIS_SPRITE_SRC;
  }else if(APIS_STATE.ready){
    apisLoop();
  }
}
function apisSetMode(mode,dur){
  APIS_STATE.mode=mode||'idle';
  APIS_STATE.until=performance.now()+(dur||1400);
}

function apisRoundRect(ctx,x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);return;}
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
}

function apisDrawBadge(ctx,x,y,w,h,alpha,kind){
  ctx.save();
  ctx.translate(x,y);
  ctx.globalAlpha=alpha;
  ctx.fillStyle='rgba(255,255,255,.94)';
  ctx.strokeStyle='rgba(208,182,138,.95)';
  ctx.lineWidth=1.7;
  apisRoundRect(ctx,-w/2,-h/2,w,h,6); ctx.fill(); ctx.stroke();

  ctx.lineCap='round';
  if(kind==='check'){
    ctx.strokeStyle='rgba(122,143,56,.95)';
    ctx.lineWidth=2.2;
    ctx.beginPath();
    ctx.moveTo(-6,0); ctx.lineTo(-1,5); ctx.lineTo(8,-6); ctx.stroke();
  }else if(kind==='doc'){
    ctx.strokeStyle='rgba(140,113,75,.95)';
    ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(-8,-4); ctx.lineTo(6,-4);
    ctx.moveTo(-8,0); ctx.lineTo(5,0);
    ctx.moveTo(-8,4); ctx.lineTo(2,4);
    ctx.stroke();
    ctx.fillStyle='rgba(216,157,48,.25)';
    ctx.fillRect(-8,-8,6,4);
  }else if(kind==='search'){
    ctx.strokeStyle='rgba(152,95,24,.92)';
    ctx.lineWidth=1.9;
    ctx.beginPath(); ctx.arc(-2,-2,5,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2,2); ctx.lineTo(7,7); ctx.stroke();
  }else if(kind==='save'){
    ctx.fillStyle='rgba(216,157,48,.18)';
    ctx.fillRect(-8,-8,16,16);
    ctx.strokeStyle='rgba(152,95,24,.92)';
    ctx.lineWidth=1.7;
    ctx.strokeRect(-8,-8,16,16);
    ctx.beginPath(); ctx.moveTo(-4,-3); ctx.lineTo(-4,4); ctx.lineTo(4,4); ctx.lineTo(4,-3); ctx.stroke();
  }
  ctx.restore();
}

function apisDrawDot(ctx,x,y,r,alpha){
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.fillStyle='rgba(216,157,48,.85)';
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function apisLoop(){
  if(APIS_STATE.raf||!APIS_STATE.ready)return;
  const c=$('apisCanvas'); if(!c)return;
  const ctx=c.getContext('2d');
  function frame(now){
    const mc=$('mascot');
    if(!mc||!mascotEnabled()||document.hidden){APIS_STATE.raf=0;ctx.clearRect(0,0,c.width,c.height);return;}
    if(APIS_RM&&APIS_RM.matches){APIS_STATE.raf=0;apisDrawStatic();return;}
    APIS_STATE.raf=requestAnimationFrame(frame);
    const W=c.width,H=c.height;
    const t=now/1000+APIS_STATE.seed;

    if(APIS_STATE.mode!=='sleep'&&APIS_STATE.mode!=='idle'&&now>APIS_STATE.until){
      APIS_STATE.mode='idle';
      mc.classList.remove('happy','inspect');
    }
    if(APIS_STATE.mode==='idle'&&now-APIS_STATE.lastAuto>7000+Math.sin(t*.7)*1600){
      APIS_STATE.lastAuto=now;
      const r=Math.random();
      if(r<.35)apisSetMode('check',1500);
      else if(r<.63)apisSetMode('inspect',1500);
      else if(r<.82)apisSetMode('search',1450);
      else apisSetMode('save',1500);
    }

    ctx.clearRect(0,0,W,H);
    const mode=APIS_STATE.mode;

    const bob=mode==='sleep'?4+Math.sin(t*1.2)*1.2:Math.sin(t*2.0)*4.8;
    const rotBase=mode==='inspect'?-0.08:mode==='sleep'?0.10:(mode==='check'||mode==='save')?Math.sin(t*5)*0.025:Math.sin(t*1.7)*0.02;
    const bounce=(mode==='happy')?Math.abs(Math.sin(t*8))*9:0;
    const scaleX=(mode==='happy')?1+Math.sin(t*10)*0.02:1;
    const scaleY=(mode==='happy')?1-Math.sin(t*10)*0.015:1;

    const shScale=mode==='happy'?.72+Math.abs(Math.sin(t*5))*.16:mode==='sleep'?.72:.92+Math.sin(t*2.1)*.04;
    ctx.save();
    ctx.globalAlpha=mode==='sleep'?.22:.32;
    const grd=ctx.createRadialGradient(W/2,H-31,3,W/2,H-31,42);
    grd.addColorStop(0,'rgba(81,48,16,.34)');
    grd.addColorStop(1,'rgba(81,48,16,0)');
    ctx.fillStyle=grd;
    ctx.beginPath(); ctx.ellipse(W/2,H-31,42*shScale,9,0,0,Math.PI*2); ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.globalAlpha=mode==='sleep'?.08:.18+Math.sin(t*1.8)*.04;
    const aura=ctx.createRadialGradient(W/2,H/2,6,W/2,H/2,76);
    aura.addColorStop(0,'rgba(216,157,48,.30)');
    aura.addColorStop(.60,'rgba(216,157,48,.11)');
    aura.addColorStop(1,'rgba(216,157,48,0)');
    ctx.fillStyle=aura; ctx.beginPath(); ctx.arc(W/2,H/2,76,0,Math.PI*2); ctx.fill();
    ctx.restore();

    if(mode!=='sleep'){
      ctx.save();
      ctx.strokeStyle='rgba(216,157,48,.22)';
      ctx.lineWidth=1.2;
      ctx.setLineDash([4,6]);
      ctx.beginPath(); ctx.arc(W/2,H/2+bob-bounce,62,Math.PI*.12,Math.PI*1.78); ctx.stroke();
      ctx.restore();
    }

    ctx.save();
    ctx.translate(W/2,H/2+bob-bounce);
    ctx.rotate(rotBase);
    ctx.scale(scaleX,scaleY);
    if(mode==='sleep')ctx.globalAlpha=.93;
    ctx.drawImage(APIS_STATE.img,-W/2,-H/2,W,H);
    ctx.restore();

    if(mode==='inspect'){
      apisDrawBadge(ctx,W*.26,H*.30,30,22,.88,'doc');
      apisDrawBadge(ctx,W*.75,H*.25,28,20,.65,'search');
    } else if(mode==='check' || mode==='happy'){
      apisDrawBadge(ctx,W*.78,H*.37,30,22,.90,'check');
      apisDrawDot(ctx,W*.73,H*.26,3,.55+.25*Math.sin(t*5));
    } else if(mode==='search'){
      apisDrawBadge(ctx,W*.77,H*.37,30,22,.88,'search');
      apisDrawBadge(ctx,W*.28,H*.27,28,20,.55,'doc');
    } else if(mode==='save'){
      apisDrawBadge(ctx,W*.77,H*.37,30,22,.88,'save');
      apisDrawDot(ctx,W*.73,H*.26,3,.55+.25*Math.sin(t*5));
    }

    if(mode!=='sleep'){
      const specs=[
        [18,34], [W-18,31], [W-22,H-43], [34,H-20]
      ];
      specs.forEach((s,i)=>{
        const phase=t*1.3+i*1.4;
        const x=s[0]+Math.sin(phase*1.7)*4;
        const y=s[1]+Math.cos(phase*1.2)*4;
        const a=Math.max(0,Math.sin(phase))*0.7;
        apisDrawDot(ctx,x,y,2.8+(i%2)*1.1,a);
      });
    }
  }
  APIS_STATE.raf=requestAnimationFrame(frame);
}

});

function mascotReact(kind){
  const mc=$('mascot'); if(!mc||!mascotEnabled())return;
  mc.classList.remove('happy','inspect','sleep');
  if(kind==='happy'){mc.classList.add('happy'); apisSetMode('check',1500); setTimeout(()=>mc.classList.remove('happy'),1500);}
  else if(kind==='inspect'){mc.classList.add('inspect'); apisSetMode('inspect',1700); setTimeout(()=>mc.classList.remove('inspect'),1700);}
  else if(kind==='magic'){apisSetMode('save',1600);}
  else if(kind==='wave'){apisSetMode('check',1400);}
}

function mascotSay(text){
  const mc=$('mascot'), bb=$('mbubble'); if(!mc||!bb||!mascotEnabled())return;
  bb.textContent=text; mc.classList.remove('sleep'); mc.classList.add('talk');
  apisSetMode('check',1800);
  if(mascotTalkTimer)clearTimeout(mascotTalkTimer);
  mascotTalkTimer=setTimeout(()=>mc.classList.remove('talk'),4500);
}

/* ---------- アピス・パネル（コンシェルジュ） ---------- */
let pendingAutoQC=false;

function todayRunCount(){
  const t=todayStr();let n=0;
  DATA.manuals.forEach(m=>arr(m.runs).forEach(r=>{if(localDayStr(r.at)===t)n++;}));
  return n;
}
function weekSummary(){
  const now=Date.now(),WEEK=7*86400000;
  let n=0,sec=0;
  DATA.manuals.forEach(m=>arr(m.runs).forEach(r=>{
    const t=new Date(str(r.at)).getTime();
    if(!isNaN(t)&&now-t<WEEK){n++;sec+=(r.sec>0?r.sec:0);}
  }));
  return {n:n,sec:sec};
}
function mascotStatus(){
  const t=todayStr();
  return {
    running:DATA.manuals.filter(m=>runProgress(m)>0).length,
    due:DATA.manuals.filter(m=>m.reviewDue&&m.reviewDue<=t).length
  };
}
function mascotBadgeCount(){
  const st=mascotStatus();
  return st.running+st.due;
}
function updateMascotBadge(){
  const b=$('mbadge');if(!b)return;
  const st=mascotStatus();
  const n=st.running+st.due;
  if(n>0&&mascotEnabled()){b.hidden=false;b.textContent=n>9?'9+':String(n);}
  else b.hidden=true;
  const mc=$('mascot');
  if(mc)mc.title='アピス：報告パネル（a キー）'+(n>0?('｜実行中 '+st.running+' ／ 期限切れ '+st.due):'');
}
function mpRow(props,...kids){return el('button',Object.assign({class:'mp-row'},props),...kids);}
function closeMascotPanel(){const p=$('mpanel');if(p)p.hidden=true;}
function toggleMascotPanel(){
  const p=$('mpanel');if(!p)return;
  if(!p.hidden){p.hidden=true;return;}
  renderMascotPanel();p.hidden=false;
  apisSetMode('check',1400);
}
function renderMascotPanel(){
  const p=$('mpanel');clearNode(p);
  p.appendChild(el('div',{class:'mp-head'},'アピスの報告',
    el('button',{class:'mp-x',title:'閉じる','aria-label':'閉じる',onclick:closeMascotPanel},'✕')));

  /* 実行中なら経過時間 */
  if(view==='run'&&currentId){
    const m=DATA.manuals.find(x=>x.id===currentId);
    if(m&&m.activeRun){
      const sec=runElapsedSec(m);
      const timed=arr(m.runs).filter(r=>r.sec>0);
      let t='この実行の経過：'+fmtDur(sec);
      if(timed.length)t+='（平均 '+fmtDur(Math.round(timed.reduce((a,r)=>a+r.sec,0)/timed.length))+'）';
      p.appendChild(el('div',{class:'mp-meta'},t));
    }
  }

  /* 作業の続き */
  const running=DATA.manuals.filter(m=>runProgress(m)>0)
    .sort((a,b)=>str(b.activeRun&&b.activeRun.updatedAt).localeCompare(str(a.activeRun&&a.activeRun.updatedAt)));
  if(running.length){
    p.appendChild(el('div',{class:'mp-ttl'},'作業の続き'));
    running.slice(0,3).forEach(m=>{
      const d=runProgress(m),n=m.steps.length;
      const bar=el('span',{class:'mp-bar'},el('i',{style:{width:(n?Math.round(d/n*100):0)+'%'}}));
      p.appendChild(mpRow({onclick:()=>{closeMascotPanel();startRun(m.id);}},
        el('span',{class:'t'},'▶ '+(m.title||'(無題)')),bar,el('span',{class:'m'},d+'/'+n)));
    });
  }

  /* 見直し対象 */
  const t=todayStr();
  const review=DATA.manuals.filter(needsReview)
    .sort((a,b)=>str(a.reviewDue||'9999').localeCompare(str(b.reviewDue||'9999')));
  if(review.length){
    p.appendChild(el('div',{class:'mp-ttl'},'見直し対象 '+review.length+' 件'));
    review.slice(0,4).forEach(m=>{
      const overdue=m.reviewDue&&m.reviewDue<=t;
      p.appendChild(mpRow({onclick:()=>{closeMascotPanel();openManual(m.id);}},
        el('span',{class:'t'},m.title||'(無題)'),
        el('span',{class:'m'+(overdue?' warn':'')},overdue?('期限 '+m.reviewDue):'未参照')));
    });
  }

  /* 巡回点検 */
  p.appendChild(el('div',{class:'mp-ttl'},'巡回点検'));
  const patrolBox=el('div',{});
  p.appendChild(mpRow({onclick:()=>{
    clearNode(patrolBox);
    const all=DATA.manuals.map(m=>{
      const issues=checkManualQuality(m);
      return {m:m,warn:issues.filter(x=>x.level==='warn').length,info:issues.length,
              first:issues.length?issues[0].msg:''};
    });
    const res=all.filter(x=>x.warn>0).sort((a,b)=>b.warn-a.warn);
    /* 前回との比較（点検履歴は meta.patrol にファイル永続） */
    const total=all.reduce((a,x)=>a+x.warn,0);
    const prev=DATA.meta&&DATA.meta.patrol;
    let trend='要改善 合計 '+total+' 件';
    if(prev&&typeof prev.warn==='number'&&prev.date){
      const d=total-prev.warn;
      trend+='（前回 '+prev.date+'：'+prev.warn+' 件 '+(d<0?'▼'+(-d)+' 改善':(d>0?'▲'+d+' 増加':'±0'))+'）';
    }
    patrolBox.appendChild(el('div',{class:'mp-meta'},trend));
    DATA.meta=DATA.meta||{};DATA.meta.patrol={date:todayStr(),warn:total};markChanged();
    if(!res.length){
      patrolBox.appendChild(el('div',{class:'mp-empty'},'✓ 要改善の指摘はありません。良い状態です。'));
    }else{
      res.slice(0,5).forEach(x=>{
        patrolBox.appendChild(mpRow({onclick:()=>{closeMascotPanel();pendingAutoQC=true;startEdit(x.m.id);}},
          el('span',{class:'t'},x.m.title||'(無題)'),
          el('span',{class:'m warn'},'要改善 '+x.warn)));
      });
      if(res.length>5)patrolBox.appendChild(el('div',{class:'mp-empty'},'ほか '+(res.length-5)+' 件。タップで編集画面の点検結果へ。'));
    }
    if(all.some(x=>x.info>0)){
      patrolBox.appendChild(mpRow({onclick:()=>{
        const head=['作業名','要改善','任意','主な指摘'];
        const lines=all.filter(x=>x.info>0).sort((a,b)=>b.warn-a.warn)
          .map(x=>[tsvCell(x.m.title),x.warn,x.info-x.warn,tsvCell(x.first)].join('\t'));
        saveTextFile('apis_patrol.tsv','\ufeff'+head.join('\t')+'\n'+lines.join('\n'),
          '巡回点検結果','text/tab-separated-values',['.tsv']);
      }},el('span',{class:'t'},'点検結果をTSVで保存'),el('span',{class:'m'},all.filter(x=>x.info>0).length+'件')));
    }
    apisSetMode('inspect',1600);
  }},el('span',{class:'t'},'🔍 全マニュアルを点検する'),el('span',{class:'m'},DATA.manuals.length+'件')));
  p.appendChild(patrolBox);

  /* よく使う */
  const runIds={};running.forEach(m=>runIds[m.id]=true);
  const freq=DATA.manuals.filter(m=>m.openCount>0&&!runIds[m.id])
    .sort((a,b)=>b.openCount-a.openCount).slice(0,3);
  if(freq.length){
    p.appendChild(el('div',{class:'mp-ttl'},'よく使う'));
    freq.forEach(m=>{
      p.appendChild(mpRow({onclick:()=>{closeMascotPanel();openManual(m.id);}},
        el('span',{class:'t'},m.title||'(無題)'),el('span',{class:'m'},m.openCount+'回')));
    });
  }

  /* 今日・今週の実施 */
  const tr=todayRunCount();
  const wk=weekSummary();
  if(tr>0||wk.n>0){
    let line='今日の実施：'+tr+' 件 ／ 直近7日：'+wk.n+' 件';
    if(wk.sec>0)line+='（合計所要 '+fmtDur(wk.sec)+'）';
    if(tr>0)line+='。お疲れさまです。';
    p.appendChild(el('div',{class:'mp-meta'},line));
  }

  p.appendChild(el('div',{class:'mp-tip'},'ヒント：'+MASCOT_TIPS[Math.floor(Math.random()*MASCOT_TIPS.length)]));
}

function maybeDailyGreet(){
  if(!DATA.manuals.length||!mascotEnabled())return false;
  const t=todayStr();
  DATA.meta=DATA.meta||{};
  if(DATA.meta.lastGreet===t)return false;
  DATA.meta.lastGreet=t;markChanged();
  const h=new Date().getHours();
  const g=h<11?'おはようございます。':(h<18?'こんにちは。':'こんばんは。');
  const run=DATA.manuals.filter(m=>runProgress(m)>0).length;
  const due=DATA.manuals.filter(m=>m.reviewDue&&m.reviewDue<=t).length;
  let msg=g;
  if(run)msg+='やりかけの作業が '+run+' 件あります。';
  if(due)msg+='見直し期限切れが '+due+' 件あります。';
  if(!run&&!due)msg+='今日も良い一日になりますように。';
  mascotSay(msg);
  return true;
}

/* ---------- 実行見守り（平均所要の2倍を超えたら一度だけ声かけ） ---------- */
let runWatchTimer=null,runWatchWarned=false;
function runWatchTick(){
  if(view!=='run'){if(runWatchTimer){clearInterval(runWatchTimer);runWatchTimer=null;}return false;}
  if(runWatchWarned)return false;
  const m=DATA.manuals.find(x=>x.id===currentId);
  if(!m||!m.activeRun||!m.activeRun.startedAt)return false;
  const timed=arr(m.runs).filter(r=>r.sec>0);
  if(!timed.length)return false;
  const avg=timed.reduce((a,r)=>a+r.sec,0)/timed.length;
  if(avg<120)return false; /* 平均2分未満の軽作業では声かけしない */
  if(runElapsedSec(m)>avg*2){
    runWatchWarned=true;
    mascotSay('いつもより時間がかかっています（平均 '+fmtDur(Math.round(avg))+'）。中断しても進捗は保存されています。');
    apisSetMode('inspect',1600);
    return true;
  }
  return false;
}
function ensureRunWatch(){
  runWatchWarned=false;
  if(runWatchTimer)clearInterval(runWatchTimer);
  runWatchTimer=setInterval(runWatchTick,20000);
}

/* ---------- 類似検索（もしかして） ---------- */
function bigrams(str0){
  const t=str(str0).toLowerCase().replace(/\s+/g,'');
  const out={};
  for(let i=0;i<t.length-1;i++)out[t.slice(i,i+2)]=true;
  return out;
}
function diceSim(a,b){
  const A=bigrams(a),B=bigrams(b);
  const ka=Object.keys(A),kb=Object.keys(B);
  if(!ka.length||!kb.length)return 0;
  let inter=0;ka.forEach(k=>{if(B[k])inter++;});
  return 2*inter/(ka.length+kb.length);
}
function searchSuggestions(q){
  return DATA.manuals.map(m=>{
    let sc=diceSim(q,m.title);
    arr(m.tags).forEach(t=>{sc=Math.max(sc,diceSim(q,t));});
    sc=Math.max(sc,diceSim(q,m.category));
    return {m:m,s:sc};
  }).filter(x=>x.s>=0.25).sort((a,b)=>b.s-a.s).slice(0,3);
}

}
/* ---------- 文字サイズ（閲覧・実行用、ファイルに保存） ---------- */
function fontScale(){const n=Number(DATA.settings&&DATA.settings.fontScale);return (n===1||n===2)?n:0;}
function applyFontScale(){const n=fontScale();document.body.classList.toggle('fs1',n===1);document.body.classList.toggle('fs2',n===2);}
function fontScaleLabel(){return ['文字 標準','文字 大','文字 特大'][fontScale()];}
function cycleFontScale(){DATA.settings.fontScale=(fontScale()+1)%3;applyFontScale();markChanged();render();}
const FSA=(typeof window!=='undefined')&&('showSaveFilePicker'in window)&&('showOpenFilePicker'in window);

/* ---------- データ正規化（取込時の安全化） ---------- */
function normalizeManual(m){
  m=m&&typeof m==='object'?m:{};
  const stepIds={};arr(m.steps).forEach(st=>{const k=str(st&&st.id);if(k)stepIds[k]=true;});
  return {
    id:str(m.id)||uid(),
    title:str(m.title),
    purpose:str(m.purpose),
    category:str(m.category),
    tags:arr(m.tags).map(str).filter(Boolean),
    steps:arr(m.steps).map(s=>({
      id:str(s&&s.id)||uid('st'),
      text:str(s&&s.text),
      note:str(s&&s.note),
      link:(s&&s.link&&(s.link.url||s.link.label))?{label:str(s.link.label),url:str(s.link.url)}:null,
      image:(s&&s.image&&s.image.data)?{data:str(s.image.data),w:Number(s.image.w)||0,h:Number(s.image.h)||0}:null
    })),
    references:arr(m.references).map(r=>({label:str(r&&r.label),url:str(r&&r.url),image:(r&&r.image&&r.image.data)?{data:str(r.image.data),w:Number(r.image.w)||0,h:Number(r.image.h)||0}:null})),
    related:arr(m.related).map(str),
    favorite:!!m.favorite,
    pinned:!!m.pinned,
    openCount:Number(m.openCount)||0,
    lastOpenedAt:str(m.lastOpenedAt),
    reviewDue:str(m.reviewDue),
    owner:str(m.owner),
    dept:str(m.dept),
    status:['draft','published','archived'].indexOf(str(m.status))>=0?str(m.status):'published',
    revisions:arr(m.revisions).map(rv=>({at:str(rv&&rv.at),by:str(rv&&rv.by),note:str(rv&&rv.note)})),
    runs:arr(m.runs).map(rn=>({at:str(rn&&rn.at),sec:Number(rn&&rn.sec)||0})),
    activeRun:(m.activeRun&&typeof m.activeRun==='object'&&m.activeRun.checked&&typeof m.activeRun.checked==='object')
      ?{checked:Object.keys(m.activeRun.checked).reduce((o,k)=>{if(m.activeRun.checked[k]&&stepIds[k])o[k]=true;return o;},{}),
        startedAt:str(m.activeRun.startedAt),updatedAt:str(m.activeRun.updatedAt),
        accSec:Math.max(0,Math.round(Number(m.activeRun.accSec)||0))}
      :null,
    createdAt:str(m.createdAt)||nowIso(),
    updatedAt:str(m.updatedAt)||nowIso()
  };
}
function normalizeData(d){
  d=d&&typeof d==='object'?d:{};
  return {
    schemaVersion:SCHEMA,
    manuals:arr(d.manuals).map(normalizeManual),
    settings:Object.assign({rememberHandle:false},d.settings&&typeof d.settings==='object'?d.settings:{}),
    templates:arr(d.templates).map(normalizeTemplate),
    meta:Object.assign({},d.meta&&typeof d.meta==='object'?d.meta:{})
  };
}
function serialize(){
  DATA.meta=DATA.meta||{};DATA.meta.savedAt=nowIso();DATA.schemaVersion=SCHEMA;
  return JSON.stringify(DATA,null,2);
}

/* ---------- IndexedDB（保存先ハンドルの参照のみ。機密データは保存しない） ---------- */
const IDB_NAME='manual_tool_handle';
function idbOpen(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(IDB_NAME,1);
    r.onupgradeneeded=()=>{r.result.createObjectStore('kv');};
    r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);
  });
}
async function idbSet(key,val){try{const db=await idbOpen();await new Promise((res,rej)=>{const tx=db.transaction('kv','readwrite');tx.objectStore('kv').put(val,key);tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});}catch(e){}}
async function idbGet(key){try{const db=await idbOpen();return await new Promise((res,rej)=>{const tx=db.transaction('kv','readonly');const q=tx.objectStore('kv').get(key);q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error);});}catch(e){return undefined;}}
async function idbDel(key){try{const db=await idbOpen();await new Promise((res)=>{const tx=db.transaction('kv','readwrite');tx.objectStore('kv').delete(key);tx.oncomplete=res;tx.onerror=res;});}catch(e){}}

/* ---------- 保存状態表示 ---------- */
function setBadge(state){
  const b=$('saveBadge');if(!b)return;
  b.className='savebadge '+state;
  b.textContent= state==='saved'?'保存済み': state==='dirty'?'未保存': state==='off'?(FSA?'未接続':'保存不可環境'):'…';
}

/* ---------- 自動保存 ---------- */
let saveTimer=null;
function markChanged(){
  dirty=true;
  if(fileHandle){setBadge('dirty');scheduleSave();}
  else{setBadge('off');}
}
function scheduleSave(){
  if(!fileHandle)return;
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(writeToHandle,450);
}
async function writeToHandle(){
  if(!fileHandle)return false;
  try{
    const perm=await ensureWritePermission(fileHandle);
    if(!perm){setBadge('dirty');notify('保存先への書込み許可がありません。設定から再接続してください。','warn');return false;}
    const w=await fileHandle.createWritable();
    await w.write(serialize());
    await w.close();
    dirty=false;setBadge('saved');
    return true;
  }catch(e){
    dirty=true;setBadge('dirty');notify('保存に失敗しました。設定から保存先を再指定してください。','bad');
    return false;
  }
}
async function ensureWritePermission(handle){
  try{
    if(!handle.queryPermission)return true;
    const opts={mode:'readwrite'};
    if(await handle.queryPermission(opts)==='granted')return true;
    if(await handle.requestPermission(opts)==='granted')return true;
    return false;
  }catch(e){return false;}
}

/* ---------- ファイル操作（FSA） ---------- */
async function pickSaveFile(){
  if(!FSA){fallbackExport();return;}
  try{
    const h=await window.showSaveFilePicker({
      suggestedName:'manuals.json',
      types:[{description:'マニュアルデータ',accept:{'application/json':['.json']}}]
    });
    fileHandle=h;
    await writeToHandle();
    await rememberMaybe();
    notify('保存先を設定しました。以降は自動保存されます。');
  }catch(e){ if(e&&e.name!=='AbortError')notify('保存先の指定をキャンセルしました。'); }
}
async function pickOpenFile(){
  if(!FSA){$('filePick').dataset.mode='replace';$('filePick').click();return;}
  try{
    const [h]=await window.showOpenFilePicker({types:[{description:'マニュアルデータ',accept:{'application/json':['.json']}}]});
    const f=await h.getFile();
    const text=await f.text();
    loadFromText(text,false);
    fileHandle=h;
    dirty=false;setBadge('saved');
    await rememberMaybe();
    notify('読み込みました。以降は同じファイルへ自動保存されます。');
  }catch(e){ if(e&&e.name!=='AbortError')notify('読み込みをキャンセル、または失敗しました。','warn'); }
}
function loadFromText(text,merge){
  let parsed;
  try{parsed=JSON.parse(text);}catch(e){notify('JSONの解析に失敗しました。ファイルが壊れている可能性があります。','bad');return false;}
  const nd=normalizeData(parsed);
  if(merge){
    const existing=new Set(DATA.manuals.map(m=>m.id));
    const idMap={};
    nd.manuals.forEach(m=>{ if(existing.has(m.id)){const nid=uid();idMap[m.id]=nid;m.id=nid;} existing.add(m.id); });
    /* 再採番に追随して取込バッチ内のrelated参照を付け替える */
    nd.manuals.forEach(m=>{ m.related=arr(m.related).map(rid=>idMap[rid]||rid); });
    nd.manuals.forEach(m=>DATA.manuals.push(m));
    markChanged();
  }else{
    DATA=nd;
  }
  if(DATA.settings&&typeof DATA.settings.rememberHandle==='boolean'){$('rememberHandle').checked=DATA.settings.rememberHandle;}
  render();
  if(!merge)setTimeout(maybeDailyGreet,600);
  return true;
}
async function rememberMaybe(){
  if(!FSA)return;
  if($('rememberHandle').checked&&fileHandle){ try{await idbSet('handle',fileHandle);}catch(e){} }
  else{ await idbDel('handle'); }
}

async function saveTextFile(suggestedName, text, desc, mime, exts){
  if(FSA){
    try{
      const h=await window.showSaveFilePicker({suggestedName:suggestedName,
        types:[{description:desc,accept:(function(){const o={};o[mime]=exts;return o;})()}]});
      const w=await h.createWritable();await w.write(text);await w.close();
      notify('「'+suggestedName+'」を保存しました。');
      return true;
    }catch(e){
      if(e&&e.name==='AbortError')return false;
      notify('保存に失敗しました。','bad');return false;
    }
  }
  $('textoutTitle').textContent=suggestedName;
  $('textoutNote').textContent='この環境ではファイル保存ダイアログが使えません。「全選択」→ Ctrl+C でコピーし、メモ帳等に貼り付けて上記の名前で保存してください。';

  $('textoutModal').classList.add('show');
  return false;
}

/* ---------- 取込プレビュー（無確認追記の廃止） ---------- */
let pendingImportText=null;
function showImportPreview(text){
  let parsed;
  try{parsed=JSON.parse(text);}catch(e){notify('JSONの解析に失敗しました。ファイルが壊れている可能性があります。','bad');return;}
  const nd=normalizeData(parsed);
  if(!nd.manuals.length){notify('取り込めるマニュアルがありません。','warn');return;}
  pendingImportText=text;
  const exIds=new Set(DATA.manuals.map(m=>m.id));
  const exTitles=new Set(DATA.manuals.map(m=>str(m.title)));
  const dupId=nd.manuals.filter(m=>exIds.has(m.id)).length;
  const dupTitle=nd.manuals.filter(m=>m.title&&exTitles.has(str(m.title))).length;
  const sm=$('importSummary');clearNode(sm);
  sm.appendChild(el('div',{},nd.manuals.length+' 件を現在の '+DATA.manuals.length+' 件に追記します。'));
  if(dupId)sm.appendChild(el('div',{},'・ID重複 '+dupId+' 件 → 自動で別IDに振り直します（既存は変更しません）'));
  if(dupTitle)sm.appendChild(el('div',{style:{color:'var(--warn)'}},'・同名タイトル '+dupTitle+' 件 → 重複登録になります。取込後に整理してください'));
  const ls=$('importList');clearNode(ls);
  nd.manuals.slice(0,8).forEach(m=>{
    ls.appendChild(el('div',{class:'mp-row',style:{cursor:'default'}},
      el('span',{class:'t'},m.title||'(無題)'),
      el('span',{class:'m'},'手順 '+m.steps.length+'件'+(m.title&&exTitles.has(str(m.title))?'｜同名':''))));
  });
  if(nd.manuals.length>8)ls.appendChild(el('div',{class:'mp-empty'},'ほか '+(nd.manuals.length-8)+' 件'));
  $('importModal').classList.add('show');
}
function closeImportPreview(){pendingImportText=null;$('importModal').classList.remove('show');}
function confirmImport(){
  if(!pendingImportText)return;
  const before=DATA.manuals.length;
  const ok=loadFromText(pendingImportText,true);
  closeImportPreview();
  if(ok)notify((DATA.manuals.length-before)+' 件を取り込みました。');
}

/* ---------- 実施記録の月次集計TSV ---------- */
function exportRunsMonthlyTsv(){
  const agg={}; /* 'YYYY-MM\u0000title' -> {n,sec} */
  DATA.manuals.forEach(m=>arr(m.runs).forEach(r=>{
    const ym=localYmStr(r.at);
    if(!/^\d{4}-\d{2}$/.test(ym))return;
    const k=ym+'\u0000'+(m.title||'(無題)');
    if(!agg[k])agg[k]={n:0,sec:0};
    agg[k].n++;agg[k].sec+=(r.sec>0?r.sec:0);
  }));
  const keys=Object.keys(agg);
  if(!keys.length){notify('実施記録がまだありません。','warn');return;}
  keys.sort((a,b)=>{
    const [ya,ta]=a.split('\u0000'),[yb,tb]=b.split('\u0000');
    if(ya!==yb)return yb.localeCompare(ya);          /* 年月 降順 */
    const d=agg[b].n-agg[a].n;                        /* 回数 降順 */
    return d!==0?d:ta.localeCompare(tb);
  });
  const head=['年月','作業名','実施回数','合計所要(分)','平均所要(分)'];
  const lines=keys.map(k=>{
    const [ym,title]=k.split('\u0000');const v=agg[k];
    const tot=v.sec>0?Math.max(1,Math.round(v.sec/60)):'';
    const av=v.sec>0?Math.max(1,Math.round(v.sec/v.n/60)):'';
    return [tsvCell(ym),tsvCell(title),v.n,tot,av].join('\t');
  });
  saveTextFile('runs_monthly.tsv','\ufeff'+head.join('\t')+'\n'+lines.join('\n'),
    '実施記録（月次集計）','text/tab-separated-values',['.tsv']);
}

/* ---------- 検索 ---------- */
function manualHaystack(m){
  return [m.title,m.purpose,m.category,m.tags.join(' '),
    m.steps.map(s=>s.text+' '+s.note+' '+(s.link?s.link.label:'')).join(' '),
    m.references.map(r=>r.label+' '+r.url).join(' ')].join(' ').toLowerCase();
}
function needsReview(m){
  const t=todayStr();
  if(m.reviewDue&&m.reviewDue<=t)return true;
  const ref=m.lastOpenedAt||formatDate(m.createdAt);
  return daysSince(ref)>STALE_DAYS;
}
function filterManuals(){
  const q=query.trim().toLowerCase();
  let list=DATA.manuals.slice();
  if(q){ const terms=q.split(/\s+/).filter(Boolean); list=list.filter(m=>{const h=manualHaystack(m);return terms.every(t=>h.indexOf(t)>=0);}); }
  if(catFilter)list=list.filter(m=>str(m.category)===catFilter);
  if(reviewOnly)list=list.filter(needsReview);
  list.sort(sorter);
  return list;
}
function sorter(a,b){
  if(a.pinned!==b.pinned)return a.pinned?-1:1;
  const ap=runProgress(a)>0,bp=runProgress(b)>0;
  if(ap!==bp)return ap?-1:1;
  if(sortMode==='name')return a.title.localeCompare(b.title,'ja');
  if(sortMode==='updated')return str(b.updatedAt).localeCompare(str(a.updatedAt));
  if(sortMode==='fav'){ if(a.favorite!==b.favorite)return a.favorite?-1:1; }
  /* freq（既定）／fav の二次キー */
  if(b.openCount!==a.openCount)return b.openCount-a.openCount;
  return str(b.lastOpenedAt).localeCompare(str(a.lastOpenedAt));
}
/* ハイライト（DOMで構築・innerHTML不使用） */
function highlightInto(parent,text,terms){
  text=str(text);
  if(!terms||!terms.length){parent.appendChild(document.createTextNode(text));return;}
  const low=text.toLowerCase();
  const marks=[];
  terms.forEach(t=>{ if(!t)return; let i=0; while((i=low.indexOf(t,i))>=0){marks.push([i,i+t.length]);i+=t.length;} });
  if(!marks.length){parent.appendChild(document.createTextNode(text));return;}
  marks.sort((a,b)=>a[0]-b[0]);
  const merged=[];marks.forEach(m=>{const last=merged[merged.length-1];if(last&&m[0]<=last[1]){last[1]=Math.max(last[1],m[1]);}else merged.push(m.slice());});
  let pos=0;
  merged.forEach(([s,e])=>{
    if(s>pos)parent.appendChild(document.createTextNode(text.slice(pos,s)));
    parent.appendChild(el('mark',{text:text.slice(s,e)}));
    pos=e;
  });
  if(pos<text.length)parent.appendChild(document.createTextNode(text.slice(pos)));
}

/* ---------- P2 helpers ---------- */
function formatDate(iso){const s=str(iso);if(!s)return '';const d=new Date(s);if(isNaN(d.getTime()))return s.slice(0,10);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function daysSince(ds){if(!ds)return Infinity;const d=new Date(str(ds).slice(0,10)+'T00:00:00');if(isNaN(d.getTime()))return Infinity;return Math.floor((Date.now()-d.getTime())/86400000);}
const STALE_DAYS=180;
function approxBytes(){return serialize().length;}
function imageBytes(){let n=0;DATA.manuals.forEach(m=>{m.steps.forEach(s=>{if(s.image&&s.image.data)n+=s.image.data.length;});m.references.forEach(r=>{if(r.image&&r.image.data)n+=r.image.data.length;});});return n;}
function fmtBytes(b){return b>1048576?(Math.round(b/104857.6)/10+' MB'):b>1024?(Math.round(b/102.4)/10+' KB'):b+' B';}
function pickImage(cb){
  const inp=el('input',{type:'file',accept:'image/*',style:{display:'none'}});
  document.body.appendChild(inp);
  inp.addEventListener('change',()=>{const f=inp.files&&inp.files[0];try{document.body.removeChild(inp);}catch(e){}if(f)downscaleImage(f,cb);});
  inp.click();
}
function downscaleImage(file,cb){
  const MAXEDGE=1280,rd=new FileReader();
  rd.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const w=img.naturalWidth||img.width,h=img.naturalHeight||img.height;
      const scale=Math.min(1,MAXEDGE/Math.max(w,h||1));
      const tw=Math.max(1,Math.round(w*scale)),th=Math.max(1,Math.round(h*scale));
      let data;
      try{const cv=document.createElement('canvas');cv.width=tw;cv.height=th;cv.getContext('2d').drawImage(img,0,0,tw,th);data=cv.toDataURL('image/jpeg',0.82);}
      catch(e){data=str(rd.result);}
      if(scale<1)notify('画像を縮小して取り込みました（長辺'+MAXEDGE+'px）。');
      else if(data.length>400000)notify('画像が大きめです。容量にご注意ください。','warn');
      cb({data:data,w:tw,h:th});
    };
    img.onerror=()=>notify('画像を読み込めませんでした。','bad');
    img.src=str(rd.result);
  };
  rd.onerror=()=>notify('画像の読み込みに失敗しました。','bad');
  rd.readAsDataURL(file);
}
function tsvCell(v){return str(v).replace(/[\t\r\n]+/g,' ').trim();}
function exportIndexTsv(){

function runProgress(m){
  if(!m||!m.activeRun||!m.activeRun.checked)return 0;
  return m.steps.filter(st=>m.activeRun.checked[st.id]).length;

/* ---------- 実行セッション計時 ----------
   所要は「実行画面を開いていた時間」の累積（activeRun.accSec）。
   startedAt一発算だと中断→翌日再開で86,400秒超が混入し
   平均所要・見守り・経過表示を全部汚染するため廃止した。 */
let runSessionStart=0;
function flushRunSession(){
  if(!runSessionStart)return;
  const m=DATA.manuals.find(x=>x.id===currentId);
  if(m&&m.activeRun){
    m.activeRun.accSec=(m.activeRun.accSec||0)+Math.max(0,Math.round((Date.now()-runSessionStart)/1000));
    markChanged();
  }
  runSessionStart=0;
}
function runElapsedSec(m){
  let sec=(m&&m.activeRun&&m.activeRun.accSec)||0;
  if(runSessionStart&&view==='run'&&m&&m.id===currentId){
    sec+=Math.max(0,Math.round((Date.now()-runSessionStart)/1000));
  }
  return sec;
}
function recordRun(m){
  flushRunSession();
  const sec=(m.activeRun&&m.activeRun.accSec)||0;
  m.runs=arr(m.runs);m.runs.push({at:nowIso(),sec:sec});
  m.lastOpenedAt=todayStr();m.activeRun=null;
  markChanged();
  mascotReact('happy');
}
function fmtDur(sec){
  if(!sec||sec<60)return '1分未満';
  const mn=Math.round(sec/60);
  if(mn<60)return mn+'分';
  return Math.floor(mn/60)+'時間'+(mn%60?(mn%60+'分'):'');
}

function setView(v){
  const prev=view;
  if(prev==='run'&&v!=='run'){flushRunSession();releaseWakeLock();}
  view=v;
  if(prev!=='run'&&v==='run'){runSessionStart=Date.now();ensureWakeLock();}
  $('listView').style.display=v==='list'?'':'none';
  $('detailView').style.display=v==='detail'?'':'none';
  $('editView').style.display=v==='edit'?'':'none';
  $('runView').style.display=v==='run'?'':'none';
  $('toolbar').style.display=v==='list'?'':'none';
  $('catbar').style.display='none';
  $('countline').style.display='none';
  $('reviewbar').style.display='none';
}
function render(){
  applyFontScale();

function refAnchor(label,url){
  const k=linkKind(url);
  if(k.safe&&k.href){
    const a=el('a',{href:k.href,target:'_blank',rel:'noopener noreferrer',text:label||url});
    a.appendChild(el('span',{class:'linkkind',text:k.code}));
    return a;
  }
  const span=el('span',{text:label||url||''});
  span.appendChild(el('span',{class:'linkkind bad',text:k.code}));
  span.appendChild(el('span',{class:'snote',style:{fontStyle:'italic',display:'inline',marginLeft:'6px'},text:'（'+k.label+'）'}));
  return span;
}

/* ---------- 実行（チェックリスト）モード ---------- */
function startRun(id){
  const m=DATA.manuals.find(x=>x.id===id);if(!m)return;
  currentId=id;
  if(!m.activeRun){m.activeRun={checked:{},startedAt:nowIso(),updatedAt:nowIso()};markChanged();}
  ensureRunWatch();
  renderRun();
}
function renderRun(){
  setView('run');
  const m=DATA.manuals.find(x=>x.id===currentId);
  const root=$('runView');clearNode(root);
  if(!m){root.appendChild(el('div',{class:'empty'},'マニュアルが見つかりません。'));return;}
  if(!m.activeRun){m.activeRun={checked:{},startedAt:nowIso(),updatedAt:nowIso()};markChanged();}

  root.appendChild(el('div',{class:'backrow'},
    el('button',{class:'mini',onclick:renderDetail},'← 詳細へ'),
    el('button',{class:'mini',onclick:()=>{m.activeRun={checked:{},startedAt:nowIso(),updatedAt:nowIso()};markChanged();renderRun();}},'最初からやり直す'),
    el('button',{class:'mini danger',onclick:()=>{

    }},'実行を破棄'),
    el('button',{class:'mini',title:'本文の文字サイズを切り替え',onclick:cycleFontScale},fontScaleLabel())
  ));
  const panel=el('div',{class:'panel'});
  panel.appendChild(el('h2',{text:m.title||'(無題)'}));
  panel.appendChild(el('div',{class:'runsub'},'完了した手順をチェックしてください。進捗は自動保存され、途中で閉じても続きから再開できます。気づいた点は各手順の ✎ からその場で加筆できます。'));
  const total=m.steps.length;
  const bar=el('div',{class:'progress'},el('div',{class:'progfill'}));
  const cnt=el('div',{class:'progtext'});
  const nextline=el('div',{class:'nextline'});
  const list=el('div',{class:'runsteps'});
  const completeBtn=el('button',{class:'gold',onclick:()=>{
    recordRun(m);notify('実施を記録しました。');renderDetail();
  }},'実施完了を記録');
  /* 次のフロー（関連マニュアル） */
  const nextflow=el('div',{class:'nextflow'});
  const relValid=arr(m.related).map(findManual).filter(Boolean);
  if(relValid.length){
    nextflow.appendChild(el('div',{class:'nfttl'},'次のフロー'));
    const row=el('div',{class:'meta'});
    relValid.forEach(tm=>{
      const dn=runProgress(tm);
      row.appendChild(el('button',{class:'mini',onclick:()=>{
        recordRun(m);notify('実施を記録し、次のフローを開始しました。');startRun(tm.id);
      }},'▶ '+(tm.title||'(無題)')+(dn>0?('（再開 '+dn+'/'+tm.steps.length+'）'):'')));
    });
    nextflow.appendChild(row);
    nextflow.appendChild(el('div',{class:'snote',style:{fontStyle:'normal',marginTop:'7px'},text:'押すと現在の実施を記録してから次を開始します。'}));
  }
  function refresh(){
    const done=m.steps.filter(st=>ar.checked[st.id]).length;
    bar.firstChild.style.width=(total?Math.round(done/total*100):0)+'%';
    const finished=(total>0&&done===total);
    cnt.textContent=done+' / '+total+' 完了';
    clearNode(nextline);
    if(finished){
      nextline.appendChild(el('span',{class:'nextdone'},'✓ すべて完了 — 下のボタンで実施を記録してください。'));

      const ni=m.steps.findIndex(st=>!ar.checked[st.id]);

      nextline.appendChild(el('button',{class:'nextstep',onclick:()=>{const r=list.children[ni];if(r)r.scrollIntoView({block:'center',behavior:'smooth'});}},

      ));
    }
    completeBtn.disabled=!finished;
    nextflow.style.display=(finished&&relValid.length)?'block':'none';

  m.steps.forEach((st,i)=>{
    const cb=el('input',{type:'checkbox'});

    function drawRowView(){
      clearNode(rt);
      rt.appendChild(el('div',{class:'stext',text:expandTokens(st.text||'')}));

      if(st.image&&st.image.data)rt.appendChild(el('img',{class:'stepimg',src:st.image.data,alt:''}));
    }
    function drawRowEdit(){
      clearNode(rt);
      const tIn=el('textarea',{class:'fld grow',rows:2,placeholder:'手順の内容'},st.text||'');
      const nIn=el('textarea',{class:'fld grow',rows:1,style:{marginTop:'6px'},placeholder:'補足（任意）'},st.note||'');
      tIn.addEventListener('input',()=>autoGrow(tIn));
      nIn.addEventListener('input',()=>autoGrow(nIn));
      const saveB=el('button',{class:'mini',onclick:e=>{
        e.preventDefault();e.stopPropagation();
        st.text=tIn.value;st.note=nIn.value;
        m.updatedAt=nowIso();markChanged();
        notify('手順を更新しました。');
        drawRowView();refresh();
      }},'反映');
      const cancB=el('button',{class:'mini',onclick:e=>{e.preventDefault();e.stopPropagation();drawRowView();}},'取消');
      rt.appendChild(tIn);rt.appendChild(nIn);
      rt.appendChild(el('div',{class:'rowedit'},saveB,cancB));
      setTimeout(()=>{autoGrow(tIn);autoGrow(nIn);tIn.focus();},0);

/* ---------- 品質チェック（ルールベース・外部通信なし） ---------- */
const VAGUE_WORDS=['適宜','必要に応じて','適切に','速やかに','きちんと','しっかり','うまく','ちゃんと'];
function checkManualQuality(m){
  const issues=[];
  const add=(level,msg,stepIndex)=>issues.push({level:level,msg:msg,stepIndex:(typeof stepIndex==='number')?stepIndex:null});
  if(!str(m.title).trim())add('warn','作業名が未記入です。');
  if(!str(m.purpose).trim())add('warn','目的が未記入です。「何のための作業か」を1〜2文で書くと判断に迷いません。');
  if(!m.steps.length)add('warn','手順が登録されていません。');
  m.steps.forEach((st,i)=>{
    const t=str(st.text);
    if(!t.trim()){add('warn','本文が空です。',i);return;}
    if(t.length>80)add('warn','文が長め（'+t.length+'字）です。1手順1動作に分割すると追いやすくなります。',i);
    const acts=(t.match(/し、|して、|したら、/g)||[]).length;
    if(acts>=2)add('warn','複数の動作が1手順に詰まっています。分割を検討してください。',i);
    VAGUE_WORDS.forEach(v=>{if(t.indexOf(v)>=0)add('info','「'+v+'」は読み手により解釈が割れます。具体的な条件・数値に置き換えられないか検討。',i);});
    if(st.link&&st.link.url){const k=linkKind(st.link.url);if(!k.safe)add('warn','リンクが無効な形式（'+k.label+'）です。',i);}
    if(!st.image&&/画面|ボタン|クリック|メニュー|タブ|アイコン/.test(t))add('info','画面操作の手順です。スクリーンショットを添付すると迷いが減ります。',i);
  });
  if(m.steps.length){
    const all=m.steps.map(st=>str(st.text)+' '+str(st.note)).join(' ');
    if(!/確認|検算|照合|チェック|点検/.test(all))add('info','結果を確認する手順が見当たりません。最後に確認手順を置くと品質が安定します。');
    if(!/前提|準備|権限|様式|必要なもの|用意/.test(all+' '+str(m.purpose)))add('info','前提条件（必要な権限・様式・環境）の記載が見当たりません。');
    if(m.steps.length>=3&&!/場合|とき|エラー|不備|できない|誤り/.test(all))add('info','例外時（エラー・不備があった場合）の対応が見当たりません。');
  }
  m.references.forEach(r=>{
    if(r.url){const k=linkKind(r.url);if(!k.safe)add('warn','参考情報「'+(str(r.label)||str(r.url))+'」のリンクが無効な形式です。');}
  });
  if(!str(m.category).trim()&&!m.tags.length)add('info','分類もタグも未設定です。検索性のため、どちらかの設定を推奨します。');
  if(!m.reviewDue)add('info','見直し予定日が未設定です。');
  return issues;
}

/* ---------- 編集 ---------- */
function autoGrow(t){t.style.height='auto';t.style.height=Math.min(t.scrollHeight+2,420)+'px';}
function blankManual(){return normalizeManual({status:'published'});}

/* ---------- 動的トークン（表示時展開・原文は保持） ---------- */
function expandTokens(t){
  t=str(t);
  if(t.indexOf('{{')<0)return t;
  const now=new Date();
  const y=now.getFullYear(),mo=now.getMonth()+1,d=now.getDate();
  const fy=(mo>=4)?y:y-1;                 /* 年度（4月始まり） */
  const wy=y-2018,wfy=fy-2018;            /* 令和（2019=元年） */
  const wEra=n=>'令和'+(n===1?'元':n);
  const pad=n=>(n<10?'0':'')+n;
  const map={
    '今日':y+'-'+pad(mo)+'-'+pad(d),
    '年':String(y),'月':String(mo),'日':String(d),
    '曜日':['日','月','火','水','木','金','土'][now.getDay()],
    '時刻':pad(now.getHours())+':'+pad(now.getMinutes()),
    '年度':String(fy),
    '和暦年度':wEra(wfy)+'年度',
    '和暦':wEra(wy)+'年'
  };
  return t.replace(/\{\{(今日|和暦年度|和暦|年度|曜日|時刻|年|月|日)\}\}/g,(_,k)=>map[k]);
}

/* ---------- ユーザー定義雛形 ---------- */
function normalizeTemplate(t){
  t=t&&typeof t==='object'?t:{};
  const m=normalizeManual(t.manual);
  /* 雛形は構造のみ保持（履歴・画像・実績は持たない） */
  m.runs=[];m.revisions=arr(m.revisions).slice(0,0);m.openCount=0;m.lastOpenedAt='';m.activeRun=null;
  m.steps=m.steps.map(st=>({id:st.id,text:st.text,note:st.note,link:st.link,image:null}));
  m.references=m.references.map(r=>({label:r.label,url:r.url,image:null}));
  return {id:str(t.id)||uid('tpl'),name:str(t.name)||'(無名の雛形)',manual:m};
}
function saveAsTemplate(id){
  const m=findManual(id);if(!m)return;
  DATA.templates=arr(DATA.templates);
  let name=str(m.title).trim()||'(無題)';
  const names=new Set(DATA.templates.map(t=>t.name));
  if(names.has(name)){let k=2;while(names.has(name+'（'+k+'）'))k++;name=name+'（'+k+'）';}
  DATA.templates.push(normalizeTemplate({id:uid('tpl'),name:name,manual:JSON.parse(JSON.stringify(m))}));
  markChanged();
  notify('雛形「'+name+'」として保存しました。「雛形から」で呼び出せます。');
}
function applyTemplate(t){
  const src=normalizeTemplate(t).manual;
  const d=blankManual();
  d.title=src.title;d.purpose=src.purpose;d.category=src.category;d.tags=src.tags.slice();
  d.steps=src.steps.map(st=>({id:uid('st'),text:st.text,note:st.note,link:st.link?{label:st.link.label,url:st.link.url}:null,image:null}));
  d.references=src.references.map(r=>({label:r.label,url:r.url,image:null}));
  editDraft=d;
  $('tplModal').classList.remove('show');
  renderEdit();

  const tpls=arr(DATA.templates);

    editDraft=blankManual();editDraft.steps=templateSteps();renderEdit();return;
  }

      style:{flex:'none',alignSelf:'center'},

/* ---------- Wake Lock（実行中の画面スリープ防止・非対応は無視） ---------- */
let wakeLock=null;
async function ensureWakeLock(){
  if(!('wakeLock' in navigator))return;
  try{
    if(wakeLock)return;
    wakeLock=await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release',()=>{wakeLock=null;});
  }catch(e){wakeLock=null;}
}
function releaseWakeLock(){
  if(wakeLock){try{wakeLock.release();}catch(e){}wakeLock=null;}
}

function selfCheck(){
  const issues=[];const ids={};
  DATA.manuals.forEach(m=>{ids[m.id]=(ids[m.id]||0)+1;});
  if(Object.keys(ids).filter(k=>ids[k]>1).length)issues.push('重複IDがあります');
  const noTitle=DATA.manuals.filter(m=>!str(m.title).trim()).length;
  if(noTitle)issues.push('作業名が空のものが '+noTitle+' 件');
  const tmap={};DATA.manuals.forEach(m=>{const k=normTitle(m.title);if(k)tmap[k]=(tmap[k]||0)+1;});
  const dupTitle=Object.keys(tmap).filter(k=>tmap[k]>1).length;
  if(dupTitle)issues.push('作業名が重複している組が '+dupTitle+' 組');
  let orphan=0;DATA.manuals.forEach(m=>{arr(m.related).forEach(rid=>{if(!findManual(rid))orphan++;});});
  if(orphan)issues.push('参照先が見つからない関連リンクが '+orphan+' 件');
  const bytes=approxBytes();if(bytes>3145728)issues.push('データ量が大きい（'+fmtBytes(bytes)+'）');
  return issues;
}
function runSelfCheck(){
  const out=$('diagOut');if(!out)return;
  clearNode(out);
  const issues=selfCheck();

  out.appendChild(el('div',{},'点検結果（'+issues.length+'件）：'));
  const ul=el('ul',{style:{margin:'5px 0 0',paddingLeft:'18px'}});
  issues.forEach(i=>ul.appendChild(el('li',{text:i})));
  out.appendChild(ul);
}
