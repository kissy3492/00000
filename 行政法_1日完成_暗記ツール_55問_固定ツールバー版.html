<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>行政法 1日完成 暗記ツール 55問 固定ツールバー版</title>
<style>
:root {
  --bg:#f6f7fb;
  --panel:#ffffff;
  --ink:#172033;
  --muted:#617089;
  --line:#d9e0eb;
  --main:#1f4f8f;
  --main2:#eef5ff;
  --hot:#b42318;
  --ok:#137333;
  --shadow:0 12px 30px rgba(20,32,55,.09);
  --radius:18px;
}
* { box-sizing:border-box; }
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.65;
}
header {
  position:sticky;
  top:0;
  z-index:10;
  background:rgba(246,247,251,.92);
  backdrop-filter: blur(10px);
  border-bottom:1px solid var(--line);
}
.wrap {
  max-width:1240px;
  margin:0 auto;
  padding:18px;
}
h1 {
  margin:0 0 6px;
  font-size:clamp(22px,3vw,34px);
  line-height:1.2;
}
.lead { margin:0; color:var(--muted); }
.tabs {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:14px;
}
button, select, textarea, input { font:inherit; }
button {
  border:1px solid var(--line);
  background:#fff;
  color:var(--ink);
  padding:9px 13px;
  border-radius:12px;
  cursor:pointer;
  min-height:42px;
}
button:hover { border-color:#9db5da; }
button.primary {
  background:var(--main);
  border-color:var(--main);
  color:#fff;
}
button.hot {
  background:#fff2f1;
  border-color:#f5b5af;
  color:#7d1a12;
}
button.ok {
  background:#eefbf2;
  border-color:#a8dfb7;
  color:#0d5d2a;
}
button.active {
  background:var(--main);
  border-color:var(--main);
  color:#fff;
}
.grid {
  display:grid;
  grid-template-columns: 300px 1fr;
  gap:18px;
  align-items:start;
}
@media (max-width: 860px) {
  .grid { grid-template-columns:1fr; }
  header { position:relative; }
}
.panel {
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px;
}
.side {
  position:sticky;
  top:118px;
}
@media (max-width: 860px) {
  .side { position:static; }
}
.kpi {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.kpi div {
  background:var(--main2);
  border-radius:14px;
  padding:12px;
}
.kpi strong {
  display:block;
  font-size:24px;
  line-height:1.1;
}
label {
  display:block;
  color:var(--muted);
  font-size:13px;
  margin:12px 0 4px;
}
select, textarea, input[type="search"] {
  width:100%;
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px;
  background:#fff;
}
textarea {
  min-height:170px;
  resize:vertical;
}
.pillrow {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:10px 0;
}
.badge {
  display:inline-block;
  padding:3px 9px;
  border-radius:999px;
  font-size:12px;
  border:1px solid var(--line);
  background:#fff;
  color:var(--muted);
}
.badge.hot { color:#7d1a12; background:#fff2f1; border-color:#f5b5af; }
.badge.ok { color:#0d5d2a; background:#eefbf2; border-color:#a8dfb7; }
.card-title {
  font-size:25px;
  margin:10px 0;
  line-height:1.35;
}
.question {
  font-size:20px;
  background:#f8fbff;
  border:1px solid #dce9fb;
  border-radius:16px;
  padding:15px;
}
.answer {
  background:#fffdf6;
  border:1px solid #f1dfaa;
  border-radius:16px;
  padding:15px;
  margin-top:14px;
}
.meta {
  color:var(--muted);
  font-size:14px;
}
.hidden { display:none !important; }
hr {
  border:0;
  border-top:1px solid var(--line);
  margin:16px 0;
}
.keyword-list {
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin:8px 0;
}
.kw {
  border-radius:999px;
  padding:4px 9px;
  font-size:13px;
  border:1px solid var(--line);
  background:#fff;
}
.kw.hit {
  background:#e9f8ee;
  border-color:#a8dfb7;
  color:#0d5d2a;
}
.kw.miss {
  background:#fff2f1;
  border-color:#f2aaa4;
  color:#8a1c13;
}
.schedule {
  display:grid;
  grid-template-columns: 150px 1fr;
  gap:10px;
}
.schedule div {
  padding:10px;
  border-bottom:1px solid var(--line);
}
.schedule .time {
  font-weight:700;
  color:var(--main);
}
pre.lecture {
  white-space:pre-wrap;
  word-break:break-word;
  font-size:18px;
  line-height:2.05;
  background:#fbfcff;
  border:1px solid var(--line);
  border-radius:16px;
  padding:18px;
  max-height:72vh;
  overflow:auto;
}
.list {
  display:grid;
  gap:10px;
}
.item {
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  background:#fff;
}
.item button { margin-top:8px; }
.progressbar {
  height:12px;
  background:#e6edf7;
  border-radius:999px;
  overflow:hidden;
  margin-top:10px;
}
.progressbar span {
  display:block;
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#1f4f8f,#2e7d32);
}
.small {
  font-size:13px;
  color:var(--muted);
}
.footer-note {
  color:var(--muted);
  font-size:12px;
  margin-top:16px;
}

/* 固定ツールバー版：画面下部に主要操作を常時表示 */
body {
  padding-bottom: calc(122px + env(safe-area-inset-bottom));
}
.bottom-toolbar {
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:1000;
  background:rgba(255,255,255,.96);
  backdrop-filter: blur(14px);
  border-top:1px solid var(--line);
  box-shadow:0 -12px 28px rgba(20,32,55,.12);
  padding:8px 10px calc(8px + env(safe-area-inset-bottom));
}
.bottom-toolbar .toolbar-inner {
  max-width:1240px;
  margin:0 auto;
  display:grid;
  gap:7px;
}
.toolbar-status {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  font-size:13px;
  color:var(--muted);
  white-space:nowrap;
}
.toolbar-status strong { color:var(--ink); }
.toolbar-hint { color:var(--muted); font-size:12px; }
.toolbar-actions {
  display:flex;
  gap:7px;
  overflow-x:auto;
  padding-bottom:2px;
  scrollbar-width:thin;
}
.toolbar-actions button {
  flex:0 0 auto;
  min-height:44px;
  padding:8px 12px;
  border-radius:12px;
  font-weight:700;
}
.toolbar-actions button.nav-main {
  min-width:82px;
  background:var(--main);
  border-color:var(--main);
  color:#fff;
}
.toolbar-actions button.score-active {
  outline:3px solid rgba(31,79,143,.28);
  border-color:var(--main);
}
.toolbar-divider {
  width:1px;
  flex:0 0 1px;
  background:var(--line);
  margin:4px 2px;
}
@media (max-width: 700px) {
  body { padding-bottom: calc(152px + env(safe-area-inset-bottom)); }
  .toolbar-status { align-items:flex-start; flex-direction:column; gap:2px; }
  .toolbar-hint { font-size:11px; }
  .toolbar-actions button { min-height:42px; padding:7px 10px; }
}

</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>行政法 1日完成 暗記ツール 55問 固定ツールバー版</h1>
    <p class="lead">公定力・不可争力・手続的瑕疵を厚めに回す、1日詰め込み用。画面下部の固定ツールバーから、前問・次問・答え表示・採点・弱点登録を常時操作できる。</p>
    <nav class="tabs" aria-label="画面切替">
      <button class="tab active" data-tab="plan">今日の流れ</button>
      <button class="tab" data-tab="lecture">ひらがな講義</button>
      <button class="tab" data-tab="drill">問答カード</button>
      <button class="tab" data-tab="essay">答案入力</button>
      <button class="tab" data-tab="weak">弱点一覧</button>
    </nav>
  </div>
</header>

<main class="wrap grid">
  <aside class="panel side">
    <div class="kpi">
      <div><span class="small">完了</span><strong id="doneCount">0</strong></div>
      <div><span class="small">弱点</span><strong id="weakCount">0</strong></div>
      <div><span class="small">現在</span><strong id="nowNo">1</strong></div>
      <div><span class="small">対象</span><strong id="targetCount">55</strong></div>
    </div>
    <div class="progressbar" aria-label="進捗"><span id="bar"></span></div>

    <label for="priorityFilter">優先度</label>
    <select id="priorityFilter">
      <option value="all">すべて</option>
      <option value="A+">A+だけ</option>
      <option value="A">Aだけ</option>
      <option value="B">Bだけ</option>
      <option value="C">Cだけ</option>
    </select>

    <label for="fieldFilter">分野</label>
    <select id="fieldFilter">
      <option value="all">すべて</option>
    </select>

    <label for="searchBox">検索</label>
    <input id="searchBox" type="search" placeholder="例：公定力、理由提示、行政指導">

    <div class="pillrow">
      <button class="hot" data-focus="hot">熱い論点</button>
      <button data-focus="procedure">手続的瑕疵</button>
      <button data-focus="kou">公定力・不可争力</button>
      <button data-focus="disposition">行政処分論</button>
      <button data-focus="guidance">行政指導</button>
      <button data-focus="appeal">不服審査</button>
      <button data-focus="weak">弱点のみ</button>
      <button data-focus="all">全解除</button>
    </div>

    <hr>
    <div class="pillrow">
      <button class="primary" id="prevBtn">前へ</button>
      <button class="primary" id="nextBtn">次へ</button>
      <button id="randomBtn">ランダム</button>
    </div>
    <div class="pillrow">
      <button id="exportBtn">進捗を書き出し</button>
      <button id="resetBtn">初期化</button>
    </div>
    <p class="footer-note">入力答案と採点結果は、このブラウザの localStorage に保存されます。外部通信はしません。</p>
  </aside>

  <section id="screen" class="panel"></section>
</main>


<div id="bottomToolbar" class="bottom-toolbar" aria-label="常時操作ツールバー">
  <div class="toolbar-inner">
    <div class="toolbar-status">
      <div id="toolbarStatus"><strong>準備中</strong></div>
      <div class="toolbar-hint">ショートカット：←→ 移動 / Space 答え / 3・2・1・0 採点 / W 弱点</div>
    </div>
    <div class="toolbar-actions" role="group" aria-label="問題操作">
      <button id="toolPrevBtn" class="nav-main" type="button">← 前問</button>
      <button id="toolNextBtn" class="nav-main" type="button">次問 →</button>
      <button id="toolRandomBtn" type="button">ランダム</button>
      <button id="toolAnswerBtn" class="primary" type="button">答え</button>
      <span class="toolbar-divider" aria-hidden="true"></span>
      <button id="toolDrillBtn" type="button">問答</button>
      <button id="toolEssayBtn" type="button">答案</button>
      <button id="toolWeakListBtn" type="button">弱点一覧</button>
      <span class="toolbar-divider" aria-hidden="true"></span>
      <button id="toolReadQBtn" type="button">問題読む</button>
      <button id="toolReadABtn" type="button">答え読む</button>
      <button id="toolWeakBtn" type="button">弱点登録</button>
      <span class="toolbar-divider" aria-hidden="true"></span>
      <button id="toolScore3" class="ok" type="button">3点</button>
      <button id="toolScore2" class="ok" type="button">2点</button>
      <button id="toolScore1" class="hot" type="button">1点</button>
      <button id="toolScore0" class="hot" type="button">0点</button>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [{"No.": "1", "優先": "A+", "分野": "行政処分論", "テーマ": "行政処分の定義", "問題": "行政処分とは何か。判例上の定義を意識しつつ、処分性の4要素を挙げなさい。", "模範解答": "行政処分とは、行政庁が法令に基づき、公権力の主体として、一方的に国民の権利義務・法的地位に直接具体的な効果を及ぼす行為をいう。判断では、①行政庁の行為であること、②公権力性、③外部の国民に向けられる対外性、④権利義務・法的地位への直接具体的な法効果性を確認する。", "採点キーワード": "行政庁／公権力性／対外性／直接具体的法効果／権利義務", "答案注意": "単なる通知・事実行為・行政内部行為・行政指導と区別する。最後は『取消訴訟の対象になるか』につなげる。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "2", "優先": "A+", "分野": "行政処分論", "テーマ": "公権力性", "問題": "行政処分の要素である公権力性を、行政契約との違いが分かるように説明しなさい。", "模範解答": "公権力性とは、行政庁が私人と対等な立場ではなく、法律上優越的な地位から一方的に法効果を発生させる性質をいう。行政契約は、原則として当事者の合意により法律関係を形成するため、公権力性が弱い。もっとも名称ではなく、実質として一方的に権利義務を変動させるかで判断する。", "採点キーワード": "一方的／優越的地位／合意との区別／実質判断", "答案注意": "『行政が関与する＝公権力』ではない。契約・行政指導・補助金交付要綱上の運用などとの区別に注意。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "3", "優先": "A+", "分野": "行政処分論", "テーマ": "公定力の意味", "問題": "公定力とは何か。違法な行政処分でも取り消されるまでは一応有効という点を説明しなさい。", "模範解答": "公定力とは、行政処分に瑕疵があっても、無効でない限り、取消権限のある行政庁または裁判所によって取り消されるまでは一応有効なものとして扱われる効力をいう。したがって、私人は出訴期間内に取消訴訟など適切な手段で争う必要がある。", "採点キーワード": "取消されるまで有効／一応有効／無効は別／取消訴訟", "答案注意": "『違法でも完全に正しい』という意味ではない。あくまで取消しまで有効に扱うという効力。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "4", "優先": "A+", "分野": "行政処分論", "テーマ": "公定力の範囲", "問題": "公定力は行政処分の何に及び、何には及ばないか。国家賠償との関係も含めて説明しなさい。", "模範解答": "公定力は、処分の法効果が取消しまで一応有効に扱われるという範囲に及ぶ。他方、処分が違法であったという評価そのものを常に封じる効力ではない。そのため、取消訴訟であらかじめ処分を取り消していなくても、国家賠償請求で処分の違法を主張できる場合がある。", "採点キーワード": "法効果／違法評価は別／国賠請求／公定力の限界", "答案注意": "国賠では『処分の効力を否定する』のではなく、『損害賠償の要件として違法をいう』と整理する。", "参照URL": "https://laws.e-gov.go.jp/law/322AC0000000125"}, {"No.": "5", "優先": "A+", "分野": "行政処分論", "テーマ": "公定力と国家賠償", "問題": "違法な課税処分について、取消訴訟で取り消していなくても国家賠償請求をすることはできるか。", "模範解答": "原則として可能である。国家賠償請求は、処分の効力を直接消滅させる制度ではなく、公務員の違法な職務行為によって損害が生じた場合に金銭賠償を求める制度である。したがって、公定力は取消訴訟を経ていない国賠請求を当然には妨げない。", "採点キーワード": "国賠法1条／取消訴訟と別制度／効力消滅ではない／違法主張可能", "答案注意": "答案では『取消訴訟と国賠の制度目的の違い』を先に置くと安定する。", "参照URL": "https://laws.e-gov.go.jp/law/322AC0000000125"}, {"No.": "6", "優先": "A+", "分野": "行政処分論", "テーマ": "不可争力の意味", "問題": "不可争力とは何か。行政上の法律関係の安定性という観点から説明しなさい。", "模範解答": "不可争力とは、行政処分について不服申立期間や出訴期間が経過すると、私人が通常の争訟手段でその処分の取消しを争えなくなる効力をいう。行政上の法律関係をいつまでも不安定にしないため、争う期間を制限する趣旨がある。", "採点キーワード": "出訴期間経過／私人が争えない／法律関係の安定／取消訴訟制限", "答案注意": "公定力は『取消しまで有効』、不可争力は『期間経過後に争えない』。混同しない。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "7", "優先": "A+", "分野": "行政処分論", "テーマ": "不可争力と職権取消し", "問題": "不可争力が生じた後でも、行政庁による職権取消しが妨げられない理由を説明しなさい。", "模範解答": "不可争力は、私人が争訟手段で処分を争えなくなる効力であり、行政庁自身の職権取消し権限を当然に消滅させるものではない。行政庁は、違法な処分を是正する必要がある場合、信頼保護や法律関係の安定を考慮しつつ、職権取消しを検討できる。", "採点キーワード": "私人を拘束／行政庁は当然には拘束されない／職権取消し／信頼保護", "答案注意": "『不可争力＝行政庁も絶対に動けない』と書くと危険。授益的処分では相手方保護の比較衡量を書く。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "8", "優先": "A+", "分野": "行政処分論", "テーマ": "公定力と不可争力の比較", "問題": "公定力と不可争力の違いを、『いつ』『誰を』『何について』拘束するかで比較しなさい。", "模範解答": "公定力は、処分成立後、取消し又は無効確認までは、広く処分の法効果を一応有効なものとして扱わせる効力である。不可争力は、不服申立期間・出訴期間経過後に、私人が取消訴訟等で処分を争えなくなる効力である。前者は有効扱いの効力、後者は争訟制限の効力である。", "採点キーワード": "公定力＝有効扱い／不可争力＝争訟制限／時期／主体／対象", "答案注意": "試験で熱いなら、表にして覚える。公定力は国賠との限界、不可争力は職権取消しとの限界が狙われやすい。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "9", "優先": "A+", "分野": "行政処分論", "テーマ": "違法性の承継の意味", "問題": "違法性の承継とは何か。先行処分・後続処分という言葉を用いて説明しなさい。", "模範解答": "違法性の承継とは、先行処分に不可争力が生じた後でも、後続処分の取消訴訟において、先行処分の違法を主張できるかという問題である。原則として、先行処分と後続処分は別個の処分であり、先行処分の違法は承継されない。", "採点キーワード": "先行処分／後続処分／不可争力／原則否定", "答案注意": "出訴期間経過後に先行処分を蒸し返す構造だと押さえる。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "10", "優先": "A+", "分野": "行政処分論", "テーマ": "違法性承継の例外", "問題": "違法性の承継が例外的に認められる判断要素を説明しなさい。", "模範解答": "例外的に違法性の承継が認められるかは、①先行処分と後続処分が一連の手続として結合しているか、②先行処分段階で争う機会が十分にあったか、③後続処分段階で先行処分の違法を主張させないと救済が著しく不十分になるか、などを総合して判断する。", "採点キーワード": "一連性／手続的結合／争う機会／救済必要性", "答案注意": "『例外だから常に厳格』で終わらず、争う機会と救済の実効性を書く。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "11", "優先": "A+", "分野": "行政処分論", "テーマ": "安全認定と建築確認", "問題": "安全認定と建築確認の関係で、違法性の承継が問題となる理由を説明しなさい。", "模範解答": "安全認定が先行し、その後に建築確認がされる場合、周辺住民は建築確認取消訴訟で先行する安全認定の違法を主張したいと考える。安全認定と建築確認が密接に結びつき、安全認定だけを早期に争う機会が実質的に乏しいなら、後続の建築確認取消訴訟で先行処分の違法を主張させる必要性が高い。", "採点キーワード": "安全認定／建築確認／一連性／争う機会／救済必要性", "答案注意": "たぬきの森型は『違法性承継の例外』の代表として整理する。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "12", "優先": "A", "分野": "行政処分論", "テーマ": "課税処分と滞納処分", "問題": "課税処分と滞納処分の間で、違法性の承継が原則認められない理由を説明しなさい。", "模範解答": "課税処分と滞納処分は、いずれも租税徴収過程に関わるが、課税要件を確定する処分と、確定した租税債権を徴収する処分として役割が異なる。課税処分の段階で不服申立てや取消訴訟により争う機会があるため、後の滞納処分で課税処分の違法を当然に主張させると、不可争力や租税法律関係の安定を害する。", "採点キーワード": "役割の違い／争う機会／不可争力／租税法律関係の安定", "答案注意": "国賠とは区別。国賠は損害賠償請求、違法性承継は後続処分取消訴訟の中で先行処分を攻撃する話。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "13", "優先": "A", "分野": "行政処分論", "テーマ": "行政裁量の意味", "問題": "行政裁量とは何か。要件裁量・効果裁量にも触れて説明しなさい。", "模範解答": "行政裁量とは、法律の枠内で行政庁に判断・選択の余地が認められることをいう。要件裁量は、法律要件に該当するかの判断に余地がある場合であり、効果裁量は、処分をするか、どの処分を選ぶかに余地がある場合である。", "採点キーワード": "法律の枠内／判断の余地／要件裁量／効果裁量", "答案注意": "裁量は『自由に何でもできる』ではない。法律の目的・趣旨に拘束される。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "14", "優先": "A", "分野": "行政処分論", "テーマ": "行政事件訴訟法30条", "問題": "裁量処分に対する司法審査について、行政事件訴訟法30条の考え方を説明しなさい。", "模範解答": "行政事件訴訟法30条は、行政庁の裁量処分について、裁量権の範囲を超え、又はその濫用があった場合に限り、裁判所が処分を取り消せるとする。裁判所は行政庁の判断を全面的に置き換えるのではなく、裁量の逸脱・濫用があるかを審査する。", "採点キーワード": "裁量権の範囲を超える／濫用／司法審査／置換審査でない", "答案注意": "条文名を出すだけで終わらず、実体的審査・判断過程審査につなげる。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "15", "優先": "A", "分野": "行政処分論", "テーマ": "判断過程審査", "問題": "判断過程審査とは何か。考慮不尽・他事考慮・評価の明白な不合理を用いて説明しなさい。", "模範解答": "判断過程審査とは、裁判所が行政庁の結論を直接置き換えるのではなく、その判断過程に違法がないかを見る審査方法である。重要な事情を考慮していない考慮不尽、考慮すべきでない事情を考慮した他事考慮、事実評価が明白に不合理な場合には、裁量権の逸脱・濫用となり得る。", "採点キーワード": "判断過程／考慮不尽／他事考慮／評価の明白な不合理", "答案注意": "答案では『結論が気に入らない』ではなく『判断過程が法律目的に反する』と書く。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "16", "優先": "A", "分野": "行政処分論", "テーマ": "神戸税関事件", "問題": "神戸税関事件の裁量審査基準を説明しなさい。", "模範解答": "神戸税関事件は、懲戒処分の裁量審査について、処分が全く事実の基礎を欠く場合、又は社会観念上著しく妥当性を欠く場合には、裁量権の逸脱・濫用として違法となるとした判例として整理される。", "採点キーワード": "全く事実の基礎を欠く／社会観念上著しく妥当性を欠く／裁量逸脱濫用", "答案注意": "指定語句が出たらそのまま書けるようにする。裁量の基本判例。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "17", "優先": "A", "分野": "行政処分論", "テーマ": "エホバ事件", "問題": "エホバの証人剣道実技拒否事件で、裁判所は学校側の判断過程のどこを問題にしたか説明しなさい。", "模範解答": "この事件では、信仰上の理由で剣道実技に参加できない学生について、学校側が代替措置の可能性などを十分検討せず、原級留置・退学という重大な不利益処分をした点が問題となった。重要事項の考慮不尽があり、判断過程に問題があるとして裁量権の逸脱・濫用が認められた。", "採点キーワード": "信教上の理由／代替措置／考慮不尽／重大な不利益", "答案注意": "宗教の自由そのものの答案に寄せすぎず、行政裁量の判断過程審査として使う。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "18", "優先": "A", "分野": "行政処分論", "テーマ": "附款の意味と限界", "問題": "附款とは何か。付すことができる場合と限界を説明しなさい。", "模範解答": "附款とは、行政行為の主たる法効果に付加される従たる意思表示をいう。法律に明文の根拠がある場合や裁量行為の場合に付すことができる。他方、附款は法令の趣旨に反してはならず、処分目的との関連性、比例原則、平等原則、処分本体との整合性を満たす必要がある。", "採点キーワード": "従たる意思表示／明文根拠／裁量行為／目的関連性／比例原則", "答案注意": "羈束行為には原則として自由に附款を付せない。", "参照URL": "https://laws.e-gov.go.jp/law/405AC0000000088"}, {"No.": "19", "優先": "A", "分野": "行政処分論", "テーマ": "条件と負担", "問題": "附款における条件と負担の違いを説明しなさい。", "模範解答": "条件は、将来発生が不確実な事実に処分の効力発生又は消滅をかからせる附款である。負担は、授益的処分に付加して相手方に一定の作為・不作為義務を課す附款であり、負担に違反しても直ちに処分の効力が当然消滅するわけではない点で条件と異なる。", "採点キーワード": "停止条件／解除条件／義務付加／効力当然消滅ではない", "答案注意": "許可書に『条件』と書かれていても、実質が負担なら負担として扱う。", "参照URL": "https://laws.e-gov.go.jp/law/405AC0000000088"}, {"No.": "20", "優先": "A", "分野": "行政処分論", "テーマ": "附款のみ取消し", "問題": "違法な附款が付された場合、附款のみの取消しが認められるか説明しなさい。", "模範解答": "処分本体と附款が可分であり、附款を取り消しても処分本体を存続させることが行政庁の意思や法令趣旨に反しない場合には、附款のみの取消しが認められ得る。他方、附款が処分本体と不可分である場合や、附款を除くと公益上重大な支障が生じる場合には、附款のみ取消しは認められにくい。", "採点キーワード": "可分性／行政庁の意思／法令趣旨／公益上の支障", "答案注意": "『違法附款＝必ず附款だけ取消し』ではない。可分性を必ず検討する。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "21", "優先": "A", "分野": "行政処分論", "テーマ": "区域限定附款", "問題": "営業許可に『営業区域をA地区に限る』という附款が付された場合、附款のみを争えるかの判断枠組みを示しなさい。", "模範解答": "まず区域限定が処分本体に対する附款か、それとも許可内容そのものの一部かを検討する。附款といえる場合でも、許可本体と区域限定が可分か、区域限定を除いても許可を維持できるか、公益上の支障がないかを検討する。可分性が認められれば附款のみ取消しが可能となり得る。", "採点キーワード": "附款か許可内容か／可分性／公益上の支障／附款のみ取消し", "答案注意": "廃棄物処理業許可区域限定型の答案として使う。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "22", "優先": "A", "分野": "行政処分論", "テーマ": "瑕疵ある処分と無効", "問題": "瑕疵ある行政処分とは何か。取消し得る処分と無効な処分の違いを説明しなさい。", "模範解答": "瑕疵ある行政処分とは、成立要件・手続・内容などに法的欠陥がある処分をいう。瑕疵が通常の違法にとどまる場合は、取消しされるまでは有効な取消し得る処分となる。他方、瑕疵が重大かつ明白な場合には、当然無効となり、初めから効力を生じない。", "採点キーワード": "瑕疵／取消し得る処分／当然無効／重大明白", "答案注意": "無効は例外。単に違法だから無効とは書かない。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "23", "優先": "A", "分野": "行政処分論", "テーマ": "重大明白説", "問題": "行政処分が当然無効となる基準としての重大明白説を説明しなさい。", "模範解答": "重大明白説とは、行政処分の瑕疵が重大で、かつ外形上・客観的に明白である場合に、その処分を当然無効とする考え方である。重大性は重要な法規違反か、明白性は処分成立当初から一見して瑕疵が分かるかで判断する。", "採点キーワード": "重大性／明白性／外形上客観的／当然無効", "答案注意": "明白性は後から詳しく調査して初めて分かる場合には否定されやすい。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "24", "優先": "A", "分野": "行政処分論", "テーマ": "明白性補充要件説", "問題": "明白性補充要件説とは何か。どのような場合に明白性が緩和され得るか説明しなさい。", "模範解答": "明白性補充要件説とは、重大な瑕疵があり、相手方の権利救済の必要性が高い場合には、外形上の明白性が厳格に認められなくても無効を認め得るとする考え方である。特に、相手方に帰責性が乏しく、処分を有効扱いすると著しく不当な結果となる場合に問題となる。", "採点キーワード": "重大性／権利救済／明白性の緩和／相手方帰責性", "答案注意": "『明白性不要説』のように雑に書かない。あくまで補充・緩和。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "25", "優先": "A", "分野": "行政処分論", "テーマ": "瑕疵の治癒", "問題": "瑕疵の治癒とは何か。理由提示不足との関係にも触れて説明しなさい。", "模範解答": "瑕疵の治癒とは、処分時に存在した手続上又は形式上の瑕疵が、事後的事情により違法性を失うと評価されることをいう。ただし、手続保障の趣旨を害する場合には安易に認められない。特に理由提示の不足は、処分時に相手方へ理由を知らせ、不服申立てを可能にする趣旨があるため、訴訟段階の理由追完で当然に治癒されるわけではない。", "採点キーワード": "事後的充足／手続保障／理由提示／理由追完は原則慎重", "答案注意": "手続的瑕疵の補強論点。『後で説明したからOK』とはしない。", "参照URL": "https://laws.e-gov.go.jp/law/405AC0000000088"}, {"No.": "26", "優先": "A", "分野": "行政処分論", "テーマ": "違法行為の転換", "問題": "違法行為の転換とは何か。不意打ち防止の観点から説明しなさい。", "模範解答": "違法行為の転換とは、A処分としては違法であっても、B処分としての要件を満たす場合に、B処分として効力を認める考え方である。ただし、名あて人に不意打ちとならないこと、行政庁がB処分をする意思を有していたといえること、手続保障を害しないことなどが必要である。", "採点キーワード": "A処分からB処分／要件充足／行政庁の意思／不意打ち防止", "答案注意": "治癒は同じ処分の瑕疵補正、転換は別の法的根拠・別処分として扱う点が違う。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "27", "優先": "A", "分野": "行政処分論", "テーマ": "職権取消しと撤回", "問題": "職権取消しと撤回の違いを、理由と効果の点から説明しなさい。", "模範解答": "職権取消しは、処分成立当初から存在した違法・不当な瑕疵を理由として処分の効力を失わせる行為である。撤回は、適法に成立した処分について、後発的事情を理由として将来に向かって効力を失わせる行為である。取消しは原始的瑕疵、撤回は後発的事情という点が基本的な違いである。", "採点キーワード": "原始的瑕疵／後発的事情／取消し／撤回／将来効", "答案注意": "効果は事案により調整されるが、基本整理は『理由の時点』で分ける。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "28", "優先": "A", "分野": "行政処分論", "テーマ": "授益的処分の取消し・撤回制限", "問題": "授益的処分を職権取消し・撤回する場合、なぜ制限が必要か説明しなさい。", "模範解答": "授益的処分は相手方に利益を与え、相手方がその処分を信頼して生活・営業関係を形成することがある。そのため、行政庁が自由に取消し・撤回できると信頼保護や法的安定性を害する。そこで、公益上の必要性、相手方の帰責性、信頼の程度、不利益緩和措置などを比較衡量して違法性を判断する。", "採点キーワード": "授益的処分／信頼保護／法的安定性／比較衡量", "答案注意": "公定力・不可争力と連動。行政庁が動けるとしても無制限ではない。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "29", "優先": "A", "分野": "行政処分論", "テーマ": "障害厚生年金過誤給付事件", "問題": "障害厚生年金過誤給付事件で職権取消しが違法とされた理由を説明しなさい。", "模範解答": "障害厚生年金過誤給付事件では、行政庁の過誤により給付が行われ、受給者は長期間その給付を前提として生活していた。受給者の帰責性が乏しく、遡及的取消しと返還請求による不利益が大きく、不利益緩和措置も不十分であったため、信頼保護・公平の観点から職権取消しが違法とされた。", "採点キーワード": "行政庁の過誤／帰責性なし／生活設計／不利益緩和措置／信頼保護", "答案注意": "『違法な給付だから必ず返還』と短絡しない。比較衡量を書く。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "30", "優先": "A", "分野": "行政処分論", "テーマ": "授益的処分の撤回と法律根拠", "問題": "授益的処分の撤回に明文の根拠が必要か。判例の立場を踏まえて説明しなさい。", "模範解答": "授益的処分の撤回について、明文の根拠が常に必要とされるわけではない。ただし、相手方の利益を奪うため、法律の趣旨、公益上の必要、信頼保護、比例原則などに照らし、撤回が許されるかを厳格に判断する必要がある。", "採点キーワード": "明文根拠常に必要ではない／公益上の必要／信頼保護／比例原則", "答案注意": "撤回の根拠と、撤回の制限を分けて書く。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "31", "優先": "A", "分野": "行政処分論", "テーマ": "損失補償と内在的制約", "問題": "行政財産の目的外使用許可が公益上の必要から撤回された場合、損失補償は必要か説明しなさい。", "模範解答": "行政財産の目的外使用許可には、行政財産本来の目的のため必要が生じれば撤回され得るという内在的制約がある。そのため、公益上の必要に基づく撤回については、原則として損失補償は不要とされる。ただし、使用者に通常受忍すべき限度を超える特別の犠牲が生じる場合には、例外的に補償が問題となり得る。", "採点キーワード": "目的外使用許可／内在的制約／原則補償不要／特別の犠牲", "答案注意": "撤回の適法性と損失補償の要否を分けて論じる。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "32", "優先": "A+", "分野": "行政処分論", "テーマ": "手続的瑕疵の意味", "問題": "行政処分における手続的瑕疵とは何か。実体違法との違いを説明しなさい。", "模範解答": "手続的瑕疵とは、処分の内容そのものではなく、処分に至る手続に違法があることをいう。例えば、聴聞・弁明の機会を与えない、理由提示が不十分、審査基準・処分基準の運用に不透明な点がある場合などである。実体違法が処分内容の法令適合性を問題にするのに対し、手続的瑕疵は決定過程の適正を問題にする。", "採点キーワード": "手続違反／決定過程／聴聞・弁明／理由提示／実体違法との区別", "答案注意": "今回薄いと言われた補強部分。『結論が同じなら問題なし』と安易に書かない。", "参照URL": "https://laws.e-gov.go.jp/law/405AC0000000088"}, {"No.": "33", "優先": "A+", "分野": "行政処分論", "テーマ": "手続的瑕疵の効果", "問題": "手続的瑕疵がある場合、その処分は当然に取り消されるか。判断枠組みを説明しなさい。", "模範解答": "手続的瑕疵がある場合でも、常に当然に取消しとなるわけではない。①違反した手続の趣旨・重要性、②相手方の防御権・参加権に与えた影響、③処分結果に影響した可能性、④手続違反を軽視すると制度趣旨が損なわれるかを考慮する。重要な手続保障を欠く場合には、結果が同じ可能性があっても取消事由となり得る。", "採点キーワード": "手続の趣旨／防御権／結果への影響／制度趣旨", "答案注意": "結果依存型だけでなく、手続保障そのものの価値も書く。", "参照URL": "https://laws.e-gov.go.jp/law/405AC0000000088"}, {"No.": "34", "優先": "A+", "分野": "行政処分論", "テーマ": "理由提示義務の趣旨", "問題": "理由提示義務の趣旨を、行政庁の恣意抑制と不服申立ての便宜から説明しなさい。", "模範解答": "理由提示義務の趣旨は、行政庁に理由を明らかにさせることで恣意的判断を抑制し、処分の慎重・合理的判断を担保する点にある。また、相手方に処分理由を理解させ、不服申立てや取消訴訟で何を争うべきかを判断できるようにする機能もある。", "採点キーワード": "恣意抑制／慎重判断／不服申立ての便宜／防御権", "答案注意": "申請拒否でも不利益処分でも理由提示は頻出。趣旨は共通して使える。", "参照URL": "https://laws.e-gov.go.jp/law/405AC0000000088"}, {"No.": "35", "優先": "A+", "分野": "行政処分論", "テーマ": "理由提示の程度", "問題": "理由提示はどの程度具体的である必要があるか。事実関係と法規の適用関係という言葉を用いて説明しなさい。", "模範解答": "理由提示は、単に結論や条文名を示すだけでは足りず、いかなる事実関係に基づき、どの法規・処分基準をどのように適用して処分に至ったかが、相手方に理解できる程度に具体的である必要がある。処分基準がある場合には、基準のどの部分に該当するのかも示す必要が高い。", "採点キーワード": "事実関係／法規の適用関係／処分基準／具体性", "答案注意": "『基準に適合しないため』だけでは原則不足と書けるようにする。", "参照URL": "https://laws.e-gov.go.jp/law/405AC0000000088"}, {"No.": "36", "優先": "A+", "分野": "行政処分論", "テーマ": "理由追完の可否", "問題": "処分時に理由提示が不十分だった場合、訴訟段階で理由を追加することで瑕疵は治癒されるか説明しなさい。", "模範解答": "理由提示は処分時に相手方へ理由を示し、行政庁の恣意を抑制し、不服申立ての便宜を図る制度である。そのため、処分時の理由提示が不十分な場合、訴訟段階で理由を追加しても、原則としてその瑕疵は治癒されない。後から理由を補えるとすると、処分時理由提示義務の趣旨が失われるからである。", "採点キーワード": "処分時／恣意抑制／不服申立て／理由追完／原則治癒不可", "答案注意": "手続的瑕疵の本命。『裁判で説明したからセーフ』にしない。", "参照URL": "https://laws.e-gov.go.jp/law/405AC0000000088"}, {"No.": "37", "優先": "A+", "分野": "行政処分論", "テーマ": "聴聞と弁明", "問題": "聴聞と弁明の機会付与の違いを、口頭審理・主宰者・文書閲覧権に着目して説明しなさい。", "模範解答": "聴聞は、許認可の取消しなど重大な不利益処分で要求される、比較的慎重な事前手続である。口頭審理を中心とし、主宰者が手続を進行し、一定の文書閲覧権も認められる。弁明の機会付与は、聴聞より簡易な手続で、原則として書面による弁明で足りる。処分の重大性に応じて手続保障の厚さが異なる。", "採点キーワード": "聴聞／弁明／口頭審理／主宰者／文書閲覧権", "答案注意": "免許取消しなど重大処分で弁明だけなら行政手続法上の問題になりやすい。", "参照URL": "https://laws.e-gov.go.jp/law/405AC0000000088"}, {"No.": "38", "優先": "A+", "分野": "行政処分論", "テーマ": "事前手続を欠いた不利益処分", "問題": "営業停止処分前に十分な弁明の機会を与えなかった場合、処分の取消事由となるか論じなさい。", "模範解答": "営業停止処分は相手方に不利益を課す処分であり、行政手続法上、原則として聴聞又は弁明の機会付与が必要となる。十分な弁明の機会を与えなかった場合、相手方の防御権を害し、行政庁の慎重判断を担保する手続趣旨にも反するため、重要な手続的瑕疵として処分の取消事由となり得る。", "採点キーワード": "不利益処分／事前手続／防御権／慎重判断／取消事由", "答案注意": "『結果が同じだから取消し不要』だけで片付けない。手続保障の目的を書く。", "参照URL": "https://laws.e-gov.go.jp/law/405AC0000000088"}, {"No.": "39", "優先": "A", "分野": "行政処分論", "テーマ": "成田新法事件と行政手続", "問題": "憲法31条の保障は行政手続にも及び得るか。成田新法事件の考え方を説明しなさい。", "模範解答": "判例は、憲法31条の適正手続保障が行政手続にも及び得ることを否定していない。ただし、常に刑事手続と同じ事前手続が必要となるわけではなく、処分により制限される権利利益の内容・性質・制限の程度、行政目的、手続を置くことによる行政上の支障などを総合考慮して判断する。", "採点キーワード": "憲法31条／行政手続にも及び得る／総合考慮／事前手続", "答案注意": "総論にも関わるが、手続的瑕疵の答案の土台として重要。", "参照URL": "https://laws.e-gov.go.jp/law/321CONSTITUTION"}, {"No.": "40", "優先": "A", "分野": "行政処分論", "テーマ": "申請拒否と理由提示", "問題": "営業許可申請に対し『基準に適合しない』とだけ記載して拒否した場合の違法性を論じなさい。", "模範解答": "申請拒否処分では、行政手続法上、申請者に対して拒否理由を示す必要がある。『基準に適合しない』という記載だけでは、どの事実がどの審査基準・法令要件に適合しないのかが分からず、行政庁の恣意抑制や不服申立ての便宜という理由提示義務の趣旨を満たさない。したがって、理由提示不備として違法となる可能性が高い。", "採点キーワード": "申請拒否／審査基準／理由提示／具体性不足／違法", "答案注意": "不利益処分の理由提示と似るが、申請拒否は『申請に対する処分』として整理する。", "参照URL": "https://laws.e-gov.go.jp/law/405AC0000000088"}, {"No.": "41", "優先": "A", "分野": "行政処分論", "テーマ": "申請不受理・返戻", "問題": "形式要件を満たす申請を、法令上根拠のない事前協議未了を理由に不受理・返戻することの適否を説明しなさい。", "模範解答": "申請が法令上の形式要件を満たして行政庁に到達した場合、行政庁には審査を開始し、許否等の応答をする義務が生じる。法令上根拠のない事前協議未了などを理由に申請を不受理・返戻し、審査を回避することは、申請権を不当に制限し、行政手続法の趣旨に反して違法となり得る。", "採点キーワード": "申請到達／審査開始義務／応答義務／不受理返戻／根拠なし", "答案注意": "行政指導として事前協議を求める場合も、申請拒否の代替にしてはいけない。", "参照URL": "https://laws.e-gov.go.jp/law/405AC0000000088"}, {"No.": "42", "優先": "B", "分野": "行政指導", "テーマ": "行政指導の意味", "問題": "行政指導とは何か。処分との違いが分かるように説明しなさい。", "模範解答": "行政指導とは、行政機関が一定の行政目的を実現するため、相手方に作為・不作為を求める指導・勧告・助言などで、相手方の任意の協力によって実現されるものをいう。行政処分と異なり、行政指導それ自体は一方的に権利義務を変動させる法的効果を持たない。", "採点キーワード": "任意の協力／指導・勧告・助言／法効果なし／処分との区別", "答案注意": "名目が『指導』でも、実質的に従わないと不利益が確定するなら処分性を疑う。", "参照URL": "https://laws.e-gov.go.jp/law/405AC0000000088"}, {"No.": "43", "優先": "B", "分野": "行政指導", "テーマ": "行政指導の一般原則", "問題": "行政指導について、相手方の任意性を確保するための原則を説明しなさい。", "模範解答": "行政指導は相手方の任意の協力を前提とするため、行政機関は相手方が行政指導に従わなかったことを理由として不利益な取扱いをしてはならない。また、行政指導の内容は行政目的の範囲内で、必要最小限のものでなければならない。", "採点キーワード": "任意性／不利益取扱い禁止／行政目的の範囲／必要最小限", "答案注意": "行政指導が事実上強制になっていないかを必ず見る。", "参照URL": "https://laws.e-gov.go.jp/law/405AC0000000088"}, {"No.": "44", "優先": "B", "分野": "行政指導", "テーマ": "申請に関連する行政指導", "問題": "申請者が行政指導に従わない意思を示した場合、行政庁は申請処理を遅らせられるか説明しなさい。", "模範解答": "申請に関連して行政指導が行われる場合でも、申請者が行政指導に従わない意思を明確にしたときは、行政庁は行政指導の継続を理由に申請に対する審査や応答を遅延させてはならない。行政指導を申請拒否や処理遅延の手段にすることは、任意性を害する。", "採点キーワード": "申請処理遅延禁止／任意性／行政指導不服従／応答義務", "答案注意": "行政処分論の申請不受理と接続しやすい。", "参照URL": "https://laws.e-gov.go.jp/law/405AC0000000088"}, {"No.": "45", "優先": "B", "分野": "行政指導", "テーマ": "許認可権限と行政指導", "問題": "許認可権限を背景にした行政指導で注意すべき点を説明しなさい。", "模範解答": "許認可権限を持つ行政庁が行政指導を行う場合、相手方は将来の許認可で不利益を受けることを恐れて従わざるを得ない状況になりやすい。そのため、行政指導の趣旨・内容・責任者を明確にし、従わないことを理由とする不利益取扱いを避け、任意性を確保する必要がある。", "採点キーワード": "許認可権限／事実上の強制／責任者明示／任意性", "答案注意": "行政指導は柔らかい手段だが、権限を背景にすると違法化しやすい。", "参照URL": "https://laws.e-gov.go.jp/law/405AC0000000088"}, {"No.": "46", "優先": "B", "分野": "行政指導", "テーマ": "行政指導の中止等の求め", "問題": "法令違反の是正を求める行政指導について、相手方はどのような救済を求め得るか説明しなさい。", "模範解答": "行政手続法上、法令違反の是正を求める行政指導を受けた相手方は、その行政指導が法律上の要件に適合しないと思うとき、行政機関に対して行政指導の中止等を求めることができる。これは行政指導が事実上強制として機能することを防ぐための手続的救済である。", "採点キーワード": "行政指導の中止等の求め／法令違反是正指導／事実上の強制防止", "答案注意": "取消訴訟ではなく、行政手続法上の手続的救済として整理する。", "参照URL": "https://laws.e-gov.go.jp/law/405AC0000000088"}, {"No.": "47", "優先": "B", "分野": "行政指導", "テーマ": "処分性との境界", "問題": "行政指導が処分性を帯びるかどうかを判断する観点を説明しなさい。", "模範解答": "行政指導は本来任意の協力を求めるもので、通常は処分性を有しない。しかし、法令上の根拠、相手方への具体的な法的不利益、従わない場合の制裁の有無、実質的に権利義務を変動させるかを見て、単なる指導を超えた公権力的行為といえる場合には処分性が問題となる。", "採点キーワード": "任意性／法的不利益／制裁／実質判断／処分性", "答案注意": "形式名ではなく実質。行政処分論の4要素に戻して検討する。", "参照URL": "https://laws.e-gov.go.jp/law/337AC0000000139"}, {"No.": "48", "優先": "B", "分野": "不服審査", "テーマ": "行政不服審査制度の意味", "問題": "行政不服審査制度とは何か。取消訴訟との違いを説明しなさい。", "模範解答": "行政不服審査制度は、行政庁の処分又は不作為に不服がある者が、行政機関に対して簡易迅速に救済を求める制度である。取消訴訟が裁判所による司法救済であるのに対し、不服審査は行政内部の救済手続であり、違法だけでなく不当も審査対象になり得る点に特色がある。", "採点キーワード": "行政内部救済／簡易迅速／処分・不作為／違法・不当／取消訴訟との違い", "答案注意": "司法審査は原則違法性審査。不服審査は不当まで見られる点が差。", "参照URL": "https://laws.e-gov.go.jp/law/426AC0000000068"}, {"No.": "49", "優先": "B", "分野": "不服審査", "テーマ": "審査請求期間", "問題": "処分について審査請求をする期間制限の趣旨を説明しなさい。", "模範解答": "審査請求期間は、処分をいつまでも争える状態にすると行政上の法律関係が不安定になるため設けられている。権利救済の機会を保障しつつ、一定期間経過後は法律関係を安定させる趣旨がある。不可争力の理解ともつながる。", "採点キーワード": "期間制限／法律関係の安定／権利救済／不可争力", "答案注意": "具体的期間は条文確認。答案では趣旨を説明できることが重要。", "参照URL": "https://laws.e-gov.go.jp/law/426AC0000000068"}, {"No.": "50", "優先": "B", "分野": "不服審査", "テーマ": "審理員制度", "問題": "行政不服審査法における審理員制度の趣旨を説明しなさい。", "模範解答": "審理員制度は、処分に関与していない職員が審理手続を行うことで、審査の公正性・中立性を確保するための制度である。処分庁自身の判断をそのまま追認するのではなく、争点整理や証拠調べを通じて、客観的な審理を実現する趣旨がある。", "採点キーワード": "審理員／公正性／中立性／処分不関与／客観的審理", "答案注意": "行政内部救済の弱点である『身内審査』を緩和する制度と覚える。", "参照URL": "https://laws.e-gov.go.jp/law/426AC0000000068"}, {"No.": "51", "優先": "B", "分野": "不服審査", "テーマ": "裁決の種類", "問題": "審査請求に対する裁決の種類を、却下・棄却・認容の違いが分かるように説明しなさい。", "模範解答": "却下裁決は、審査請求期間徒過や請求人適格欠如など、審査請求が不適法な場合に本案に入らず退ける裁決である。棄却裁決は、審査請求は適法だが理由がないとして退ける裁決である。認容裁決は、審査請求に理由があるとして、処分の取消し・変更などを行う裁決である。", "採点キーワード": "却下＝不適法／棄却＝理由なし／認容＝理由あり", "答案注意": "訴訟の却下・棄却と同じ発想で覚える。", "参照URL": "https://laws.e-gov.go.jp/law/426AC0000000068"}, {"No.": "52", "優先": "B", "分野": "不服審査", "テーマ": "執行停止", "問題": "審査請求中の執行停止制度の意味を説明しなさい。", "模範解答": "審査請求をしても、原則として処分の効力や執行は当然には停止しない。しかし、処分の執行により重大な損害が生じるおそれがある場合などには、執行停止により一時的に処分の効力・執行・手続の続行を止めることができる。実効的救済を確保する制度である。", "採点キーワード": "不停止原則／重大な損害／執行停止／実効的救済", "答案注意": "取消訴訟の執行停止とも比較できるようにする。", "参照URL": "https://laws.e-gov.go.jp/law/426AC0000000068"}, {"No.": "53", "優先": "C", "分野": "総論", "テーマ": "法律による行政の原理", "問題": "法律による行政の原理とは何か。法律の留保・法律の優位にも触れて説明しなさい。", "模範解答": "法律による行政の原理とは、行政活動が法律に従って行われなければならないという原理である。法律の優位は、行政活動が法律に反してはならないことを意味する。法律の留保は、国民の権利自由を制限するなど重要な行政活動には法律上の根拠が必要であることを意味する。", "採点キーワード": "法律の優位／法律の留保／権利自由制限／法治主義", "答案注意": "総論は深入りしすぎず、行政処分論の根拠づけとして使う。", "参照URL": "https://laws.e-gov.go.jp/law/321CONSTITUTION"}, {"No.": "54", "優先": "C", "分野": "総論", "テーマ": "適正手続原理", "問題": "適正手続原理とは何か。行政手続法の目的とつなげて説明しなさい。", "模範解答": "適正手続原理とは、行政の結論だけでなく、その決定過程が公正・透明であること自体に価値を認める考え方である。行政手続法は、処分・行政指導・届出等について共通ルールを定め、公正の確保、透明性の向上、国民の権利利益保護を図る。", "採点キーワード": "決定過程／公正／透明性／権利利益保護／行政手続法", "答案注意": "手続的瑕疵の理由づけに直結する。", "参照URL": "https://laws.e-gov.go.jp/law/405AC0000000088"}, {"No.": "55", "優先": "C", "分野": "総論", "テーマ": "行政救済の全体像", "問題": "行政活動に不満がある場合の救済手段を、不服審査・取消訴訟・国家賠償の違いから説明しなさい。", "模範解答": "行政不服審査は行政内部で簡易迅速に処分・不作為を争う制度であり、不当も問題にできる。取消訴訟は裁判所に処分の取消しを求める制度で、処分の効力を消滅させることを目的とする。国家賠償は違法な公権力行使による損害について金銭賠償を求める制度で、処分の効力消滅とは制度目的が異なる。", "採点キーワード": "不服審査／取消訴訟／国家賠償／不当／違法／金銭賠償", "答案注意": "公定力と国賠の理解につながる総まとめ。", "参照URL": "https://laws.e-gov.go.jp/law/426AC0000000068 / https://laws.e-gov.go.jp/law/337AC0000000139 / https://laws.e-gov.go.jp/law/322AC0000000125"}];
const LECTURE = "ぎょうせいほう　いちにちかんせい　りかいこうぎ\n\nこのこうぎのねらいは、こたえをまるあんきすることではなく、どのろんてんでも、おなじかたでかけるようにすることです。\nさいしょに、ぜんたいのちずをつかみます。\nぎょうせいほうでは、まず、ぎょうせいがしたことが、ぎょうせいしょぶんかどうかをみます。\nぎょうせいしょぶんなら、とりけしそしょうのたいしょうになります。\nつぎに、そのしょぶんに、こうていりょく、ふかそうりょく、しっこうりょく、ふかへんこうりょくのような、こうりょくがあるかをみます。\nさらに、そのしょぶんに、さいりょうがあるか、ふかんがあるか、てつづきのもんだいがあるか、かしがあるかをみます。\nさいごに、きゅうさいとして、ふふくしんさ、とりけしそしょう、こっかばいしょうをくらべます。\n\nだいいちこう　ぎょうせいしょぶんのきほん\n\nぎょうせいしょぶんとは、ぎょうせいちょうが、ほうれいにもとづき、こうけんりょくのしゅたいとして、いっぽうてきに、こくみんのけんりぎむや、ほうてきちいに、ちょくせつぐたいてきなこうかをおよぼすこういです。\nここでたいせつなのは、よっつのようそです。\nひとつめは、ぎょうせいちょうのこういであること。\nふたつめは、こうけんりょくせいです。\nみっつめは、たいがいせいです。\nよっつめは、ちょくせつぐたいてきなほうこうかです。\n\nこうけんりょくせいとは、ぎょうせいが、しじんとたいとうなけいやくのあいてとしてではなく、ほうりつじょうゆうえつしたたちばから、いっぽうてきにこうかをはっせいさせることです。\nだから、ぎょうせいがかかわっていても、ただのけいやくなら、すぐにぎょうせいしょぶんとはいえません。\nたいがいせいとは、ぎょうせいのないぶだけのはなしではなく、そとのこくみんにむけられていることです。\nちょくせつぐたいてきなほうこうかとは、たんなるじょうほうていきょうやじじつじょうのえいきょうではなく、けんりぎむやほうてきちいを、ちょくせつうごかすことです。\n\nとうあんでは、まず、これはぎょうせいしょぶんか、ととう。\nつぎに、よっつのようそにわける。\nさいごに、とりけしそしょうのたいしょうとなるか、とむすぶ。\nこのながれをからだにいれてください。\n\nだいにこう　こうていりょくとふかそうりょく\n\nここは、とくにあついところです。\nこうていりょくとは、ぎょうせいしょぶんにかしがあっても、むこうでないかぎり、とりけされるまでは、いちおうゆうこうなものとしてあつかわれるこうりょくです。\nたいせつなのは、いほうなしょぶんでも、ただちにむしできるわけではない、ということです。\nただし、こうていりょくは、しょぶんがぜったいにただしい、といういみではありません。\nとりけされるまでは、ほうこうかをゆうこうとしてあつかう、というだけです。\n\nふかそうりょくとは、ふふくもうしたてきかんや、しゅっそきかんがすぎると、しじんが、ふつうのそうしょうしゅだんで、そのしょぶんのとりけしをあらそえなくなるこうりょくです。\nふかそうりょくのねらいは、ぎょうせいじょうのほうりつかんけいを、いつまでもふあんていにしないことです。\nここでひっかかりやすいのは、ふかそうりょくがしょうじても、ぎょうせいちょうのしょっけんとりけしが、とうぜんにきんしされるわけではない、というてんです。\nふかそうりょくは、しじんがあらそえなくなるこうりょくであり、ぎょうせいちょうじしんを、ぜったいにしばるこうりょくではありません。\nただし、じゅえきてきしょぶんをとりけすときは、しんらいほごやひれいげんそくをみます。\n\nこうていりょくとふかそうりょくは、つぎのようにくらべます。\nこうていりょくは、とりけされるまで、しょぶんのこうかを、いちおうゆうこうにあつかうものです。\nふかそうりょくは、きかんがすぎたあと、しじんが、そのしょぶんをあらそえなくなるものです。\nつまり、こうていりょくは、ゆうこうあつかいのはなし。\nふかそうりょくは、あらそえるかどうかのはなしです。\n\nこうていりょくとこっかばいしょうもだいじです。\nこっかばいしょうは、しょぶんをけすせいどではなく、いほうなこうけんりょくのこうしでそんがいがでたときに、きんせんばいしょうをもとめるせいどです。\nだから、しょぶんをとりけしていなくても、こっかばいしょうで、いほうをしゅちょうできるばあいがあります。\nここでは、しょぶんのこうかをけすはなしではない、というせいりがだいじです。\n\nだいさんこう　いほうせいのしょうけい\n\nいほうせいのしょうけいとは、せんこうしょぶんにふかそうりょくがしょうじたあとでも、こうぞくしょぶんのとりけしそしょうで、せんこうしょぶんのいほうをしゅちょうできるか、というもんだいです。\nげんそくは、できません。\nなぜなら、せんこうしょぶんをあらそうきかんがすぎているのに、こうぞくしょぶんのなかで、せんこうしょぶんをむしかえすと、ほうりつかんけいのあんていをそこなうからです。\n\nただし、れいがいがあります。\nせんこうしょぶんとこうぞくしょぶんが、いちれんのてつづきとしてつよくむすびついていること。\nせんこうしょぶんのだんかいで、じゅうぶんにあらそうきかいがなかったこと。\nこうぞくしょぶんのだんかいで、せんこうしょぶんのいほうをしゅちょうさせないと、きゅうさいがじっしつてきにふじゅうぶんになること。\nこのようなじじょうがあると、れいがいてきに、いほうせいのしょうけいをみとめるほうこうになります。\n\nたぬきのもりがたでは、あんぜんにんていとけんちくかくにんが、じかんてきにも、きのうてきにもむすびついています。\nじゅうみんが、けんちくかくにんのとりけしそしょうで、せんこうするあんぜんにんていのいほうをいいたい、というこうぞうです。\nかぜいしょぶんとたいのうしょぶんは、げんそくとして、いほうせいのしょうけいがみとめられにくいです。\nかぜいしょぶんはぜいがくをかくていするしょぶん、たいのうしょぶんはかくていしたぜいをちょうしゅうするしょぶんで、やくわりがちがうからです。\n\nだいよんこう　さいりょう\n\nぎょうせいさいりょうとは、ほうりつのわくのなかで、ぎょうせいちょうに、はんだんやせんたくのよちがみとめられることです。\nようけんさいりょうは、ほうりつようけんにあたるかどうかのはんだんによちがあるばあいです。\nこうかさいりょうは、しょぶんをするか、しないか、どのしょぶんをえらぶかに、よちがあるばあいです。\nただし、さいりょうは、なんでもじゆうにできるといういみではありません。\nほうりつのもくてき、しゅし、ひれいげんそく、びょうどうげんそくにしばられます。\n\nさいばんしょは、ぎょうせいちょうのはんだんを、ただおきかえるわけではありません。\nしかし、さいりょうけんのはんいをこえたり、らんようしたりしたばあいは、とりけすことができます。\nここででるのが、ぎょうせいじけんそしょうほうさんじゅうじょうです。\n\nじっさいのとうあんでは、はんだんかていしんさがだいじです。\nはんだんかていしんさとは、けつろんそのものをさいばんしょがとりかえるのではなく、けつろんにいたるまでのかんがえかたに、もんだいがないかをみるしんさです。\nたいせつなじじょうをみていないなら、こうりょふじん。\nみるべきでないじじょうをみたなら、たじこうりょ。\nじじつのひょうかが、あきらかにふごうりなら、ひょうかのあきらかなふごうりです。\n\nこうべぜいかんじけんは、さいりょうしんさのきほんです。\nまったくじじつのきそをかくばあい、または、しゃかいつうねんじょういちじるしくだとうせいをかくばあいは、さいりょうけんのいつだつ、らんようとしていほうになります。\nえほばのしょうにんけんどうじつぎきょひじけんでは、だいたいそちのけんとうをじゅうぶんにしなかったことがもんだいになりました。\nここでは、しんこうのじゆうだけでなく、ぎょうせいさいりょうのはんだんかていとしておぼえてください。\n\nだいごこう　ふかん\n\nふかんとは、ぎょうせいこういのしゅたるほうこうかに、つけくわえられる、したがういしひょうじです。\nたとえば、きょかをするが、いっていのぎむをつける、きげんをつける、じょうけんをつける、というばあいです。\nふかんは、めいぶんのこんきょがあるばあい、または、さいりょうこういであるばあいに、つけることができます。\nきそくこういには、げんそくとして、じゆうにふかんをつけられません。\nなぜなら、ようけんをみたせば、そのこうかをあたえなければならないからです。\n\nじょうけんとは、しょうらいはっせいするかどうかふかくじつなじじつに、こうかのはっせいまたはしょうめつをかからせるものです。\nふたんとは、じゅえきてきしょぶんにくわえて、あいてに、さくいまたはふさくいのぎむをかすものです。\nじょうけんにいはんすると、こうかのはっせいやしょうめつにかかわります。\nふたんにいはんしても、ただちにしょぶんのこうかがしょうめつするとはかぎりません。\nここは、ぶんげんではなく、じっしつでみます。\nきょかしょに、じょうけん、とかかれていても、じっしつがふたんなら、ふたんです。\n\nいほうなふかんだけをとりけせるか、というもんだいもだいじです。\nしょぶんほんたいとふかんが、わけられるなら、ふかんだけのとりけしがみとめられることがあります。\nしかし、ふかんをとりけすと、しょぶんほんたいをのこすことが、ほうれいのしゅしやぎょうせいちょうのいしにはんする、またはこうえきじょうのじゅうだいなししょうがでるなら、ふかんだけをとりけすことはできません。\nえいぎょうくいきをえいちくにかぎる、というばあいは、それがふかんなのか、それともきょかのないようそのものなのかを、まずみます。\n\nだいろっこう　かし、むこう、ちゆ、てんかん\n\nかしあるぎょうせいしょぶんとは、せいりつようけん、ないよう、てつづきなどに、ほうてきなけっかんがあるしょぶんです。\nふつうのいほうにとどまるなら、とりけされるまではゆうこうです。\nしかし、かしがじゅうだいで、かつ、あきらかなばあいは、とうぜんむこうになります。\nこれが、じゅうだいめいはくせつです。\n\nじゅうだいせいとは、ほうきのじゅうようなぶぶんにいはんすることです。\nめいはくせいとは、しょぶんせいりつのとうしょから、がいけいじょう、きゃっかんてきに、いっけんしてあきらかなことです。\nあとからくわしくしらべてはじめてわかるようなかしは、めいはくせいがみとめられにくいです。\nただし、けんりきゅうさいのひつようがとくにつよいばあいには、めいはくせいがゆるめられることがあります。\nこれを、めいはくせいほじゅうようけんせつとしておさえます。\n\nかしのちゆとは、しょぶんじにあったてつづきじょうまたはけいしきじょうのかしが、じごてきなじじょうで、いほうせいをうしなうとひょうかされることです。\nただし、てつづきほしょうのしゅしをそこなうばあい、あんいにちゆをみとめてはいけません。\nとくに、りゆうていじのふそくは、あとからせつめいしたからよい、とはなりにくいです。\n\nいほうこういのてんかんとは、えいしょぶんとしては、いほうだが、びいしょぶんとしてはようけんをみたすばあいに、びいしょぶんとしてこうりょくをみとめるか、というはなしです。\nてんかんでは、ぎょうせいちょうのいし、ようけんのじゅうそく、あいてへのふいうちにならないことをみます。\nちゆは、おなじしょぶんのかしがなおるはなし。\nてんかんは、べつのしょぶんとしてみるはなしです。\n\nだいななこう　しょっけんとりけしとてっかい\n\nしょっけんとりけしは、しょぶんがせいりつしたとうしょからある、いほうまたはふとうなかしをりゆうに、しょぶんのこうりょくをうしなわせることです。\nてっかいは、てきほうにせいりつしたしょぶんについて、あとからしょうじたじじょうをりゆうに、こうりょくをうしなわせることです。\nみわけかたは、りゆうが、はじめからあったか、あとからでてきたかです。\n\nじゅえきてきしょぶんをとりけしたり、てっかいしたりすると、あいてのりえきをうばいます。\nあいては、そのしょぶんをしんらいして、せいかつやえいぎょうをくみたてているかもしれません。\nだから、ぎょうせいちょうがうごけるとしても、むせいげんではありません。\nこうえきじょうのひつよう、あいてのしんらい、きせきせい、ふりえきのていど、ふりえきかんわそちをくらべます。\n\nしょうがいこうせいねんきんかごきゅうふじけんでは、ぎょうせいちょうのあやまりで、ながいあいだきゅうふがされ、じゅきゅうしゃはそれをぜんていにせいかつしていました。\nじゅきゅうしゃのきせきせいがとぼしく、そきゅうてきにとりけしてへんかんをもとめるのは、しんらいほごやこうへいにはんするとされました。\nぎょうせいざいさんのもくてきがいしようきょかは、もともと、ぎょうせいざいさんほんらいのもくてきのためにひつようなら、てっかいされうるという、ないざいてきせいやくがあります。\nそのため、こうえきじょうのひつようによるてっかいでは、げんそくとしてそんしつほしょうはひつようありません。\nただし、とくべつのぎせいがあるなら、ほしょうがもんだいになります。\n\nだいはちこう　てつづきてきかし\n\nここも、こんかいとくにあついところです。\nてつづきてきかしとは、しょぶんのないようそのものではなく、しょぶんにいたるまでのてつづきにいほうがあることです。\nたとえば、ちょうもんをしない。\nべんめいのきかいをあたえない。\nりゆうていじがふじゅうぶん。\nしんさきじゅんやしょぶんきじゅんのあつかいがおかしい。\nこのようなばあいです。\n\nてつづきてきかしがあると、つねにしょぶんがとりけされるわけではありません。\nしかし、けつろんがどうせおなじだったからもんだいない、とかんたんにいってはいけません。\nてつづきには、あいてにぼうぎょのきかいをあたえるいみがあります。\nぎょうせいちょうに、しんちょうでごうりてきなはんだんをさせるいみがあります。\nまた、しょぶんのとうめいせいをたかめるいみがあります。\nだから、いはんしたてつづきのしゅし、てつづきのじゅうようせい、あいてのぼうぎょけんへのえいきょう、しょぶんけっかへのえいきょうをみます。\n\nりゆうていじぎむのしゅしは、ぎょうせいちょうのしいをおさえることと、あいてのふふくもうしたてをしやすくすることです。\nりゆうていじは、たんに、きじゅんにてきごうしない、とかくただけではたりません。\nどのじじつに、どのほうれいやきじゅんを、どのようにあてはめたのかが、あいてにわかるていどでひつようです。\nしょぶんじのりゆうていじがふじゅうぶんなのに、そしょうになってからりゆうをたすことで、かしがなおるか。\nこれは、げんそくとしてしんちょうにみます。\nなぜなら、りゆうていじは、しょぶんのときに、あいてにりゆうをしらせるためのものだからです。\n\nちょうもんとべんめいのちがいもおさえます。\nちょうもんは、めんきょとりけしのような、じゅうだいなふりえきしょぶんでひつようとなる、ていねいなじぜんてつづきです。\nこうとうしんりをちゅうしんとし、しゅさいしゃがてつづきをすすめ、いっていのぶんしょえつらんけんもあります。\nべんめいのきかいふよは、よりかんいなてつづきで、ふつうはしょめんでいいけんをのべるかたちです。\nめんきょとりけしなのに、ちょうもんではなく、かんいなべんめいだけだった、というばあいは、てつづきてきかしがもんだいになります。\n\nなりたしんぽうじけんでは、けんぽうさんじゅういちじょうのてきせいてつづきのほしょうが、ぎょうせいてつづきにもおよびうるかがもんだいになりました。\nはんれいは、およびうることをひていしていません。\nただし、つねにけいじてつづきとおなじじぜんてつづきがひつようとはしていません。\nせいげんされるけんりりえきのせいしつ、せいげんのていど、こうえきじょうのひつよう、じぜんてつづきをおくことのこんなんさを、そうごうこうりょします。\n\nだいきゅうこう　しんせいにたいするしょぶん\n\nしんせいにたいするしょぶんとは、きょにんかなどをもとめるしんせいにたいして、ぎょうせいちょうがこたえるしょぶんです。\nしんせいがほうれいじょうのけいしきようけんをみたしてとうたつしたら、ぎょうせいちょうには、しんさをはじめ、きょひまたはきょかなどのこたえをするぎむがしょうじます。\nほうれいじょうのこんきょのない、じぜんきょうぎがまだだから、というりゆうで、ふじゅりやへんれいをするのは、もんだいです。\n\nしんさきじゅんは、しんせいをみとめるかどうかをはんだんするきじゅんです。\nしんせいしゃがよそくできるようにし、ぎょうせいのしいをおさえるため、せっていとこうひょうがもとめられます。\nひょうじゅんしょりきかんは、しょりにふつうようするきかんのめやすです。\nこれは、しんせいしゃのよそくかのうせいをたかめるものですが、きかんをすぎたら、ただちにしょぶんがいほうになる、というものではありません。\n\nしんせいをきょひするときも、りゆうていじがひつようです。\nきじゅんにてきごうしない、とだけかくのではふじゅうぶんです。\nどのじじつが、どのしんさきじゅんのどこにあたらないのかを、わかるようにかきます。\n\nだいじゅっこう　ぎょうせいしどう\n\nぎょうせいしどうとは、ぎょうせいきかんが、ぎょうせいもくてきをじつげんするために、あいてのにんいのきょうりょくをもとめる、しどう、かんこく、じょげんなどです。\nぎょうせいしょぶんとちがい、ちょくせつのほうこうかはありません。\nだから、ふつうはとりけしそしょうのたいしょうにはなりません。\n\nしかし、ぎょうせいしどうは、けんげんをはいけいにすると、じじつじょうのきょうせいになりやすいです。\nとくに、きょにんかけんげんをもつぎょうせいちょうが、しどうにしたがわないなら、しょうらいふりえきにする、というふんいきをつくると、あいてはしたがわざるをえません。\nそこで、ぎょうせいしどうは、にんいせいがたいせつです。\nしたがわなかったことをりゆうに、ふりえきなあつかいをしてはいけません。\nしんせいにかんれんするぎょうせいしどうでは、しんせいしゃがしたがわないいしをしめしたら、しどうをつづけるために、しんせいしょりをおくらせてはいけません。\n\nまた、ほうれいいはんのぜせいをもとめるぎょうせいしどうについては、あいては、ぎょうせいしどうのちゅうしとうをもとめることができます。\nこれは、とりけしそしょうとはちがう、てつづきてきなきゅうさいとしておさえます。\n\nだいじゅういっこう　ふふくしんさ\n\nぎょうせいふふくしんさは、ぎょうせいちょうのしょぶんまたはふさくいにふふくがあるひとが、ぎょうせいきかんにたいして、かんいじんそくなきゅうさいをもとめるせいどです。\nとりけしそしょうは、さいばんしょによるしほうきゅうさいです。\nふふくしんさは、ぎょうせいないぶのきゅうさいであり、いほうだけでなく、ふとうももんだいにできます。\nここが、とりけしそしょうとのちがいです。\n\nしんさせいきゅうには、きかんせいげんがあります。\nいつまでもあらそえると、ぎょうせいじょうのほうりつかんけいがふあんていになるからです。\nいっぽうで、けんりきゅうさいのきかいもひつようです。\nつまり、きかんせいげんは、きゅうさいとあんていのちょうせいです。\n\nしんりいんせいどは、しょぶんにかんよしていないしょくいんがしんりをすることで、こうせいせいとちゅうりつせいをたかめるためのせいどです。\nさいけつには、きゃっか、ききゃく、にんようがあります。\nきゃっかは、ふてきほうだから、ほんあんにはいらずにしりぞけること。\nききゃくは、てきほうだが、りゆうがないとしてしりぞけること。\nにんようは、りゆうがあるとして、しょぶんのとりけしやへんこうをすることです。\nしんさせいきゅうをしても、しょぶんのこうりょくやしっこうは、げんそくとしてとまりません。\nただし、じゅうだいなそんがいをふせぐために、しっこうていしがもんだいになります。\n\nだいじゅうにこう　そうろんとまとめ\n\nほうりつによるぎょうせいのげんりとは、ぎょうせいかつどうが、ほうりつにしたがっておこなわれなければならない、というげんりです。\nほうりつのゆういは、ぎょうせいがほうりつにはんしてはならないことです。\nほうりつのりゅうほは、けんりやじゆうをせいげんするようなぎょうせいかつどうには、ほうりつのこんきょがひつようだということです。\n\nてきせいてつづきげんりとは、けつろんだけでなく、けつろんにいたるまでのてつづきが、こうせいでとうめいであることに、かちをみとめるかんがえかたです。\nだから、てつづきてきかしは、ただのけいしきみすではありません。\nあいてのぼうぎょけん、ぎょうせいのしいよくせい、せいどへのしんらいにかかわります。\n\nさいごに、とうあんのかたをおぼえます。\nまず、もんだいとなるこういが、ぎょうせいしょぶんかをみる。\nつぎに、こうていりょく、ふかそうりょく、さいりょう、ふかん、かし、てつづきのどのろんてんかをきめる。\nつぎに、きはんをかく。\nそのあと、じじつをあてはめる。\nさいごに、けつろんをみじかくかく。\nこのかたをくずさなければ、はじめてみるじれいでも、とうあんのほねぐみはつくれます。\n\nいちにちでやるなら、さいしょにこのこうぎをききます。\nつぎに、さいゆうせんのこうていりょく、ふかそうりょく、てつづきてきかしを、くちでせつめいします。\nそのあと、ぎょうせいしょぶんろんのもんどうをまわします。\nさいごに、ぎょうせいしどう、ふふくしんさ、そうろんを、くらべるかたちでしあげます。\nおぼえるじゅんばんは、ことば、しゅし、ようけん、れいがい、とうあんのかた、です。\n";

function ce(tag, attrs, children) {
  const node = document.createElement(tag);
  attrs = attrs || {};
  for (const [k,v] of Object.entries(attrs)) {
    if (k === "class") node.className = v;
    else if (k === "text") node.textContent = v;
    else if (k === "dataset") Object.assign(node.dataset, v);
    else if (k.startsWith("on") && typeof v === "function") node.addEventListener(k.slice(2), v);
    else node.setAttribute(k, v);
  }
  for (const child of (children || [])) {
    node.append(child && child.nodeType ? child : document.createTextNode(String(child)));
  }
  return node;
}

    if (focusMode === "kou" && !/(公定力|不可争力|国家賠償|違法性の承継|課税処分|滞納処分)/.test(q["テーマ"] + q["問題"] + q["模範解答"])) return false;

    if (focusMode === "appeal" && q["分野"] !== "不服審査") return false;
    if (focusMode === "weak" && !state.weak[q["No."]] && Number(state.scores[q["No."]] ?? 3) >= 2) return false;
    if (search) {
      const blob = norm([q["No."], q["優先"], q["分野"], q["テーマ"], q["問題"], q["模範解答"], q["採点キーワード"]].join(" "));
      if (!blob.includes(search)) return false;
    }
    return true;
  });
}
function currentCard() {
  const list = filteredQuestions();
  if (!list.length) return null;
  if (currentIndex >= list.length) currentIndex = 0;
  if (currentIndex < 0) currentIndex = list.length - 1;
  return list[currentIndex];
}
function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  answerVisible = false;
  render();
}
function setScore(no, score) {
  state.scores[no] = score;
  if (score >= 2) state.weak[no] = false;
  saveState();
  render();
}
function toggleWeak(no) {
  state.weak[no] = !state.weak[no];
  saveState();
  render();
}
function renderSummary() {
  const done = QUESTIONS.filter(q => state.scores[q["No."]] !== undefined).length;
  const weak = QUESTIONS.filter(q => state.weak[q["No."]] || Number(state.scores[q["No."]] ?? 3) < 2).length;
  const list = filteredQuestions();
  const card = currentCard();
  byId("doneCount").textContent = done;
  byId("weakCount").textContent = weak;
  byId("targetCount").textContent = list.length;
  byId("nowNo").textContent = card ? card["No."] : "-";
  byId("bar").style.width = Math.round(done / QUESTIONS.length * 100) + "%";
  updateToolbar();
}
function cardHeader(card) {
  const score = state.scores[card["No."]];
  const badgeClass = card["優先"] === "A+" ? "badge hot" : "badge";
  return ce("div", {}, [
    ce("span", {class:badgeClass, text:card["優先"]}),
    " ",
    ce("span", {class:"badge", text:card["分野"]}),
    " ",
    ce("span", {class:"badge", text:"No." + card["No."]}),
    " ",
    ce("span", {class: state.weak[card["No."]] ? "badge hot" : "badge ok", text: state.weak[card["No."]] ? "弱点" : "通常"}),
    " ",
    ce("span", {class:"badge", text: score === undefined ? "未採点" : score + "点"})
  ]);
}
function renderPlan(root) {
  root.append(
    ce("h2", {text:"1日で潰す流れ"}),
    ce("p", {text:"最初にひらがな講義を通しで聞き、次に熱い論点を口頭で説明し、最後に答案入力でキーワードを落としていないか確認する構成です。"})
  );
  const sched = [
    ["0:00 - 0:35", "ひらがな講義を通しで聞く。全体像、行政処分、公定力・不可争力、手続的瑕疵の地図を作る。"],
    ["0:35 - 1:25", "熱い論点だけを問答。公定力、不可争力、違法性の承継、手続的瑕疵、理由提示を優先。"],
    ["1:25 - 2:30", "行政処分論のA問題。処分性、裁量、附款、瑕疵、職権取消し・撤回を一気に回す。"],
    ["2:30 - 3:10", "行政指導。不利益取扱い禁止、申請処理遅延禁止、処分性との境界を押さえる。"],
    ["3:10 - 3:50", "不服審査。取消訴訟との違い、審査請求期間、審理員、裁決、執行停止を押さえる。"],
    ["3:50 - 4:40", "答案入力。短くてもよいので、定義、趣旨、判断枠組み、あてはめ、結論の型で書く。"],
    ["最後", "弱点だけを再回転。0点・1点のカードを2点以上にする。"]
  ];
  const grid = ce("div", {class:"schedule"});
  sched.forEach(([time, task]) => {
    grid.append(ce("div", {class:"time", text:time}), ce("div", {text:task}));
  });
  root.append(grid);
  root.append(ce("hr"));
  root.append(ce("h3", {text:"最優先の順番"}));
  root.append(ce("p", {text:"1. 公定力と不可争力　2. 手続的瑕疵と理由提示　3. 行政処分性　4. 違法性の承継　5. 裁量　6. 附款　7. 職権取消し・撤回　8. 行政指導　9. 不服審査"}));
  const row = ce("div", {class:"pillrow"});
  [
    ["hot","熱い論点を開く"],
    ["procedure","手続的瑕疵を開く"],
    ["kou","公定力・不可争力を開く"],
    ["all","全問を開く"]
  ].forEach(([mode,label]) => {
    row.append(ce("button", {class: mode==="hot" ? "hot" : "", text:label, onclick:()=>{ focusMode=mode; currentIndex=0; setTab("drill"); renderSummary(); }}));
  });
  root.append(row);
}
function renderLecture(root) {
  root.append(
    ce("h2", {text:"内容理解用 ひらがな講義"}),
    ce("p", {class:"meta", text:"読み上げアプリに入れる前提で、講義調にしてあります。問答ではなく、流れで理解するための文章です。"})
  );
  const actions = ce("div", {class:"pillrow"}, [
    ce("button", {class:"primary", text:"この講義を読み上げ", onclick:()=>speakLong(LECTURE)}),
    ce("button", {text:"停止", onclick:()=>stopSpeech()}),
    ce("button", {text:"講義をコピー", onclick:()=>copyText(LECTURE)})
  ]);
  root.append(actions);
  root.append(ce("pre", {class:"lecture", text:LECTURE}));
}
function renderDrill(root) {
  const card = currentCard();
  if (!card) {
    root.append(ce("h2", {text:"対象問題がありません"}), ce("p", {text:"フィルターを解除してください。"}));
    return;
  }
  root.append(cardHeader(card));
  root.append(ce("h2", {class:"card-title", text:card["テーマ"]}));
  root.append(ce("div", {class:"question", text:card["問題"]}));
  const controls = ce("div", {class:"pillrow"}, [
    ce("button", {class:"primary", text:answerVisible ? "答えを隠す" : "答えを見る", onclick:()=>{ answerVisible = !answerVisible; render(); }}),
    ce("button", {text:"問題を読む", onclick:()=>speakLong(card["問題"])}),
    ce("button", {text:"答えを読む", onclick:()=>speakLong(card["模範解答"])}),
    ce("button", {class:state.weak[card["No."]] ? "hot" : "", text:state.weak[card["No."]] ? "弱点解除" : "弱点登録", onclick:()=>toggleWeak(card["No."])})
  ]);
  root.append(controls);
  if (answerVisible) {
    const ans = ce("div", {class:"answer"}, [
      ce("h3", {text:"模範解答"}),
      ce("p", {text:card["模範解答"]}),
      ce("h3", {text:"採点キーワード"}),
      renderKeywords(keywords(card), []),
      ce("p", {class:"meta", text:"答案注意：" + card["答案注意"]})
    ]);
    root.append(ans);
  }
  root.append(ce("hr"));
  root.append(ce("p", {class:"meta", text:"自己採点：3点＝説明できる、2点＝骨子は言える、1点＝単語だけ、0点＝無理"}));
  root.append(scoreButtons(card));
}
function scoreButtons(card) {
  const row = ce("div", {class:"pillrow"});
  [3,2,1,0].forEach(s => {
    row.append(ce("button", {class:s>=2 ? "ok" : "hot", text:s + "点", onclick:()=>setScore(card["No."], s)}));
  });
  return row;
}
function renderEssay(root) {
  const card = currentCard();
  if (!card) {
    root.append(ce("h2", {text:"対象問題がありません"}));
    return;
  }
  root.append(cardHeader(card));
  root.append(ce("h2", {class:"card-title", text:"答案入力：" + card["テーマ"]}));
  root.append(ce("div", {class:"question", text:card["問題"]}));
  const ta = ce("textarea", {id:"answerBox", placeholder:"ここに自分の答案を入力。短くてもよいので、定義→趣旨→判断枠組み→あてはめ→結論の順で書く。"});
  ta.value = state.answers[card["No."]] || "";
  ta.addEventListener("input", () => {
    state.answers[card["No."]] = ta.value;
    saveState();
  });
  root.append(ce("label", {text:"自分の答案"}), ta);
  const result = ce("div", {id:"checkResult"});
  root.append(ce("div", {class:"pillrow"}, [
    ce("button", {class:"primary", text:"キーワード確認", onclick:()=>checkEssay(card)}),
    ce("button", {text:"模範解答を表示", onclick:()=>{ answerVisible = !answerVisible; render(); }}),
    ce("button", {text:"入力を読む", onclick:()=>speakLong(byId("answerBox").value)})
  ]));
  root.append(result);
  if (answerVisible) {
    root.append(ce("div", {class:"answer"}, [
      ce("h3", {text:"模範解答"}),
      ce("p", {text:card["模範解答"]}),
      ce("h3", {text:"採点キーワード"}),
      renderKeywords(keywords(card), []),
      ce("p", {class:"meta", text:"答案注意：" + card["答案注意"]})
    ]));
  }
  root.append(ce("hr"), scoreButtons(card));
}
function renderKeywords(kws, hit) {
  const box = ce("div", {class:"keyword-list"});
  kws.forEach(k => box.append(ce("span", {class:"kw " + (hit.includes(k) ? "hit" : (hit.length ? "miss" : "")), text:k})));
  return box;
}
function checkEssay(card) {
  const text = norm(byId("answerBox").value);
  const kws = keywords(card);
  const hit = kws.filter(k => text.includes(norm(k)));
  const miss = kws.filter(k => !hit.includes(k));
  const box = byId("checkResult");
  clear(box);
  box.append(ce("h3", {text:"キーワード確認結果"}));
  box.append(ce("p", {text:`入っているキーワード：${hit.length} / ${kws.length}`}));
  box.append(renderKeywords(kws, hit));
  if (miss.length) {
    box.append(ce("p", {class:"meta", text:"不足：" + miss.join("、")}));
  } else {
    box.append(ce("p", {class:"meta", text:"主要キーワードは一通り入っています。次は文章のつながりを確認してください。"}));
  }
}
function renderWeak(root) {
  const weakList = QUESTIONS.filter(q => state.weak[q["No."]] || Number(state.scores[q["No."]] ?? 3) < 2);
  root.append(ce("h2", {text:"弱点一覧"}));
  root.append(ce("p", {class:"meta", text:"0点・1点、または弱点登録した問題です。ここだけを最後に回してください。"}));
  if (!weakList.length) {
    root.append(ce("p", {text:"弱点はありません。未採点のA+をもう一周してください。"}));
    return;
  }
  const list = ce("div", {class:"list"});
  weakList.forEach(q => {
    list.append(ce("div", {class:"item"}, [
      ce("strong", {text:`No.${q["No."]}　${q["テーマ"]}`}),
      ce("div", {class:"meta", text:q["問題"]}),
      ce("button", {text:"この問題を開く", onclick:()=>{ focusMode="all"; byId("priorityFilter").value="all"; byId("fieldFilter").value="all"; byId("searchBox").value=""; currentIndex = QUESTIONS.findIndex(x => x["No."] === q["No."]); setTab("drill"); }})
    ]));
  });
  root.append(list);
}
function render() {
  const root = byId("screen");
  clear(root);
  if (activeTab === "plan") renderPlan(root);
  if (activeTab === "lecture") renderLecture(root);
  if (activeTab === "drill") renderDrill(root);
  if (activeTab === "essay") renderEssay(root);
  if (activeTab === "weak") renderWeak(root);
  renderSummary();
}
function syncTabs() {
  document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b.dataset.tab === activeTab));
}
function nextCard(delta) {
  const list = filteredQuestions();
  if (!list.length) return;
  if (activeTab !== "drill" && activeTab !== "essay") {
    activeTab = "drill";
    syncTabs();
  }
  currentIndex = (currentIndex + delta + list.length) % list.length;
  answerVisible = false;
  render();
}
function randomCard() {
  const list = filteredQuestions();
  if (!list.length) return;
  if (activeTab !== "drill" && activeTab !== "essay") {
    activeTab = "drill";
    syncTabs();
  }
  currentIndex = Math.floor(Math.random() * list.length);
  answerVisible = false;
  render();
}

function toggleAnswerFromToolbar() {
  const card = currentCard();
  if (!card) return;
  if (activeTab !== "drill" && activeTab !== "essay") {
    activeTab = "drill";
    syncTabs();
    answerVisible = true;
    render();
    return;
  }
  answerVisible = !answerVisible;
  render();
}
function scoreCurrent(score) {
  const card = currentCard();
  if (!card) return;
  setScore(card["No."], score);
}
function toggleCurrentWeak() {
  const card = currentCard();
  if (!card) return;
  toggleWeak(card["No."]);
}
function readCurrentQuestion() {
  const card = currentCard();
  if (card) speakLong(card["問題"]);
}
function readCurrentAnswer() {
  const card = currentCard();
  if (card) speakLong(card["模範解答"]);
}
function updateToolbar() {
  const status = byId("toolbarStatus");
  if (!status) return;
  const list = filteredQuestions();
  const card = currentCard();
  const done = QUESTIONS.filter(q => state.scores[q["No."]] !== undefined).length;
  const weak = QUESTIONS.filter(q => state.weak[q["No."]] || Number(state.scores[q["No."]] ?? 3) < 2).length;
  const cardButtons = ["toolPrevBtn","toolNextBtn","toolRandomBtn","toolAnswerBtn","toolReadQBtn","toolReadABtn","toolWeakBtn","toolScore3","toolScore2","toolScore1","toolScore0"];
  cardButtons.forEach(id => { const b = byId(id); if (b) b.disabled = !card; });
  if (!card) {
    status.replaceChildren(ce("strong", {text:"対象問題なし"}), document.createTextNode("　フィルターを解除してください。"));
    return;
  }
  const pos = Math.min(currentIndex + 1, list.length);
  const score = state.scores[card["No."]];
  status.replaceChildren(
    ce("strong", {text:`No.${card["No."]} ${card["テーマ"]}`}),
    document.createTextNode(`　${pos}/${list.length}問　完了${done}/${QUESTIONS.length}　弱点${weak}　${score === undefined ? "未採点" : score + "点"}`)
  );
  const ans = byId("toolAnswerBtn");
  if (ans) ans.textContent = answerVisible && (activeTab === "drill" || activeTab === "essay") ? "答え隠す" : "答え見る";
  const weakBtn = byId("toolWeakBtn");
  if (weakBtn) {
    weakBtn.textContent = state.weak[card["No."]] ? "弱点解除" : "弱点登録";
    weakBtn.classList.toggle("hot", !!state.weak[card["No."]]);
  }
  [[3,"toolScore3"],[2,"toolScore2"],[1,"toolScore1"],[0,"toolScore0"]].forEach(([n,id]) => {
    const b = byId(id);
    if (b) b.classList.toggle("score-active", Number(score) === n);
  });
  ["toolDrillBtn","toolEssayBtn","toolWeakListBtn"].forEach(id => { const b = byId(id); if (b) b.classList.remove("active"); });
  if (activeTab === "drill" && byId("toolDrillBtn")) byId("toolDrillBtn").classList.add("active");
  if (activeTab === "essay" && byId("toolEssayBtn")) byId("toolEssayBtn").classList.add("active");
  if (activeTab === "weak" && byId("toolWeakListBtn")) byId("toolWeakListBtn").classList.add("active");
}
function attachToolbarEvents() {
  byId("toolPrevBtn").addEventListener("click", () => nextCard(-1));
  byId("toolNextBtn").addEventListener("click", () => nextCard(1));
  byId("toolRandomBtn").addEventListener("click", randomCard);
  byId("toolAnswerBtn").addEventListener("click", toggleAnswerFromToolbar);
  byId("toolDrillBtn").addEventListener("click", () => setTab("drill"));
  byId("toolEssayBtn").addEventListener("click", () => setTab("essay"));
  byId("toolWeakListBtn").addEventListener("click", () => setTab("weak"));
  byId("toolReadQBtn").addEventListener("click", readCurrentQuestion);
  byId("toolReadABtn").addEventListener("click", readCurrentAnswer);
  byId("toolWeakBtn").addEventListener("click", toggleCurrentWeak);
  byId("toolScore3").addEventListener("click", () => scoreCurrent(3));
  byId("toolScore2").addEventListener("click", () => scoreCurrent(2));
  byId("toolScore1").addEventListener("click", () => scoreCurrent(1));
  byId("toolScore0").addEventListener("click", () => scoreCurrent(0));
}
function attachKeyboardShortcuts() {
  document.addEventListener("keydown", ev => {
    const tag = ev.target && ev.target.tagName;
    if (["INPUT", "TEXTAREA", "SELECT"].includes(tag) || ev.target?.isContentEditable) return;
    if (ev.key === "ArrowLeft") { ev.preventDefault(); nextCard(-1); }
    else if (ev.key === "ArrowRight") { ev.preventDefault(); nextCard(1); }
    else if (ev.key === " ") { ev.preventDefault(); toggleAnswerFromToolbar(); }
    else if (ev.key === "w" || ev.key === "W") { ev.preventDefault(); toggleCurrentWeak(); }
    else if (["0","1","2","3"].includes(ev.key)) { ev.preventDefault(); scoreCurrent(Number(ev.key)); }
  });
}

function copyText(text) {
  navigator.clipboard?.writeText(text);
}
function speakLong(text) {
  if (!("speechSynthesis" in window)) return;
  stopSpeech();
  const chunks = String(text).replace(/。/g, "。\\n").split(/\\n+/).map(s => s.trim()).filter(Boolean);
  speechQueue = chunks;
  speakNext();
}
function speakNext() {
  if (!speechQueue.length) return;
  const msg = new SpeechSynthesisUtterance(speechQueue.shift());
  msg.lang = "ja-JP";
  msg.rate = 0.96;
  msg.pitch = 1.0;
  msg.onend = speakNext;
  window.speechSynthesis.speak(msg);
}
function stopSpeech() {
  speechQueue = [];
  if ("speechSynthesis" in window) window.speechSynthesis.cancel();
}
function exportProgress() {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "行政法_暗記進捗.json";
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}

function init() {
  const fields = unique(QUESTIONS.map(q => q["分野"]));
  const sel = byId("fieldFilter");
  fields.forEach(f => sel.append(ce("option", {value:f, text:f})));
  document.querySelectorAll(".tab").forEach(btn => btn.addEventListener("click", () => setTab(btn.dataset.tab)));
  byId("prevBtn").addEventListener("click", () => nextCard(-1));
  byId("nextBtn").addEventListener("click", () => nextCard(1));
  byId("randomBtn").addEventListener("click", randomCard);
  byId("priorityFilter").addEventListener("change", () => { currentIndex=0; render(); });
  byId("fieldFilter").addEventListener("change", () => { currentIndex=0; render(); });
  byId("searchBox").addEventListener("input", () => { currentIndex=0; render(); });
  byId("exportBtn").addEventListener("click", exportProgress);
  byId("resetBtn").addEventListener("click", () => {
    if (!resetArmed) {
      resetArmed = true;
      byId("resetBtn").textContent = "もう一度押すと初期化";
      setTimeout(()=>{ resetArmed=false; byId("resetBtn").textContent = "初期化"; }, 2500);
      return;
    }
    state = {scores:{}, weak:{}, answers:{}};
    saveState();
    resetArmed = false;
    byId("resetBtn").textContent = "初期化";
    render();
  });
  document.querySelectorAll("[data-focus]").forEach(btn => btn.addEventListener("click", () => {
    focusMode = btn.dataset.focus;
    currentIndex = 0;
    answerVisible = false;
    render();
  }));
  attachToolbarEvents();
  attachKeyboardShortcuts();
  render();
}
init();
</script>
</body>
</html>
