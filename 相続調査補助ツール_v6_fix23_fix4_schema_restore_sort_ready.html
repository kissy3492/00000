            });
        }
        
        // 残高推移分析（改良版）
        function analyzeBalanceHistory() {
            const baseYear = parseInt(document.getElementById('baseYear').value);
            const inheritanceDate = systemData.inheritanceDate;
            
            systemData.processedData.balanceByPerson = {};
            
            systemData.family.forEach(person => {
                const personData = {
                    name: person.name,
                    accounts: {},
                    yearlyTotal: {},
                    inheritanceTotal: 0
                };
                
                const personTx = systemData.transactions.filter(tx => tx.name === person.name);
                
                personTx.forEach(tx => {
                    const accountKey = `${tx.bank}_${tx.branch}_${tx.accountNumber}`;
                    if (!personData.accounts[accountKey]) {
                        personData.accounts[accountKey] = {
                            bank: tx.bank,
                            branch: tx.branch,
                            accountNumber: tx.accountNumber,
                            accountType: tx.accountType,
                            transactions: [],
                            yearlyBalance: {},
                            inheritanceBalance: 0,
                            openDate: null,
                            closeDate: null
                        };
                    }
                    personData.accounts[accountKey].transactions.push(tx);
                    
                    if (tx.flags.includes('口座開設')) {
                        personData.accounts[accountKey].openDate = tx.date;
                    }
                    if (tx.flags.includes('口座解約')) {
                        personData.accounts[accountKey].closeDate = tx.date;
                    }
                });
                
                Object.values(personData.accounts).forEach(account => {
                    for (let year = baseYear - 4; year <= baseYear; year++) {
                        const yearEnd = `${year}-12-31`;
                        const balance = getBalanceAtDate(account.transactions, yearEnd, true, account.openDate, account.closeDate);
                        account.yearlyBalance[year] = balance;
                        
                        if (!personData.yearlyTotal[year]) {
                            personData.yearlyTotal[year] = 0;
                        }
                        if (balance.value !== null) {
                            personData.yearlyTotal[year] += balance.value;
                        }
                    }
                    
                    const inhBalance = getBalanceAtDate(account.transactions, inheritanceDate, true, account.openDate, account.closeDate);
                    account.inheritanceBalance = inhBalance;
                    if (inhBalance.value !== null) {
                        personData.inheritanceTotal += inhBalance.value;
                    }
                });
                
                systemData.processedData.balanceByPerson[person.name] = personData;
            });
        }
        
        // 特定日の残高取得（改良版）
        function getBalanceAtDate(transactions, targetDate, withInterpolation = false, openDate = null, closeDate = null) {
            const target = new Date(targetDate);
            let result = { value: null, isInterpolated: false };
            
            // 開設日前なら残高0
            if (openDate && new Date(openDate) > target) {
                result.value = 0;
                return result;
            }
            
            // 解約日後なら残高なし（nullを返す）
            if (closeDate && new Date(closeDate) < target) {
                return result;
            }
            
            const balanceTx = transactions.filter(tx => tx.balance > 0);
            if (balanceTx.length === 0) return result;
            
            let closestBefore = null;
            let closestBeforeDate = null;
            let closestAfter = null;
            let closestAfterDate = null;
            
            balanceTx.forEach(tx => {
                const txDate = new Date(tx.date);
                
                if (txDate <= target) {
                    if (!closestBeforeDate || txDate > closestBeforeDate) {
                        closestBeforeDate = txDate;
                        closestBefore = tx;
                    }
                } else {
                    if (!closestAfterDate || txDate < closestAfterDate) {
                        closestAfterDate = txDate;
                        closestAfter = tx;
                    }
                }
            });
            
            if (closestBefore) {
                result.value = closestBefore.balance;
                
                if (withInterpolation && targetDate.endsWith('-12-31')) {
                    const yearEnd = new Date(targetDate);
                    const daysDiff = (yearEnd - closestBeforeDate) / (1000 * 60 * 60 * 24);
                    if (daysDiff > 30) {
                        result.isInterpolated = true;
                    }
                }
                
                return result;
            }
            
            // 口座開設前
            const firstTx = transactions[0];
            if (firstTx && new Date(firstTx.date) > target) {
                result.value = 0;
                return result;
            }
            
            // 補完
            if (closestAfter && withInterpolation) {
                result.value = closestAfter.balance;
                result.isInterpolated = true;
                return result;
            }
            
            return result;
        }
        
        // 資金移動検出（高度版）
        function detectMoneyTransfersAdvanced(maxDays, errorRate) {
            systemData.processedData.transfers = [];
            systemData.processedData.suspiciousTransfers = [];
            
            const withdrawals = systemData.transactions.filter(tx => tx.withdrawal > 0);
            const deposits = systemData.transactions.filter(tx => tx.deposit > 0);
            
            const usedDeposits = new Set();
            const allMatches = [];
            
            withdrawals.forEach(withdrawal => {
                const wDate = new Date(withdrawal.date);
                const wAmount = withdrawal.withdrawal;
                
                deposits.forEach(deposit => {
                    if (usedDeposits.has(deposit.id)) return;
                    
                    const dDate = new Date(deposit.date);
                    const daysDiff = (dDate - wDate) / (1000 * 60 * 60 * 24);
                    
                    if (daysDiff < 0 || daysDiff > maxDays) return;
                    
                    const amountDiff = Math.abs(deposit.deposit - wAmount);
                    const amountDiffRate = amountDiff / wAmount;
                    
                    if (amountDiffRate > errorRate) return;
                    
                    let score = 0;
                    score += daysDiff * 5;
                    score += amountDiffRate * 100;
                    
                    if (withdrawal.name === deposit.name) {
                        score += 50;
                    }
                    
                    const relationKey = `${withdrawal.name}_${deposit.name}`;
                    const relation = systemData.processedData.familyRelations[relationKey] || 'その他';
                    
                    // 関係性に基づくスコア調整
                    if (relation !== 'その他') {
                        score -= 20;
                        if (relation === '兄弟姉妹') {
                            score -= 10; // 兄弟間移動はより疑わしい
                        }
                    }
                    
                    // 関係不明者（世代4）が関わる場合はスコアを上げる
                    const withdrawPerson = systemData.family.find(f => f.name === withdrawal.name);
                    const depositPerson = systemData.family.find(f => f.name === deposit.name);
                    if ((withdrawPerson && withdrawPerson.generation === 4) || 
                        (depositPerson && depositPerson.generation === 4)) {
                        score += 30;
                    }
                    
                    // 関係不明者（世代4）が関わる場合はスコアを上げる
                    if (withdrawal.generation === 4 || deposit.generation === 4) {
                        score += 30;
                    }
                    
                    if (daysDiff === 0 && withdrawal.time && deposit.time) {
                        const wTime = parseTime(withdrawal.time);
                        const dTime = parseTime(deposit.time);
                        
                        if (dTime < wTime) {
                            score += 100;
                        } else {
                            const timeDiff = dTime - wTime;
                            if (timeDiff < 60) {
                                score -= 10;
                            }
                        }
                    }
                    
                    allMatches.push({
                        withdrawal: withdrawal,
                        deposit: deposit,
                        score: score,
                        daysDiff: daysDiff,
                        amountDiff: amountDiff,
                        amountDiffRate: amountDiffRate,
                        relation: relation
                    });
                });
            });
            
            allMatches.sort((a, b) => a.score - b.score);
            
            const usedWithdrawals = new Set();
            
            allMatches.forEach(match => {
                if (usedWithdrawals.has(match.withdrawal.id) || usedDeposits.has(match.deposit.id)) {
                    return;
                }
                
                if (match.score < 100) {
                    usedWithdrawals.add(match.withdrawal.id);
                    usedDeposits.add(match.deposit.id);
                    
                    const transfer = {
                        date: match.withdrawal.date,
                        from: match.withdrawal.name,
                        to: match.deposit.name,
                        amount: match.withdrawal.withdrawal,
                        fromBank: `${match.withdrawal.bank} ${match.withdrawal.branch}`,
                        toBank: `${match.deposit.bank} ${match.deposit.branch}`,
                        fromAccount: match.withdrawal.accountNumber,
                        toAccount: match.deposit.accountNumber,
                        depositDate: match.deposit.date,
                        daysDiff: match.daysDiff,
                        amountDiff: match.amountDiff,
                        amountDiffRate: match.amountDiffRate,
                        relation: match.relation,
                        score: match.score,
                        confidence: match.score < 50 ? 'high' : match.score < 80 ? 'medium' : 'low'
                    };
                    
                    systemData.processedData.transfers.push(transfer);
                    
                    match.withdrawal.flags.push('資金移動(出)');
                    match.deposit.flags.push('資金移動(入)');
                    
                    const annotation = `★資金移動: ${match.withdrawal.name}→${match.deposit.name} (${match.daysDiff}日後, 誤差${(match.amountDiffRate * 100).toFixed(1)}%)`;
                    match.withdrawal.annotations.push(annotation);
                    match.deposit.annotations.push(annotation);
                    
                    // 要注意パターンの検出
                    // 家族間で即日移動、または兄弟姉妹間で誤差5%未満の移動
                    if ((match.relation !== 'その他' && match.relation !== '' && match.daysDiff <= 1 && match.amountDiffRate < 0.01) ||
                        (match.relation === '兄弟姉妹' && match.amountDiffRate < 0.05 && match.daysDiff <= 7)) {
                        systemData.processedData.suspiciousTransfers.push(transfer);
                        match.withdrawal.annotations.push('★要注意：家族間即日資金移動');
                        match.deposit.annotations.push('★要注意：家族間即日資金移動');
                    }
                }
            });
        }
        
        // 時刻パース
        function parseTime(timeStr) {
            if (!timeStr) return 0;
            const parts = timeStr.split(':');
            return parseInt(parts[0]) * 60 + parseInt(parts[1] || 0);
        }
        
        // 原資不明取引検出（改良版）
        function detectUnknownSources(threshold) {
            systemData.processedData.unknownSources = [];
            
            systemData.transactions.forEach(tx => {
                if (tx.deposit >= threshold) {
                    let isUnknown = false;
                    let reason = '';
                    let confidence = 'low';
                    
                    const hasTransaction = tx.withdrawal > 0 || tx.deposit > 0;
                    
                    if (hasTransaction) {
                        if (!tx.description || tx.description.trim() === '') {
                            isUnknown = true;
                            reason = '摘要欄空白（窓口取引）';
                            confidence = 'high';
                        }
                        else if (tx.description === '入金' || 
                                 tx.description === '現金' || 
                                 tx.description === '現金入金' ||
                                 tx.description.includes('ATM')) {
                            isUnknown = true;
                            reason = `入金種別: ${tx.description}`;
                            confidence = 'medium';
                        }
                    }
                    
                    if (isUnknown) {
                        systemData.processedData.unknownSources.push({
                            ...tx,
                            reason: reason,
                            confidence: confidence
                        });
                        
                        if (!tx.flags.includes('原資不明')) {
                            tx.flags.push('原資不明');
                        }
                        
                        const recentMove = checkRecentAddressChange(tx.name, tx.date, 30);
                        if (recentMove) {
                            tx.annotations.push('★住所移動直後の原資不明入金（要確認）');
                        }
                        
                        if (tx.flags.includes('未成年')) {
                            tx.annotations.push('★未成年口座への原資不明入金（贈与の可能性）');
                        }
                    }
                }
            });
        }
        
        // 口座切替検出（高度版）
        function detectAccountSwitchAdvanced() {
            systemData.processedData.accountSwitch = [];
            
            const closeTransactions = systemData.transactions.filter(tx => tx.flags.includes('口座解約'));
            const openTransactions = systemData.transactions.filter(tx => tx.flags.includes('口座開設'));
            
            closeTransactions.forEach(closeTx => {
                const closeDate = new Date(closeTx.date);
                
                openTransactions.forEach(openTx => {
                    const openDate = new Date(openTx.date);
                    const daysDiff = (openDate - closeDate) / (1000 * 60 * 60 * 24);
                    
                    if (daysDiff >= -30 && daysDiff <= 30) {
                        let switchType = '通常';
                        let confidence = 'low';
                        
                        // 同一人物の口座切替
                        if (closeTx.name === openTx.name) {
                            switchType = '同一名義';
                            confidence = 'medium';
                        }
                        // 家族間の名義切替
                        else {
                            const relationKey = `${closeTx.name}_${openTx.name}`;
                            const relation = systemData.processedData.familyRelations[relationKey];
                            
                            if (relation && relation !== 'その他') {
                                switchType = `名義切替（${relation}）`;
                                confidence = 'high';
                                
                                // 親→孫など世代をまたぐ場合は特に注意
                                if (relation.includes('孫')) {
                                    switchType = `名義切替（親→孫）`;
                                    confidence = 'high';
                                }
                            } else {
                                switchType = '名義切替（関係不明）';
                                confidence = 'medium';
                            }
                        }
                        
                        systemData.processedData.accountSwitch.push({
                            closeTransaction: closeTx,
                            openTransaction: openTx,
                            daysDiff: daysDiff,
                            switchType: switchType,
                            confidence: confidence
                        });
                        
                        if (switchType !== '同一名義') {
                            closeTx.annotations.push(`★${switchType}: ${closeTx.name}→${openTx.name}`);
                            openTx.annotations.push(`★${switchType}: ${closeTx.name}→${openTx.name}`);
                        }
                    }
                });
            });
        }
        
        // タイムライン生成（拡張版）
        function generateTimeline(inheritancePeriod) {
            systemData.processedData.timeline = [];
            const inheritanceDate = new Date(systemData.inheritanceDate);
            
            // 重要イベントの抽出
            systemData.transactions.forEach(tx => {
                if (tx.flags.length > 0) {
                    const importance = tx.flags.includes('大額取引') || 
                                     tx.flags.includes('原資不明') || 
                                     tx.flags.includes('資金移動(出)') ? 'high' : 'medium';
                    
                    systemData.processedData.timeline.push({
                        date: tx.date,
                        type: 'transaction',
                        person: tx.name,
                        description: tx.annotations.join(', '),
                        importance: importance,
                        amount: Math.max(tx.withdrawal, tx.deposit),
                        editable: false
                    });
                }
            });
            
            // 住所変更イベント
            systemData.addresses.forEach(addr => {
                if (addr.startDate) {
                    systemData.processedData.timeline.push({
                        date: addr.startDate,
                        type: 'address',
                        person: addr.name,
                        description: `住所変更: ${addr.address}`,
                        importance: 'low',
                        editable: false
                    });
                }
            });
            
            // 相続開始日
            systemData.processedData.timeline.push({
                date: systemData.inheritanceDate,
                type: 'inheritance',
                person: systemData.family.find(f => f.isDeceased)?.name || '',
                description: '相続開始',
                importance: 'critical',
                editable: false
            });
            
            // 出生日イベント
            systemData.family.forEach(person => {
                if (person.birthDate) {
                    systemData.processedData.timeline.push({
                        date: person.birthDate,
                        type: 'birth',
                        person: person.name,
                        description: '出生',
                        importance: 'low',
                        editable: false
                    });
                }
            });
            
            // 婚姻日イベント
            const processedMarriages = new Set();
            systemData.family.forEach(person => {
                if (person.marriageDate && !processedMarriages.has(person.marriageDate)) {
                    const spouseName = person.spouse || '';
                    systemData.processedData.timeline.push({
                        date: person.marriageDate,
                        type: 'marriage',
                        person: person.name,
                        description: `婚姻${spouseName ? ` (${person.name} & ${spouseName})` : ''}`,
                        importance: 'medium',
                        editable: false
                    });
                    processedMarriages.add(person.marriageDate);
                }
            });
            
            // 重要な年齢イベント（18歳成人、60歳還暦等）
            const importantAges = [
                { age: 18, event: '成人（18歳）' },
                { age: 60, event: '還暦（60歳）' },
                { age: 70, event: '古稀（70歳）' },
                { age: 77, event: '喜寿（77歳）' },
                { age: 80, event: '傘寿（80歳）' },
                { age: 88, event: '米寿（88歳）' },
                { age: 90, event: '卒寿（90歳）' },
                { age: 99, event: '白寿（99歳）' }
            ];
            
            systemData.family.forEach(person => {
                if (person.birthDate) {
                    const birthDate = new Date(person.birthDate);
                    
                    importantAges.forEach(milestone => {
                        const milestoneDate = new Date(birthDate);
                        milestoneDate.setFullYear(birthDate.getFullYear() + milestone.age);
                        
                        // タイムラインの範囲内かチェック
                        const startDate = new Date(systemData.transactions[0]?.date || '1900-01-01');
                        const endDate = new Date(systemData.transactions[systemData.transactions.length-1]?.date || '2100-12-31');
                        
                        if (milestoneDate >= startDate && milestoneDate <= endDate) {
                            systemData.processedData.timeline.push({
                                date: milestoneDate.toISOString().split('T')[0],
                                type: 'life-event',
                                person: person.name,
                                description: milestone.event,
                                importance: milestone.age === 18 ? 'medium' : 'low',
                                editable: false
                            });
                        }
                    });
                }
            });
            
            // 転居関連イベントを追加
            systemData.processedData.addressRelatedEvents.forEach(event => {
                systemData.processedData.timeline.push({
                    date: event.date,
                    type: 'address-related',
                    person: event.person,
                    description: event.description,
                    importance: 'medium',
                    editable: false
                });
            });
            
            // ユーザー追加のタイムラインをマージ
            systemData.processedData.timeline = systemData.processedData.timeline.concat(
                systemData.processedData.userTimeline
            );
            
            // ソート
            systemData.processedData.timeline.sort((a, b) => 
                new Date(a.date) - new Date(b.date)
            );
        }
        
        // 住所マトリクス生成
        function generateAddressMatrix() {
            const baseYear = parseInt(document.getElementById('baseYear').value);
            const matrix = {};
            
            // 月単位でマトリクスを生成
            for (let year = baseYear - 2; year <= baseYear; year++) {
                for (let month = 1; month <= 12; month++) {
                    const dateKey = `${year}-${String(month).padStart(2, '0')}`;
                    matrix[dateKey] = {};
                    
                    systemData.family.forEach(person => {
                        const date = `${dateKey}-15`; // 月の中間日
                        matrix[dateKey][person.name] = getAddressAtDate(person.name, date) || '-';
                    });
                }
            }
            
            systemData.processedData.addressMatrix = matrix;
        }

                            categories.other.push(ann);
                        }
                    });
                    
                    systemData.processedData.annotations.set(key, tx.annotations.join(' / '));
                    systemData.processedData.annotationCategories.set(key, categories);

            });

                    for (let year = baseYear - 4; year <= baseYear; year++) {

        // 住所履歴ビュー
        function updateAddressView() {
            const container = document.getElementById('addresses-content');
            const inheritanceDate = systemData.inheritanceDate;
            const deceased = systemData.family.find(f => f.isDeceased);
            const deceasedInhAddr = deceased ? getAddressAtDate(deceased.name, inheritanceDate) : null;
            
            let html = '<h3 style="margin: 20px 0;">🏠 住所移転状況一覧</h3>';
            
            if (deceased && deceasedInhAddr) {
                const cohabitants = [];
                systemData.family.forEach(person => {
                    if (!person.isDeceased) {
                        const addr = getAddressAtDate(person.name, inheritanceDate);
                        if (addr === deceasedInhAddr) {
                            cohabitants.push(person.name);
                        }
                    }
                });
                
                if (cohabitants.length > 0) {
                    html += `
                        <div class="alert-card warning">
                            <h4>相続開始時の同居状況</h4>
                            <p>被相続人（${deceased.name}）と同居していた相続人：<strong>${cohabitants.join('、')}</strong></p>
                            <p>住所：${deceasedInhAddr}</p>
                        </div>
                    `;
                }
            }
            
            // 転居関連イベントがある場合
            if (systemData.processedData.addressRelatedEvents.length > 0) {
                html += `
                    <div class="address-analysis-card">
                        <h4>🏠 転居に伴う金融取引の詳細</h4>
                `;
                
                systemData.processedData.addressRelatedEvents.forEach(event => {
                    html += `
                        <div class="address-analysis-item">
                            <strong>${event.date}</strong> - ${event.person}：${event.description}
                            <br>関連住所：${event.relatedAddress}
                        </div>
                    `;
                });
                
                html += '</div>';
            }
            
            // 住所変遷マトリクス
            if (systemData.processedData.addressMatrix) {
                html += `
                    <div class="info-card">
                        <h4>📍 月別住所マトリクス</h4>
                        <div class="address-matrix-wrapper">
                            <table class="address-matrix">
                                <thead>
                                    <tr>
                                        <th>年月</th>
                `;
                
                systemData.family.forEach(person => {
                    html += `<th>${person.name}</th>`;
                });
                
                html += '</tr></thead><tbody>';
                
                const baseYear = parseInt(document.getElementById('baseYear').value);
                let prevRow = {};
                
                for (let year = baseYear - 2; year <= baseYear; year++) {
                    for (let month = 1; month <= 12; month++) {
                        const dateKey = `${year}-${String(month).padStart(2, '0')}`;
                        const row = systemData.processedData.addressMatrix[dateKey];
                        
                        html += '<tr>';
                        html += `<td class="person-header">${dateKey}</td>`;
                        
                        systemData.family.forEach(person => {
                            const currentAddr = row[person.name];
                            const prevAddr = prevRow[person.name];
                            let cellClass = '';
                            
                            if (currentAddr === '-') {
                                cellClass = '';
                            } else if (prevAddr && prevAddr !== currentAddr) {
                                cellClass = 'address-change';
                            } else if (deceased && currentAddr === deceasedInhAddr) {
                                cellClass = 'same-address';
                            } else {
                                cellClass = 'different-address';
                            }
                            
                            const shortAddr = currentAddr.length > 15 ? currentAddr.substring(0, 15) + '...' : currentAddr;
                            html += `<td class="${cellClass}" title="${currentAddr}">${shortAddr}</td>`;
                        });
                        
                        html += '</tr>';
                        prevRow = row;
                    }
                }
                
                html += '</tbody></table></div></div>';
            }
            
            // 個人別住所履歴
            systemData.family.forEach(person => {
                const addresses = systemData.addresses.filter(a => a.name === person.name);
                if (addresses.length === 0) return;
                
                const cardClass = person.isDeceased ? 'danger-highlight' : '';
                
                html += `
                    <div class="info-card ${cardClass}">
                        <h4>${person.name} （${person.relationship}）</h4>

                                    <tr>
                                        <th>期間</th>
                                        <th>住所</th>
                                        <th>居住年数</th>
                                        <th>相続時</th>
                                        <th>備考</th>
                                    </tr>
                                </thead>
                                <tbody>
                `;
                
                addresses.forEach(addr => {
                    const start = new Date(addr.startDate);
                    const end = addr.endDate ? new Date(addr.endDate) : new Date();
                    const years = Math.floor((end - start) / (365.25 * 24 * 60 * 60 * 1000));
                    const months = Math.floor(((end - start) % (365.25 * 24 * 60 * 60 * 1000)) / (30.44 * 24 * 60 * 60 * 1000));
                    
                    const isCurrent = !addr.endDate;
                    const inhDate = new Date(inheritanceDate);
                    const wasLivingHereDuringInheritance = start <= inhDate && (addr.endDate ? new Date(addr.endDate) >= inhDate : true);
                    
                    const isSameAsDeceased = deceased && deceasedInhAddr === addr.address && wasLivingHereDuringInheritance;
                    
                    html += `
                        <tr ${wasLivingHereDuringInheritance ? 'class="highlight-row"' : ''}>
                            <td>${addr.startDate} ～ ${addr.endDate || '現在'}</td>
                            <td>${addr.address}</td>
                            <td>${years}年${months > 0 ? `${months}ヶ月` : ''}</td>
                            <td>${wasLivingHereDuringInheritance ? '○' : '-'}</td>
                            <td>
                                ${isCurrent ? '<span class="annotation-badge badge-account-open">現住所</span>' : ''}
                                ${isSameAsDeceased ? '<span class="annotation-badge badge-cohabit">被相続人同居</span>' : ''}
                            </td>
                        </tr>
                    `;
                });
                
                html += '</tbody></table></div></div>';
            });
            
            container.innerHTML = html;
        }

        // バッジクラスの取得
        function getBadgeClass(annotation) {
            if (annotation.includes('大額')) return 'badge-large-amount';
            if (annotation.includes('原資不明')) return 'badge-unknown-source';
            if (annotation.includes('資金移動')) return 'badge-money-shift';
            if (annotation.includes('要注意')) return 'badge-suspicious-shift';
            if (annotation.includes('相続前後')) return 'badge-inheritance-period';
            if (annotation.includes('口座開設')) return 'badge-account-open';
            if (annotation.includes('口座解約')) return 'badge-account-close';
            if (annotation.includes('未成年')) return 'badge-minor';
            if (annotation.includes('被相続人') || annotation.includes('同居')) return 'badge-cohabit';
            if (annotation.includes('摘要')) return 'badge-blank-memo';
            if (annotation.includes('転居') || annotation.includes('住所')) return 'badge-address-related';
            return 'badge-life-event';
        }

        // 家系図ビュー（改良版 - SVGで関係線表示）
        function updateFamilyView() {
            const container = document.getElementById('family-content');
            
            let html = '<div class="family-tree-wrapper">';
            html += '<div class="zoom-controls">';
            html += '<button class="zoom-btn" onclick="zoomIn()">+</button>';
            html += '<button class="zoom-btn" onclick="zoomOut()">-</button>';
            html += '<button class="zoom-btn" onclick="zoomReset()">⟲</button>';
            html += '</div>';
            html += '<h2 class="text-center mb-20">相続関係図</h2>';
            
            // 被相続人を特定
            const deceased = systemData.family.find(f => f.isDeceased);
            if (!deceased) {
                html += '<div class="alert-card warning">被相続人が特定できません</div>';
                container.innerHTML = html;
                return;
            }
            
            // SVGで家系図を描画（サイズを拡大）
            html += '<svg class="family-tree-svg" id="familyTreeSvg" viewBox="0 0 1600 1200">';
            
            // 世代ごとの人物を整理（配偶者も同じ世代に含める）
            const generations = {
                0: [], // 被相続人、配偶者、兄弟
                1: [], // 子と子の配偶者
                2: [], // 孫と孫の配偶者
                3: [], // ひ孫
                4: []  // 関係不明
            };
            
            systemData.family.forEach(person => {
                const gen = person.generation;
                if (gen !== undefined && generations[gen]) {
                    generations[gen].push(person);
                } else {
                    generations[4].push(person); // 未定義の場合は関係不明へ
                }
            });
            
            // 各世代内で配偶者が隣り合うように並び替え
            Object.keys(generations).forEach(gen => {
                const sorted = [];
                const processed = new Set();
                
                generations[gen].forEach(person => {
                    if (processed.has(person.name)) return;
                    
                    sorted.push(person);
                    processed.add(person.name);
                    
                    // 配偶者がいる場合は隣に配置
                    if (person.spouse) {
                        const spouse = generations[gen].find(p => p.name === person.spouse);
                        if (spouse && !processed.has(spouse.name)) {
                            sorted.push(spouse);
                            processed.add(spouse.name);
                        }
                    }
                });
                
                generations[gen] = sorted;
            });
            
            // 各人物の位置を計算
            const positions = {};
            const ySpacing = 220; // 縦間隔を増やす
            const xSpacing = 240; // 横間隔も増やす
            const generationLabels = {
                0: '第0世代（被相続人・配偶者・兄弟）',
                1: '第1世代（子・子の配偶者）',
                2: '第2世代（孫・孫の配偶者）',
                3: '第3世代（ひ孫）',
                4: 'その他（関係不明）'
            };
            
            // 世代ラベルとメンバーを描画（0から順に上から下へ）
            let yOffset = 100;
            
            // 世代順に処理（0, 1, 2, 3, 4の順）
            ['0', '1', '2', '3', '4'].forEach(gen => {
                const people = generations[gen];
                if (people.length === 0) return;
                
                // 世代ラベル
                html += `<text x="800" y="${yOffset - 40}" text-anchor="middle" 
                              font-size="16" font-weight="bold" fill="#7f8c8d">
                              ${generationLabels[gen]}
                         </text>`;
                
                const xOffset = (1600 - (people.length - 1) * xSpacing) / 2;
                
                people.forEach((person, index) => {
                    positions[person.name] = {
                        x: xOffset + index * xSpacing,
                        y: yOffset
                    };
                });
                
                yOffset += ySpacing;
            });
            
            // 関係線を描画（親子関係と配偶者関係のみ）
            systemData.family.forEach(person => {
                // 親子関係の線（親が存在し、関係不明でない場合のみ）
                if (person.parent && positions[person.parent] && person.generation !== 4) {
                    const parent = systemData.family.find(f => f.name === person.parent);
                    if (parent && parent.generation !== 4) {
                        const parentPos = positions[person.parent];
                        const childPos = positions[person.name];
                        
                        if (parentPos && childPos) {
                            html += `<line x1="${parentPos.x}" y1="${parentPos.y + 60}" 
                                           x2="${childPos.x}" y2="${childPos.y - 60}" 
                                           class="relation-line parent-child" />`;
                        }
                    }
                }
                
                // 配偶者関係の線（同じ世代で隣り合っている場合のみ）
                if (person.spouse && positions[person.spouse]) {
                    const pos1 = positions[person.name];
                    const pos2 = positions[person.spouse];
                    
                    // 重複を避けるため、名前順で一方向のみ描画
                    // かつ、同じ世代（Y座標が同じ）の場合のみ
                    if (pos1 && pos2 && person.name < person.spouse && Math.abs(pos1.y - pos2.y) < 10) {
                        const midX = (pos1.x + pos2.x) / 2;
                        html += `<line x1="${pos1.x + 90}" y1="${pos1.y}" 
                                       x2="${pos2.x - 90}" y2="${pos2.y}" 
                                       class="relation-line spouse" />`;
                    }
                }
            });
            
            // 現在日付
            const currentDate = new Date().toISOString().split('T')[0];
            
            // 人物カードを描画
            systemData.family.forEach(person => {
                const pos = positions[person.name];
                if (!pos) return;
                
                // 相続開始時の住所
                const inheritanceAddress = getAddressAtDate(person.name, systemData.inheritanceDate);
                // 現在の住所
                const currentAddress = getAddressAtDate(person.name, currentDate);
                
                const balance = systemData.processedData.balanceByPerson[person.name];
                const inheritanceBalance = balance ? balance.inheritanceTotal : 0;
                
                // 年齢計算
                let inheritanceAge = person.ageAtInheritance;
                let currentAge = null;
                if (person.birthDate) {
                    if (!inheritanceAge && systemData.inheritanceDate) {
                        inheritanceAge = calculateAge(person.birthDate, systemData.inheritanceDate);
                    }
                    currentAge = calculateAge(person.birthDate, currentDate);
                }
                
                const rectWidth = 200; // 幅を拡大
                const rectHeight = 160; // 高さを拡大
                
                html += `<g class="family-member" transform="translate(${pos.x}, ${pos.y})">`;
                
                // 背景（性別によって形を変える）
                if (person.gender === 'male') {
                    // 男性は四角形
                    html += `<rect x="${-rectWidth/2}" y="${-rectHeight/2}" 
                                   width="${rectWidth}" height="${rectHeight}" 
                                   rx="8" ry="8" 
                                   fill="${person.isDeceased ? '#fadbd8' : 'white'}" 
                                   stroke="${person.isDeceased ? '#e74c3c' : '#3498db'}" 
                                   stroke-width="3" />`;
                } else if (person.gender === 'female') {
                    // 女性は角丸を大きく
                    html += `<rect x="${-rectWidth/2}" y="${-rectHeight/2}" 
                                   width="${rectWidth}" height="${rectHeight}" 
                                   rx="50" ry="50" 
                                   fill="${person.isDeceased ? '#fadbd8' : 'white'}" 
                                   stroke="${person.isDeceased ? '#e74c3c' : '#3498db'}" 
                                   stroke-width="3" />`;
                } else {
                    // 性別不明は通常の角丸
                    html += `<rect x="${-rectWidth/2}" y="${-rectHeight/2}" 
                                   width="${rectWidth}" height="${rectHeight}" 
                                   rx="8" ry="8" 
                                   fill="${person.isDeceased ? '#fadbd8' : 'white'}" 
                                   stroke="${person.isDeceased ? '#e74c3c' : '#7f8c8d'}" 
                                   stroke-width="3" />`;
                }
                
                // テキスト（Y座標を調整）
                let textY = -65;
                
                // 名前と続柄
                html += `<text x="0" y="${textY}" text-anchor="middle" font-weight="bold" font-size="14">${person.name}</text>`;
                textY += 16;
                html += `<text x="0" y="${textY}" text-anchor="middle" font-size="11" fill="#7f8c8d">${person.relationship}</text>`;
                textY += 14;
                
                // 生年月日
                if (person.birthDate) {
                    html += `<text x="0" y="${textY}" text-anchor="middle" font-size="10">生年月日: ${person.birthDate}</text>`;
                    textY += 12;
                }
                
                // 年齢情報
                if (inheritanceAge !== undefined && inheritanceAge !== null) {
                    html += `<text x="0" y="${textY}" text-anchor="middle" font-size="10">相続時${inheritanceAge}歳`;
                    if (currentAge !== null && !person.isDeceased) {
                        html += ` / 現在${currentAge}歳`;
                    }
                    html += '</text>';
                    textY += 12;
                }
                
                // 婚姻日
                if (person.marriageDate) {
                    html += `<text x="0" y="${textY}" text-anchor="middle" font-size="10" fill="#e91e63">婚姻日: ${person.marriageDate}</text>`;
                    textY += 12;
                }
                
                // 相続開始時住所
                if (inheritanceAddress) {
                    const shortAddr = inheritanceAddress.length > 20 ? inheritanceAddress.substring(0, 20) + '...' : inheritanceAddress;
                    html += `<text x="0" y="${textY}" text-anchor="middle" font-size="9" fill="#00796b">相続時住所: ${shortAddr}</text>`;
                    textY += 11;
                }
                
                // 現在住所（相続時と異なる場合のみ）
                if (currentAddress && currentAddress !== inheritanceAddress && !person.isDeceased) {
                    const shortAddr = currentAddress.length > 20 ? currentAddress.substring(0, 20) + '...' : currentAddress;
                    html += `<text x="0" y="${textY}" text-anchor="middle" font-size="9" fill="#1565c0">現住所: ${shortAddr}</text>`;
                    textY += 11;
                }
                
                // 残高
                html += `<text x="0" y="${textY}" text-anchor="middle" font-size="10" font-weight="bold">残高: ${inheritanceBalance.toLocaleString()}円</text>`;
                textY += 11;
                
                // 親の氏名（E列の情報）
                if (person.parentName && person.generation !== 4) {
                    html += `<text x="0" y="${textY}" text-anchor="middle" font-size="9" fill="#e74c3c">(${person.parentName}の子)</text>`;
                }
                
                html += '</g>';
            });
            
            html += '</svg>';
            html += '</div>';
            
            container.innerHTML = html;
        }

        function addTimelineEvent() {
            const date = document.getElementById('timeline-date').value;
            const person = document.getElementById('timeline-person').value;
            const type = document.getElementById('timeline-type').value;
            const description = document.getElementById('timeline-description').value;
            
            if (!date || !description) {
                showStatus('日付と説明は必須です', 'error');
                return;
            }
            
            const event = {
                date: date,
                type: type,
                person: person,
                description: description,
                importance: type === 'user-important' ? 'high' : 'medium',
                editable: true
            };
            
            systemData.processedData.userTimeline.push(event);
            
            // 全体のタイムラインを再生成
            const inheritancePeriod = parseInt(document.getElementById('inheritancePeriod').value);
            generateTimeline(inheritancePeriod);
            
            // フォームをクリア
            document.getElementById('timeline-date').value = '';
            document.getElementById('timeline-person').value = '';
            document.getElementById('timeline-type').value = 'user-event';
            document.getElementById('timeline-description').value = '';
            
            toggleTimelineAddForm();
            updateTimelineView();
            saveData();
            showStatus('イベントを追加しました', 'success');
        }
        
        function batchAddTimelineEvents() {
            const data = document.getElementById('batch-timeline-data').value;
            if (!data.trim()) {
                showStatus('データを入力してください', 'error');
                return;
            }
            
            const lines = data.trim().split('\n');
            let addedCount = 0;
            
            lines.forEach(line => {

        // 各種CSV生成関数
        function generateSummaryCSV() {
            const inheritanceDate = systemData.inheritanceDate;
            const totalTx = systemData.transactions.length;
            const flaggedTx = systemData.transactions.filter(tx => tx.flags.length > 0).length;
            
            let csv = '【相続税調査分析システム v9.0 - 総括レポート】\n';
            csv += `分析日時,${new Date().toLocaleString('ja-JP')}\n`;
            csv += `相続開始日,${inheritanceDate}\n`;
            csv += `総取引件数,${totalTx}\n`;
            csv += `要注意取引,${flaggedTx}\n\n`;
            
            csv += '氏名,続柄,相続時残高,口座数,要注意取引,原資不明,贈与受領（推定）\n';
            
            systemData.family.forEach(person => {
                const balanceData = systemData.processedData.balanceByPerson[person.name];
                const flaggedCount = systemData.transactions.filter(tx => 
                    tx.name === person.name && tx.flags.length > 0
                ).length;
                const unknownCount = systemData.processedData.unknownSources.filter(tx => 
                    tx.name === person.name
                ).length;
                
                const giftSummary = systemData.processedData.giftSummary[person.name];
                let totalGift = 0;
                if (giftSummary) {
                    Object.values(giftSummary).forEach(year => {
                        totalGift += year.total;
                    });
                }
                
                csv += `"${person.name}","${person.relationship}",`;
                csv += `${balanceData ? balanceData.inheritanceTotal : 0},`;
                csv += `${balanceData ? Object.keys(balanceData.accounts).length : 0},`;
                csv += `${flaggedCount},${unknownCount},${totalGift}\n`;
            });
            
            return csv;
        }
        
        function generateBalanceCSV() {
            const baseYear = parseInt(document.getElementById('baseYear').value);
            let csv = '【残高推移表】\n';
            
            Object.entries(systemData.processedData.balanceByPerson).forEach(([name, personData]) => {
                csv += `\n${name}の残高推移\n`;
                csv += '口座情報,';
                
                for (let year = baseYear - 4; year <= baseYear; year++) {
                    csv += `${year}年末,`;
                }
                csv += `相続開始日\n`;
                
                Object.values(personData.accounts).forEach(account => {
                    csv += `"${account.bank} ${account.branch} ${account.accountType} ${account.accountNumber}",`;
                    
                    for (let year = baseYear - 4; year <= baseYear; year++) {
                        const balance = account.yearlyBalance[year];
                        csv += `${balance && balance.value !== null ? balance.value : ''},`;
                    }
                    
                    const inhBalance = account.inheritanceBalance;
                    csv += `${inhBalance && inhBalance.value !== null ? inhBalance.value : ''}\n`;
                });
                
                csv += '合計,';
                for (let year = baseYear - 4; year <= baseYear; year++) {
                    csv += `${personData.yearlyTotal[year] || 0},`;
                }
                csv += `${personData.inheritanceTotal}\n`;
            });
            
            return csv;
        }

        function generateAddressesCSV() {
            let csv = '【住所履歴】\n';
            csv += '氏名,期間開始,期間終了,住所,居住年数,相続時居住\n';
            
            systemData.addresses.forEach(addr => {
                const start = new Date(addr.startDate);
                const end = addr.endDate ? new Date(addr.endDate) : new Date();
                const years = Math.floor((end - start) / (365.25 * 24 * 60 * 60 * 1000));
                
                const inhDate = new Date(systemData.inheritanceDate);
                const wasLiving = start <= inhDate && (addr.endDate ? new Date(addr.endDate) >= inhDate : true);
                
                csv += `"${addr.name}","${addr.startDate}","${addr.endDate || '現在'}",`;
                csv += `"${addr.address}",${years},${wasLiving ? '○' : ''}\n`;
            });
            
            return csv;
        }

        // =========================
        // 入力グリッド（Excel風）統合
        // =========================
        const INPUT_STORAGE_KEY = 'inherit_tool_input_v1';

        const gridDefs = {
            txGrid: {
                cols: [
                    '銀行名','支店名','氏名','科目','口座番号','日付','時刻','出金','入金','取扱店','機番','摘要','残高'
                ],
                defaultRows: 80
            },
            familyGrid: {
                cols: ['氏名','続柄','生年月日','相続開始日','親の氏名','婚姻日'],
                defaultRows: 40
            },
            addressGrid: {
                cols: ['氏名','住所','居住開始日'],
                defaultRows: 60
            }
        };

// =========================
        // 入力補助：日付・時刻・数値の正規化
        // =========================
        function pad2(n){ n = String(n); return n.length===1 ? '0'+n : n; }

        function parseJapaneseDateInput(s){
            if(s==null) return null;
            s = String(s).trim();
            if(!s) return null;

            // normalize separators
            const raw = s.replace(/\s+/g,'').replace(/年|月/g,'.').replace(/日/g,'').replace(/\//g,'.').replace(/-/g,'.');

            // ISO-ish yyyy.mm.dd
            let m = raw.match(/^([12]\d{3})\.(\d{1,2})\.(\d{1,2})$/);
            if(m){
                const y = Number(m[1]), mo = Number(m[2]), d = Number(m[3]);
                if(mo>=1 && mo<=12 && d>=1 && d<=31){
                    const dt = new Date(y, mo-1, d);
                    if(dt && dt.getFullYear()===y && dt.getMonth()===mo-1 && dt.getDate()===d){
                        return {date: dt, iso: `${y}-${pad2(mo)}-${pad2(d)}`};
                    }
                }
            }

            // Era formats (H30.5.1 / 平成30.5.1 / R7.1.6 / 令和元.5.1 etc.)
            m = raw.match(/^(R|令和|H|平成|S|昭和|T|大正|M|明治)(元|\d{1,2})\.(\d{1,2})\.(\d{1,2})$/);
            if(m){
                const era = m[1];
                const eraYear = (m[2]==='元') ? 1 : Number(m[2]);
                const mo = Number(m[3]);
                const d  = Number(m[4]);
                const base = (
                    (era==='R' || era==='令和') ? 2018 :
                    (era==='H' || era==='平成') ? 1988 :
                    (era==='S' || era==='昭和') ? 1925 :
                    (era==='T' || era==='大正') ? 1911 :
                    (era==='M' || era==='明治') ? 1867 : null
                );
                if(base!=null && eraYear>=1 && mo>=1 && mo<=12 && d>=1 && d<=31){
                    const y = base + eraYear;
                    const dt = new Date(y, mo-1, d);
                    if(dt && dt.getFullYear()===y && dt.getMonth()===mo-1 && dt.getDate()===d){
                        return {date: dt, iso: `${y}-${pad2(mo)}-${pad2(d)}`};
                    }
                }
            }

            // Compact digits: 3051 -> H30/5/1 (default Heisei), 300501 -> H30/05/01
            const digits = raw.match(/^([RHS TM]?)(\d{4,6})$/i);
            if(digits){
                const prefix = (digits[1]||'').toUpperCase();
                const num = digits[2];
                const y2 = Number(num.slice(0,2));
                let mo, d;
                if(num.length===4){
                    mo = Number(num.slice(2,3));
                    d  = Number(num.slice(3,4));
                } else if(num.length===5){
                    // try YY.M.DD first then YY.MM.D
                    const mo1 = Number(num.slice(2,3));
                    const d1  = Number(num.slice(3,5));
                    const mo2 = Number(num.slice(2,4));
                    const d2  = Number(num.slice(4,5));
                    if(mo1>=1 && mo1<=12 && d1>=1 && d1<=31){
                        mo = mo1; d = d1;
                    } else {
                        mo = mo2; d = d2;
                    }
                } else { // 6
                    mo = Number(num.slice(2,4));
                    d  = Number(num.slice(4,6));
                }
                if(mo>=1 && mo<=12 && d>=1 && d<=31){
                    // era inference
                    let base = 1988; // default Heisei (ユーザー要望寄り)
                    if(prefix==='R') base = 2018;
                    if(prefix==='S') base = 1925;
                    if(prefix==='T') base = 1911;
                    if(prefix==='M') base = 1867;
                    const y = base + y2;
                    const dt = new Date(y, mo-1, d);
                    if(dt && dt.getFullYear()===y && dt.getMonth()===mo-1 && dt.getDate()===d){
                        return {date: dt, iso: `${y}-${pad2(mo)}-${pad2(d)}`};
                    }
                }
            }

            
        // =========================
        // 取引期間つき日付解釈（元号なし→期間で候補絞り込み）
        //  - 元号あり / 西暦あり：確定
        //  - 元号なし：候補生成→期間内に1つなら確定、複数なら曖昧
        // =========================
        function parseJapaneseDateInputWithPeriod(s, periodStart, periodEnd){
            const base = parseJapaneseDateInput(s);
            // 元号あり/西暦あり/プレフィックス付き数字は parseJapaneseDateInput で確定させる
            // ただし、元号なしの数字だけは「平成固定」を避け、期間で絞り込む
            if(base){
                // 入力が明示的（元号や西暦）ならそのまま返す
                const raw = String(s||'').trim();
                const hasExplicitEra = /^(R|H|S|令和|平成|昭和|大正|明治)/.test(raw);
                const hasYear4 = /^[12]\d{3}[\.\/-]/.test(raw);
                const hasPrefixDigits = /^[RHS TM]?\d{4,6}$/i.test(raw) && /^[RHS TM]/i.test(raw);
                if(hasExplicitEra || hasYear4 || hasPrefixDigits){
                    // explicit date: still validate against the transaction period
                    if(base.date < periodStart || base.date > periodEnd){
                        return {status:'outOfRange', date: base.date, iso: base.iso, candidates: []};
                    }
                    return {status:'fixed', date: base.date, iso: base.iso, candidates: []};
                }
                // 元号なし4-6桁数字のときは、期間推定に回す
            }

            if(!periodStart || !periodEnd) return {status:'invalid', date:null, iso:'', candidates: []};

            const raw0 = String(s||'').trim();
            if(!raw0) return {status:'invalid', date:null, iso:'', candidates: []};

            // normalize fullwidth punctuation too
            const raw = raw0
                .replace(/[\s　]+/g,'')
                .replace(/[年月]/g,'.').replace(/日/g,'')
                .replace(/[\/／]/g,'.')
                .replace(/[\-ー−―]/g,'.')
                .replace(/[．。]/g,'.');

            // m.d / m.d. / m/d style without year
            let md = raw.match(/^(\d{1,2})\.(\d{1,2})$/);
            if(md){
                const mo = Number(md[1]), d = Number(md[2]);
                const cands = candidatesByMonthDay(mo,d,periodStart,periodEnd);
                return finalizeByCandidates(cands);
            }

            // digits only (3-6)
            const dig = raw.match(/^(\d{3,6})$/);
            if(dig){
                const num = dig[1];
                const parts = parseShorthandParts(num); // {y,mo,d,kind}
                if(parts.kind === 'ymd'){
                    const cands = candidatesByEraYMD(parts.y, parts.mo, parts.d).filter(dt=>dt>=periodStart && dt<=periodEnd);
                    return finalizeByCandidates(cands);
                }
                if(parts.kind === 'md'){
                    const cands = candidatesByMonthDay(parts.mo, parts.d, periodStart, periodEnd);
                    return finalizeByCandidates(cands);
                }
            }

            // fallback to original base if it existed
            if(base){
                if(base.date < periodStart || base.date > periodEnd){
                    return {status:'outOfRange', date: base.date, iso: base.iso, candidates: []};
                }
                return {status:'fixed', date: base.date, iso: base.iso, candidates: []};
            }
            return {status:'invalid', date:null, iso:'', candidates: []};

            function finalizeByCandidates(cands){
                // unique by day
                const uniq = [];
                const seen = new Set();
                cands.forEach(dt=>{
                    const k = dt.getFullYear()+'-'+pad2(dt.getMonth()+1)+'-'+pad2(dt.getDate());
                    if(!seen.has(k)){ seen.add(k); uniq.push(dt); }
                });
                if(uniq.length===1){
                    const dt = uniq[0];
                    const iso = dt.getFullYear()+'-'+pad2(dt.getMonth()+1)+'-'+pad2(dt.getDate());
                    return {status:'fixed', date: dt, iso, candidates: []};
                }
                if(uniq.length>1){
                    return {status:'ambiguous', date:null, iso:'', candidates: uniq};
                }
                return {status:'invalid', date:null, iso:'', candidates: []};
            }

            function parseShorthandParts(num){
                // supports:
                // 3051 -> y=30 mo=5 d=1
                // 300501 -> y=30 mo=05 d=01
                // 30051 -> y=30 mo=05 d=1
                // 951 -> y=9 mo=5 d=1
                // 51 -> md handled elsewhere
                if(num.length===3){
                    return {kind:'ymd', y:Number(num.slice(0,1)), mo:Number(num.slice(1,2)), d:Number(num.slice(2,3))};
                }
                if(num.length===4){
                    return {kind:'ymd', y:Number(num.slice(0,2)), mo:Number(num.slice(2,3)), d:Number(num.slice(3,4))};
                }
                if(num.length===5){
                    return {kind:'ymd', y:Number(num.slice(0,2)), mo:Number(num.slice(2,4)), d:Number(num.slice(4,5))};
                }
                if(num.length===6){
                    return {kind:'ymd', y:Number(num.slice(0,2)), mo:Number(num.slice(2,4)), d:Number(num.slice(4,6))};
                }
                return {kind:'invalid'};
            }

            function candidatesByEraYMD(yy, mo, d){
                if(!(mo>=1&&mo<=12&&d>=1&&d<=31)) return [];
                const res = [];
                const eras = [
                    {era:'R', base:2018},
                    {era:'H', base:1988},
                    {era:'S', base:1925}
                ];
                eras.forEach(e=>{
                    const y = e.base + yy;
                    const dt = new Date(y, mo-1, d);
                    if(dt && dt.getFullYear()===y && dt.getMonth()===mo-1 && dt.getDate()===d) res.push(dt);
                });
                return res;
            }

            function candidatesByMonthDay(mo,d, ps, pe){
                if(!(mo>=1&&mo<=12&&d>=1&&d<=31)) return [];
                const res = [];
                const yStart = ps.getFullYear();
                const yEnd = pe.getFullYear();
                for(let y=yStart; y<=yEnd; y++){
                    const dt = new Date(y, mo-1, d);
                    if(dt && dt.getFullYear()===y && dt.getMonth()===mo-1 && dt.getDate()===d){
                        if(dt>=ps && dt<=pe) res.push(dt);
                    }
                }
                return res;
            }
        }

        function parsePeriodInputToDate(id){
            const el = document.getElementById(id);
            if(!el) return null;
            const v = String(el.value||'').trim();
            const p = parseJapaneseDateInput(v);
            return p ? p.date : null;
        }

        // =========================

            });
            document.getElementById('dateResolveApplyBtn').addEventListener('click', ()=>{
                if(!window.__dateResolveCtx) return;
                const {items, onDone} = window.__dateResolveCtx;
                // validate selection
                for(let i=0;i<items.length;i++){
                    const name = 'dr_'+i;
                    if(!document.querySelector('input[name="'+name+'"]:checked')){
                        alert('未選択の行があります。候補を選択してください。');

                }
                items.forEach(it=>{
                    const iso = chosenByRaw.get(it.rawKey);
                    if(iso) setTxCellISODate(it.rowIndex, iso);
                });
                hideDateResolveModal();
                window.__dateResolveCtx = null;
                if(typeof onDone === 'function') onDone();

        function showDateResolveModal(items, onDone){
            ensureDateResolveModal();
            window.__dateResolveCtx = {items, onDone};
            buildDateResolveTable(items);
            const m = document.getElementById('dateResolveModal');
            m.style.display = 'block';
        }

        function hideDateResolveModal(){
            const m = document.getElementById('dateResolveModal');
            if(m) m.style.display = 'none';
        }

        function buildDateResolveTable(items){
            const tbl = document.getElementById('dateResolveTable');
            if(!tbl) return;
            // header
            const h = ['行','入力日付','銀行','支店','氏名','出金','入金','候補（和暦＋西暦）'];
            let html = '<thead><tr>'+h.map(x=>'<th style="position:sticky;top:0;background:#f6f6f6;z-index:1;">'+x+'</th>').join('')+'</tr></thead><tbody>';
            items.forEach((it,i)=>{
                const cands = it.candidates.map(dt=>{
                    const iso = dt.getFullYear()+'-'+pad2(dt.getMonth()+1)+'-'+pad2(dt.getDate());
                    const jp = toWarekiString(dt);
                    return {iso, jp};
                });
                html += '<tr>';
                html += '<td>'+(it.rowIndex+1)+'</td>';
                html += '<td>'+escapeHtml(it.rawKey)+'</td>';
                html += '<td>'+escapeHtml(it.bank||'')+'</td>';
                html += '<td>'+escapeHtml(it.branch||'')+'</td>';
                html += '<td>'+escapeHtml(it.name||'')+'</td>';
                html += '<td style="text-align:right;">'+escapeHtml(it.out||'')+'</td>';
                html += '<td style="text-align:right;">'+escapeHtml(it.in||'')+'</td>';
                html += '<td style="white-space:normal;">'+cands.map((x,idx)=>(
                    '<label style="display:block;cursor:pointer;">'+
                    '<input type="radio" name="dr_'+i+'" value="'+x.iso+'" style="margin-right:6px;">'+
                    escapeHtml(x.jp)+'（'+x.iso+'）'+
                    '</label>'
                )).join('')+'</td>';
                html += '</tr>';
            });
            html += '</tbody>';
            tbl.innerHTML = html;

            // auto-apply same raw: selecting one tries to select same iso for other rows with same rawKey
            tbl.querySelectorAll('input[type="radio"]').forEach(r=>{
                r.addEventListener('change', ()=>{
                    const name = r.name; // dr_i
                    const i = Number(name.split('_')[1]);
                    const ctx = window.__dateResolveCtx;
                    if(!ctx) return;
                    const rawKey = ctx.items[i].rawKey;
                    const iso = r.value;
                    ctx.items.forEach((it, j)=>{
                        if(it.rawKey !== rawKey) return;
                        const q = tbl.querySelector('input[name="dr_'+j+'"][value="'+iso+'"]');
                        if(q) q.checked = true;
                    });
                });
            });
        }

        function escapeHtml(s){
            s = String(s??'');
            return s.replace(/[&<>"']/g, ch=>({
                '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
            }[ch]));
        }

        function toWarekiString(dt){
            // Rough wareki: R/H/S only (sufficient for our candidates)
            const y = dt.getFullYear(), mo = dt.getMonth()+1, d=dt.getDate();
            if(y>=2019) return 'R'+(y-2018)+'.'+mo+'.'+d;
            if(y>=1989) return 'H'+(y-1988)+'.'+mo+'.'+d;
            if(y>=1926) return 'S'+(y-1925)+'.'+mo+'.'+d;
            return y+'.'+mo+'.'+d;
        }

        function setTxCellISODate(rowIndex, iso){
            const div = getCellDivSafe('txGrid', rowIndex, 5);
            if(div) div.textContent = iso;
        }

        // =========================
        // 日付解決（未確定があればモーダル）
        // =========================
        function resolveTxDatesIfNeeded(thenRun){
            const ps = parsePeriodInputToDate('txPeriodStart');
            const pe = parsePeriodInputToDate('txPeriodEnd');
            if(!ps || !pe || ps>pe){
                showStatus('取引期間（開始/終了）を正しく入力してください。','error');
                return;
            }
            const {rows} = getGridSize('txGrid');
            const items = [];
            for(let r=0;r<rows;r++){
                const dateStr = (getCellDivSafe('txGrid', r, 5)?.textContent||'').trim();
                if(!dateStr) continue;
                const p = parseJapaneseDateInputWithPeriod(dateStr, ps, pe);
                if(p.status==='fixed'){
                    // normalize to ISO to keep sorting stable
                    setTxCellISODate(r, p.iso);
                } else if(p.status==='ambiguous'){
                    items.push({
                        rowIndex:r,
                        rawKey: dateStr,
                        bank:(getCellDivSafe('txGrid', r, 0)?.textContent||'').trim(),
                        branch:(getCellDivSafe('txGrid', r, 1)?.textContent||'').trim(),
                        name:(getCellDivSafe('txGrid', r, 2)?.textContent||'').trim(),
                        out:(getCellDivSafe('txGrid', r, 7)?.textContent||'').trim(),
                        in:(getCellDivSafe('txGrid', r, 8)?.textContent||'').trim(),
                        candidates: p.candidates
                    });
                }
            }
            if(items.length){
                showDateResolveModal(items, ()=>{ if(typeof thenRun==='function') thenRun(); });
            } else {
                if(typeof thenRun==='function') thenRun();
            }
        }

        // Analyze click wrapper
        function onAnalyzeClicked(){
            resolveTxDatesIfNeeded(async ()=>{
                // Run sort before analysis so analysis sees time-ordered data
                sortTransactionsByDateTime('txGrid');
                await processAllFiles();
            });
        }

return null;
        }

        function normalizeTimeInput(s){
            if(s==null) return '';
            s = String(s).trim();
            if(!s) return '';
            const raw = s.replace(/\s+/g,'');
            // hh:mm
            let m = raw.match(/^([0-2]?\d):([0-5]\d)$/);
            if(m){
                const hh = Number(m[1]), mm = Number(m[2]);
                if(hh<=23) return `${pad2(hh)}:${pad2(mm)}`;
            }
            // hmm / hhmm
            m = raw.match(/^(\d{3,4})$/);
            if(m){
                const t = m[1];
                const hh = Number(t.length===3 ? t.slice(0,1) : t.slice(0,2));
                const mm = Number(t.length===3 ? t.slice(1,3) : t.slice(2,4));
                if(hh<=23 && mm<=59) return `${pad2(hh)}:${pad2(mm)}`;
            }
            return s; // leave as-is
        }

        function normalizeNumberInput(s){
            if(s==null) return '';
            s = String(s).trim();
            if(!s) return '';
            // remove commas and full-width digits
            s = s.replace(/,/g,'').replace(/[０-９]/g, ch => String.fromCharCode(ch.charCodeAt(0)-0xFEE0));
            return s;
        }

        function getCellDivSafe(gridId, r, c){
            return document.querySelector(`#${gridId} tbody div[data-grid="${gridId}"][data-r="${r}"][data-c="${c}"]`)
                || document.querySelector(`#${gridId} tbody div[data-r="${r}"][data-c="${c}"]`);
        }

        function normalizeCellOnBlur(gridId, r, c){
            const def = gridDefs[gridId];
            if(!def) return;
            const colName = def.cols[c] || '';
            const div = getCellDivSafe(gridId, r, c);
            if(!div) return;
            const v = div.textContent;

            // Date columns
            if(colName.includes('日')){
                // txGrid の「日付」だけは取引期間（開始/終了）が有効な場合に限り period-aware で解釈する
                if(gridId === 'txGrid' && (colName === '日付' || colName.includes('日付'))){
                    const ps = parsePeriodInputToDate('txPeriodStart');
                    const pe = parsePeriodInputToDate('txPeriodEnd');
                    let out = null;
                    if(ps && pe && ps<=pe){
                        out = parseJapaneseDateInputWithPeriod(v, ps, pe);
                    }else{
                        // 期間が無い場合は勝手に推定しない（読める形式だけ正規化）
                        out = parseJapaneseDateInput(v);
                    }
                    if(out && out.status==='fixed' && out.iso){
                        div.textContent = out.iso;
                    }else if(out && out.status==='invalid'){
                        div.classList.add('cell-invalid');
                    }
                }else{
                    // familyGrid / addressGrid 等：取引期間に依存しない通常の日付解釈
                    const out = parseJapaneseDateInput(v);
                    if(out && out.status==='fixed' && out.iso){
                        div.textContent = out.iso;
                    }else if(out && out.status==='invalid'){
                        div.classList.add('cell-invalid');
                    }
                }
                return;
            }

// Time columns
            else if(colName.includes('時刻')){
                const t = normalizeTimeInput(v);
                div.textContent = t;
            }
            // Number columns
            else if(['出金','入金','残高'].includes(colName)){
                div.textContent = normalizeNumberInput(v);
            }
        }

        function sortTransactionsByDateTime(gridId){
            if(gridId!=='txGrid') return;

            // Resolve/normalize dates first (may open modal). After this, date column should be ISO yyyy-mm-dd.
            resolveTxDatesIfNeeded(()=>{
                const ps = parsePeriodInputToDate('txPeriodStart');
                const pe = parsePeriodInputToDate('txPeriodEnd');
                if(!ps || !pe || ps>pe){
                    showStatus('取引期間（開始/終了）を正しく入力してください。','error');
                    return;
                }

                const {rows, cols} = getGridSize('txGrid');

                const data = [];
                for(let r=0;r<rows;r++){
                    const row = [];
                    let hasAny = false;
                    for(let c=0;c<cols;c++){
                        const div = getCellDivSafe('txGrid', r, c);
                        const val = div ? div.textContent : '';
                        if(val && String(val).trim()!=='') hasAny = true;
                        row.push(val);
                    }

                    // Build sortable key only if row has values
                    let key = null;
                    if(hasAny){
                        const dateISO = String(row[5]||'').trim();
                        const timeStr = normalizeTimeInput(String(row[6]||'').trim());
                        // Normalize time cell to keep consistency
                        row[6] = timeStr;

                        const d = parseJapaneseDateInputWithPeriod(dateISO, ps, pe);
                        if(d && d.status==='fixed' && d.date){
                            const hhmm = timeStr && /^\d{2}:\d{2}$/.test(timeStr) ? timeStr : '00:00';
                            key = d.date.getTime() + (parseInt(hhmm.slice(0,2),10)*60 + parseInt(hhmm.slice(3,5),10))*60000;
                            // Ensure ISO remains ISO
                            row[5] = d.iso;
                        } else {
                            // If somehow unresolved/out of range, keep at bottom of non-empty
                            key = Number.POSITIVE_INFINITY;
                        }
                    }
                    data.push({row, hasAny, key, idx:r});
                }

                const nonEmpty = data.filter(x=>x.hasAny);
                const empty = data.filter(x=>!x.hasAny);

                nonEmpty.sort((a,b)=>{
                    if(a.key!==b.key) return a.key-b.key;
                    return a.idx-b.idx;
                });

                const sorted = nonEmpty.concat(empty).map(x=>x.row);

                for(let r=0;r<rows;r++){
                    const src = sorted[r] || [];
                    for(let c=0;c<cols;c++){
                        const div = getCellDivSafe('txGrid', r, c);
                        if(div) div.textContent = src[c] ?? '';
                        // clear pending/invalid styles after a successful sort pass
                        if(div && c===5){
                            div.classList.remove('cell-pending');
                        }
                    }
                }

                scheduleAutosave();
                showStatus('取引を時系列（日付→時刻）でソートしました。', 'ok');
            });
        }

            

const gridState = {
            active: { gridId: 'txGrid', row: 0, col: 0 },
            selection: null,  // {gridId, r1,c1,r2,c2}
            lastFocusedCell: null, // {gridId,row,col}
        };

        function colLabel(n){ // 0->A
            let s = '';
            n += 1;
            while(n>0){
                let r = (n-1)%26;
                s = String.fromCharCode(65+r)+s;
                n = Math.floor((n-1)/26);
            }
            return s;
        }

        function ensureTbody(table){
            let tbody = table.querySelector('tbody');
            if(!tbody){
                tbody = document.createElement('tbody');
                table.appendChild(tbody);
            }
            return tbody;
        }

        function buildGrid(gridId, rows){
    const def = gridDefs[gridId];

    // ----- THEAD (2 rows: A/B/C.. + field name) -----

    def.cols.forEach((fieldName, i)=>{

        tr1.appendChild(th);

    thead.appendChild(tr1);

    // Row 2: field names
    const tr2 = document.createElement('tr');
    const corner2 = document.createElement('th');
    corner2.className = 'corner corner2';

    tr2.appendChild(corner2);

    def.cols.forEach((fieldName, i)=>{
        const th = document.createElement('th');
