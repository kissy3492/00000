        th.title = `${colLabel(i)} : ${fieldName}`;
        th.textContent = fieldName;
        tr2.appendChild(th);
    });
    thead.appendChild(tr2);

    table.appendChild(thead);

    const tbody = ensureTbody(table);
    for(let r=0;r<rows;r++){
        const tr = document.createElement('tr');

        const rowh = document.createElement('td');
        rowh.className = 'rowhdr';
        rowh.textContent = String(r+1);
        tr.appendChild(rowh);

        for(let c=0;c<def.cols.length;c++){
            const td = document.createElement('td');
            td.className = 'cell';
            td.dataset.r = String(r);
            td.dataset.c = String(c);

            const div = document.createElement('div');
            div.contentEditable = 'true';
            div.spellcheck = false;
            div.dataset.r = String(r);
            div.dataset.c = String(c);

            // focus handlers
            div.addEventListener('focus', ()=>{
                gridState.lastFocusedCell = {gridId, row:r, col:c};
                setActiveCell(gridId, r, c, true);
            });
            div.addEventListener('mousedown', (e)=> handleCellMouseDown(e, gridId, r, c));
            div.addEventListener('mousemove', (e)=> handleCellMouseMove(e, gridId, r, c));
            div.addEventListener('mouseup',   (e)=> handleCellMouseUp(e, gridId, r, c));
            div.addEventListener('paste', (e)=> handlePaste(e, gridId, r, c));
            div.addEventListener('blur', ()=> normalizeCellOnBlur(gridId, r, c));
                        div.addEventListener('input', ()=>{ scheduleAutosave(); updateProgress(); });

            td.appendChild(div);
            tr.appendChild(td);
        }
        tbody.appendChild(tr);
    }

    // Apply saved column widths (per grid)
    applySavedColWidths(gridId);
    // Setup column resizing on the first header row
    wireColResizing(gridId);
}

        function getGridSize(gridId){
            const def = gridDefs[gridId];
            const table = document.getElementById(gridId);
            const rows = table.querySelectorAll('tbody tr').length;
            const cols = def.cols.length;
            return {rows, cols};
        }

        function setGridRows(gridId, newRows){
            newRows = Math.max(1, Math.min(5000, Number(newRows||1)));
            const table = document.getElementById(gridId);
            const def = gridDefs[gridId];
            const tbody = ensureTbody(table);
            const current = tbody.querySelectorAll('tr').length;

            if(newRows === current) return;

            if(newRows < current){
                // 切り詰め
                for(let i=current-1;i>=newRows;i--){
                    tbody.removeChild(tbody.children[i]);
                }
                // row header renumber not needed (kept)
            }else{
                // 追加
                for(let r=current;r<newRows;r++){
                    const tr = document.createElement('tr');
                    const rowh = document.createElement('td');
                    rowh.className = 'rowhdr';
                    rowh.textContent = String(r+1);
                    tr.appendChild(rowh);
                    for(let c=0;c<def.cols.length;c++){
                        const td = document.createElement('td');
                        td.className = 'cell';
                        td.dataset.r = String(r);
                        td.dataset.c = String(c);

                        const div = document.createElement('div');
                        div.contentEditable = 'true';
                        div.spellcheck = false;
                        div.dataset.r = String(r);
                        div.dataset.c = String(c);
                        div.dataset.grid = gridId;
                        div.addEventListener('focus', ()=> setActiveCell(gridId, r, c, true));
                        div.addEventListener('mousedown', (e)=> beginSelection(gridId, r, c, e));
                        div.addEventListener('input', ()=> { scheduleAutosave(); updateProgress(); });
                        div.addEventListener('keydown', (e)=> handleGridKeydown(e, gridId, r, c));
                        div.addEventListener('paste', (e)=> handlePaste(e, gridId, r, c));

                        td.appendChild(div);
                        tr.appendChild(td);
                    }
                    tbody.appendChild(tr);
                }
            }
            // renumber row headers
            tbody.querySelectorAll('tr').forEach((tr, idx)=>{
                const rh = tr.querySelector('td.rowhdr');
                if(rh) rh.textContent = String(idx+1);
                tr.querySelectorAll('td.cell').forEach((td)=>{
                    const div = td.querySelector('div');
                    td.dataset.r = String(idx);
                    if(div){ div.dataset.r = String(idx); }
                });
            });

            scheduleAutosave();
            updateProgress();
        }

        function focusCell(gridId, r, c){
            const table = document.getElementById(gridId);
            const div = table.querySelector(`div[data-r="${r}"][data-c="${c}"]`);
            if(div){
                div.focus();
                // ensure visible
                div.scrollIntoView({block:'nearest', inline:'nearest'});
            }
        }

        function clearSelection(){
            document.querySelectorAll('.xl-grid td.cell.selected').forEach(td=>td.classList.remove('selected'));
            document.querySelectorAll('.xl-grid td.cell.active').forEach(td=>td.classList.remove('active'));
        }

        function applySelection(sel){
            clearSelection();
            if(!sel) return;
            const table = document.getElementById(sel.gridId);
            for(let r=sel.r1;r<=sel.r2;r++){
                for(let c=sel.c1;c<=sel.c2;c++){
                    const td = table.querySelector(`td.cell[data-r="${r}"][data-c="${c}"]`);
                    if(td) td.classList.add('selected');
                }
            }
            const activeTd = table.querySelector(`td.cell[data-r="${gridState.active.row}"][data-c="${gridState.active.col}"]`);
            if(activeTd) activeTd.classList.add('active');
        }

        function setActiveCell(gridId, r, c, fromFocus=false){
            gridState.active = {gridId, row:r, col:c};
            if(!gridState.selection || gridState.selection.gridId !== gridId){
                gridState.selection = {gridId, r1:r, c1:c, r2:r, c2:c};
            }
            applySelection(gridState.selection);
            if(!fromFocus) focusCell(gridId, r, c);
        }

        function beginSelection(gridId, r, c, e){
            // left button only
            if(e.button !== 0) return;
            setActiveCell(gridId, r, c, true);
            gridState.selection = {gridId, r1:r, c1:c, r2:r, c2:c};
            applySelection(gridState.selection);

            const move = (ev)=>{
                const cell = ev.target.closest('td.cell');
                if(!cell) return;
                const rr = Number(cell.dataset.r);
                const cc = Number(cell.dataset.c);
                const s = gridState.selection;
                if(!s || s.gridId !== gridId) return;
                s.r2 = rr;
                s.c2 = cc;
                normalizeSelection(s);
                applySelection(s);
            };
            const up = ()=>{
                document.removeEventListener('mousemove', move);
                document.removeEventListener('mouseup', up);
            };
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', up);
        }

        function normalizeSelection(sel){
            const r1 = Math.min(sel.r1, sel.r2);
            const r2 = Math.max(sel.r1, sel.r2);
            const c1 = Math.min(sel.c1, sel.c2);
            const c2 = Math.max(sel.c1, sel.c2);
            sel.r1=r1; sel.r2=r2; sel.c1=c1; sel.c2=c2;
        }

        function handleGridKeydown(e, gridId, r, c){
            const {rows, cols} = getGridSize(gridId);

            // Ctrl+C: TSV copy
            if(e.ctrlKey && !e.shiftKey && (e.key === 'c' || e.key === 'C')){
                e.preventDefault();
                copySelectionAsTSV();
                return;
            }
            // Ctrl+V handled by paste
            // Navigation
            const move = (nr, nc)=>{
                nr = Math.max(0, Math.min(rows-1, nr));
                nc = Math.max(0, Math.min(cols-1, nc));
                setActiveCell(gridId, nr, nc);
            };

            const key = e.key;
            if(key === 'ArrowUp'){ e.preventDefault(); move(r-1,c); return; }
            if(key === 'ArrowDown'){ e.preventDefault(); move(r+1,c); return; }
            if(key === 'ArrowLeft'){ e.preventDefault(); move(r,c-1); return; }
            if(key === 'ArrowRight'){ e.preventDefault(); move(r,c+1); return; }
            if(key === 'Enter'){ e.preventDefault(); move(r+1,c); return; }
            if(key === 'Tab'){ e.preventDefault(); move(r, c+1); return; }

            // Shift + arrows -> expand selection
            if(e.shiftKey && key.startsWith('Arrow')){
                e.preventDefault();
                if(!gridState.selection || gridState.selection.gridId !== gridId){
                    gridState.selection = {gridId, r1:r, c1:c, r2:r, c2:c};
                }
                const s = gridState.selection;
                if(key === 'ArrowUp') s.r2 = Math.max(0, s.r2-1);
                if(key === 'ArrowDown') s.r2 = Math.min(rows-1, s.r2+1);
                if(key === 'ArrowLeft') s.c2 = Math.max(0, s.c2-1);
                if(key === 'ArrowRight') s.c2 = Math.min(cols-1, s.c2+1);
                normalizeSelection(s);
                applySelection(s);
                return;
            }
        }

        function handlePaste(e, gridId, r, c){
            // TSV / newline paste
            const text = (e.clipboardData || window.clipboardData).getData('text');
            if(!text) return;
            if(!text.includes('\t') && !text.includes('\n') && !text.includes('\r')){
                // single cell paste -> allow default (but keep autosave)
                setTimeout(()=>{ scheduleAutosave(); updateProgress(); }, 0);
                return;
            }
            e.preventDefault();

            const rowsData = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
            // remove trailing empty line
            if(rowsData.length && rowsData[rowsData.length-1] === '') rowsData.pop();

            const gridSize = getGridSize(gridId);
            const table = document.getElementById(gridId);

            for(let i=0;i<rowsData.length;i++){
                const colsData = rowsData[i].split('\t');
                const rr = r+i;
                if(rr >= gridSize.rows) break;
                for(let j=0;j<colsData.length;j++){
                    const cc = c+j;
                    if(cc >= gridSize.cols) break;
                    const div = table.querySelector(`div[data-r="${rr}"][data-c="${cc}"]`);
                    if(div){
                        div.textContent = colsData[j];
                    }
                }
            }
            scheduleAutosave();
            updateProgress();
        }

        function copySelectionAsTSV(){
            const sel = gridState.selection;
            if(!sel) return;
            const table = document.getElementById(sel.gridId);
            const lines = [];
            for(let r=sel.r1;r<=sel.r2;r++){
                const vals = [];
                for(let c=sel.c1;c<=sel.c2;c++){
                    const div = table.querySelector(`div[data-r="${r}"][data-c="${c}"]`);
                    vals.push((div ? div.textContent : '').replace(/\t/g,' ').replace(/\r?\n/g,' '));
                }
                lines.push(vals.join('\t'));
            }
            const out = lines.join('\n');
            navigator.clipboard?.writeText(out).then(()=>{
                showStatus('選択範囲をTSV形式でコピーしました', 'success');
            }).catch(()=>{
                // fallback
                const ta = document.createElement('textarea');
                ta.value = out;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showStatus('選択範囲をTSV形式でコピーしました', 'success');
            });
        }

        function gridToRawData(gridId){
            const def = gridDefs[gridId];
            const table = document.getElementById(gridId);
            const {rows, cols} = getGridSize(gridId);

            const raw = [];
            // header row
            raw.push(def.cols.slice());
            for(let r=0;r<rows;r++){
                const row = [];
                let hasAny = false;
                for(let c=0;c<cols;c++){
                    const div = table.querySelector(`div[data-r="${r}"][data-c="${c}"]`);
                    const v = (div ? div.textContent.trim() : '');
                    if(v !== '') hasAny = true;
                    row.push(v);
                }
                if(hasAny) raw.push(row);
            }
            return raw;
        }

        function gridHasData(gridId){
            const table = document.getElementById(gridId);
            const any = table.querySelector('tbody div') && Array.from(table.querySelectorAll('tbody div')).some(d=>d.textContent.trim()!=='');
            return !!any;
        }

        // Toolbar actions
        function addRow(gridId){
            const {rows} = getGridSize(gridId);

        function deleteSelectedRow(gridId){
            // delete active row
            const active = gridState.active;
            if(active.gridId !== gridId) {
                showStatus('削除するには対象グリッド内のセルを選択してください', 'warning');

            tbody.querySelectorAll('tr').forEach((tr, idx)=>{
                const rh = tr.querySelector('td.rowhdr');
                if(rh) rh.textContent = String(idx+1);
                tr.querySelectorAll('td.cell').forEach(td=>{
                    const div = td.querySelector('div');
                    td.dataset.r = String(idx);
                    if(div) div.dataset.r = String(idx);
                });
            });
            const nr = Math.min(r, rows-2);
            setActiveCell(gridId, nr, 0);
            scheduleAutosave();
            updateProgress();
            showStatus('行を削除しました', 'success');
        }

        function clearGrid(gridId){
            const table = document.getElementById(gridId);

        function tsvExport(gridId){

                ta.select();
                document.execCommand('copy');

                showStatus('TSVをクリップボードにコピーしました', 'success');

        function tsvImport(gridId){
            const txt = prompt('TSVを貼り付けてください（Excelからコピーした内容をそのまま）');

        }

const GRID_UI_STORAGE_PREFIX = 'inherit_grid_ui_v1:';
const GRID_INPUT_STORAGE_KEY  = 'inherit_input_v1';

const gridRequired = {
    txGrid: [0,4,5],         // 銀行名, 口座番号, 日付
    familyGrid: [0,1],       // 氏名, 続柄（最低限）
    addressGrid: [0,1,2]     // 氏名, 住所, 居住開始日
};

function uiKey(gridId){ return GRID_UI_STORAGE_PREFIX + gridId; }

function getGridSize(gridId){
    const def = gridDefs[gridId];
    const table = document.getElementById(gridId);
    const rows = table?.querySelectorAll('tbody tr')?.length ?? def.defaultRows;
    const cols = def.cols.length;
    return {rows, cols};
}

function saveInputData(){
    try{
        const payload = {
            tx: gridToRawData('txGrid'),
            family: gridToRawData('familyGrid'),
            addr: gridToRawData('addressGrid')
        };
        localStorage.setItem(GRID_INPUT_STORAGE_KEY, JSON.stringify(payload));
    }catch(e){}
}
function loadInputData(){
    try{
        const s = localStorage.getItem(GRID_INPUT_STORAGE_KEY);
        if(!s) return;
        const payload = JSON.parse(s);
        const apply = (gridId, raw)=>{
            if(!raw || raw.length<=1) return;
            const data = raw.slice(1);
            const table = document.getElementById(gridId);
            const rows = table.querySelectorAll('tbody tr');
            for(let r=0;r<Math.min(rows.length, data.length);r++){
                for(let c=0;c<Math.min(gridDefs[gridId].cols.length, (data[r]?.length??0));c++){
                    const div = getCellDiv(gridId, r, c);
                    if(div) div.textContent = data[r][c] ?? '';
                }
            }
        };
        apply('txGrid', payload.tx);
        apply('familyGrid', payload.family);
        apply('addressGrid', payload.addr);
    }catch(e){}
}

let _autosaveTimer = null;
function scheduleAutosave(){
    if(_autosaveTimer) clearTimeout(_autosaveTimer);
    _autosaveTimer = setTimeout(()=>{ saveInputData(); }, 250);
}

function applySavedColWidths(gridId){
    try{
        const s = localStorage.getItem(uiKey(gridId));
        if(!s) return;
        const obj = JSON.parse(s);
        const widths = obj.widths || {};
        const table = document.getElementById(gridId);
        const colCount = gridDefs[gridId].cols.length;
        for(let c=0;c<colCount;c++){
            const w = widths[String(c)];
            if(w){
                // apply to both header rows + cells via CSS variable approach
                setColWidth(table, c, w);
            }
        }
    }catch(e){}
}

function persistColWidth(gridId, colIndex, widthPx){
    try{
        const key = uiKey(gridId);
        const obj = JSON.parse(localStorage.getItem(key) || '{}');
        obj.widths = obj.widths || {};
        obj.widths[String(colIndex)] = widthPx;
        localStorage.setItem(key, JSON.stringify(obj));
    }catch(e){}
}

function setColWidth(table, colIndex, widthPx){
    // header ths: (corner + colIndex)
    const th1 = table.querySelectorAll('thead tr')[0]?.children[colIndex+1];
    const th2 = table.querySelectorAll('thead tr')[1]?.children[colIndex+1];
    if(th1) th1.style.width = widthPx + 'px';
    if(th2) th2.style.width = widthPx + 'px';
    // body tds
    table.querySelectorAll(`tbody tr`).forEach(tr=>{
        const td = tr.children[colIndex+1];
        if(td) td.style.width = widthPx + 'px';
    });
}

function wireColResizing(gridId){
    const table = document.getElementById(gridId);
    const headerRow = table.querySelectorAll('thead tr')[0];
    if(!headerRow) return;
    [...headerRow.querySelectorAll('th.colhdr')].forEach(th=>{
        const handle = th.querySelector('.col-resize-handle');
        if(!handle) return;
        let startX=0, startW=0, colIndex=Number(th.dataset.col||0);
        const onMove=(e)=>{
            const dx = (e.clientX - startX);
            const w = Math.max(60, startW + dx);
            setColWidth(table, colIndex, w);
        };
        const onUp=(e)=>{
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            const w = th.getBoundingClientRect().width;
            persistColWidth(gridId, colIndex, Math.round(w));
        };
        handle.addEventListener('mousedown', (e)=>{
            e.preventDefault(); e.stopPropagation();
            startX = e.clientX;
            startW = th.getBoundingClientRect().width;
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
        });
    });
}

function injectExtraButtons(){
    const map = [
        ['txGrid','取引'],
        ['familyGrid','家族'],
        ['addressGrid','住所']
    ];
    map.forEach(([gridId])=>{
        const page = document.querySelector(`[data-gridwrap="${gridId}"]`) || document.getElementById(gridId)?.closest('.input-page');

        const mk=(txt, action)=>{

            b.type='button';
            b.className='btn btn-small';
            b.textContent=txt;
            b.dataset.action=action;
            b.dataset.grid=gridId;
            return b;
        };
        left.appendChild(mk('チェック','validateGrid'));
        left.appendChild(mk('検索/置換','findReplace'));
    });
}

function validateGrid(gridId){
    const req = gridRequired[gridId] || [];
    // clear
    document.querySelectorAll(`#${gridId} .cell-invalid`).forEach(el=>el.classList.remove('cell-invalid'));
    const {rows} = getGridSize(gridId);
    let bad=0;
    for(let r=0;r<rows;r++){
        let rowHasAny=false;
        for(let c=0;c<gridDefs[gridId].cols.length;c++){
            const v = (getCellDiv(gridId,r,c)?.innerText||'').trim();
            if(v) { rowHasAny=true; break; }
        }
        if(!rowHasAny) continue;
        req.forEach(c=>{
            const div = getCellDiv(gridId,r,c);
            const v = (div?.innerText||'').trim();
            if(!v){
                div?.closest('td')?.classList.add('cell-invalid');
                bad++;
            }
        });
    }
    showStatus(bad?`未入力の必須項目があります（${bad}セル）`:'OK（必須項目は入力済み）', bad?'error':'success');
}

// Find & Replace modal
function ensureFindModal(){
    if(document.getElementById('findModal')) return;
    const m=document.createElement('div');
    m.id='findModal';
    m.className='modal hidden';
    m.innerHTML = `
      <div class="modal-content">
        <div class="modal-header">
          <h3>検索 / 置換</h3>
          <button class="close-btn" type="button" onclick="closeFindReplace()">×</button>
        </div>
        <div style="padding:18px;">
          <div class="form-group">
            <label>検索</label>
            <input id="findText" type="text" style="width:100%; padding:10px; border:1px solid #dfe6e9; border-radius:8px;">
          </div>
          <div class="form-group" style="margin-top:10px;">
            <label>置換</label>
            <input id="replaceText" type="text" style="width:100%; padding:10px; border:1px solid #dfe6e9; border-radius:8px;">
          </div>
          <div style="display:flex; gap:10px; margin-top:14px;">
            <button class="btn btn-primary" type="button" onclick="runReplace(false)">選択範囲を置換</button>
            <button class="btn btn-secondary" type="button" onclick="runReplace(true)">全体を置換</button>
          </div>
          <div style="margin-top:10px; color:#6c757d; font-size:12px;">※「選択範囲を置換」は、範囲選択がある時だけ効きます。</div>
        </div>
      </div>
    `;
    document.body.appendChild(m);
    m.addEventListener('mousedown',(e)=>{ if(e.target===m) closeFindReplace(); });
}

function openFindReplace(gridId){
    ensureFindModal();
    const m=document.getElementById('findModal');
    m.dataset.grid=gridId;
    m.classList.remove('hidden');
    setTimeout(()=>document.getElementById('findText')?.focus(),0);
}
function closeFindReplace(){
    const m=document.getElementById('findModal');
    if(m) m.classList.add('hidden');
}
function runReplace(all){
    const m=document.getElementById('findModal');
    const gridId=m?.dataset.grid;
    if(!gridId) return;
    const find=(document.getElementById('findText')?.value||'');
    const rep=(document.getElementById('replaceText')?.value||'');
    if(!find) return;

    let targets=[];
    if(!all && gridState.selection && gridState.selection.gridId===gridId){
        for(let r=gridState.selection.r1; r<=gridState.selection.r2; r++){
            for(let c=gridState.selection.c1; c<=gridState.selection.c2; c++){
                const d=getCellDiv(gridId,r,c);
                if(d) targets.push(d);
            }
        }
    }else{
        document.querySelectorAll(`#${gridId} tbody td.cell div[contenteditable="true"]`).forEach(d=>targets.push(d));
    }
    let count=0;
    targets.forEach(d=>{
        const t=d.innerText||'';
        if(t.includes(find)){
            d.innerText = t.split(find).join(rep);
            count++;
        }
    });
    scheduleAutosave(); updateProgress();
    showStatus(`置換しました: ${count}セル`, count? 'success':'info');
}

// Context menu (basic)
function ensureCtxMenu(){
    if(document.getElementById('ctxmenu')) return;
    const m=document.createElement('div');
    m.id='ctxmenu';
    m.className='ctxmenu hidden';
    m.innerHTML = `
      <button type="button" data-cmd="copy">コピー（TSV）</button>
      <button type="button" data-cmd="paste">貼り付け（Ctrl+V）</button>
      <button type="button" data-cmd="clear">クリア</button>
      <button type="button" data-cmd="insertRow">行を挿入（下）</button>
      <button type="button" data-cmd="deleteRow">行を削除</button>
    `;
    document.body.appendChild(m);
    m.addEventListener('click',(e)=>{
        const cmd=e.target?.dataset?.cmd;
        if(!cmd) return;
        handleCtxCmd(cmd);
        hideCtx();
    });
    document.addEventListener('mousedown', ()=> hideCtx());
}
let ctxState=null; // {gridId,row,col}
function showCtx(x,y,gridId,row,col){
    ensureCtxMenu();
    ctxState={gridId,row,col};
    const m=document.getElementById('ctxmenu');
    m.style.left=x+'px';
    m.style.top=y+'px';
    m.classList.remove('hidden');
}
function hideCtx(){
    const m=document.getElementById('ctxmenu');
    if(m) m.classList.add('hidden');
}
function handleCtxCmd(cmd){
    const s=ctxState;
    if(!s) return;
    const gridId=s.gridId;
    if(cmd==='copy') return tsvExport(gridId);
    if(cmd==='clear') return clearGrid(gridId);
    if(cmd==='insertRow') return insertRowAfter(gridId, s.row);
    if(cmd==='deleteRow'){
        setActiveCell(gridId, s.row, 0);
        return deleteSelectedRow(gridId);
    }
    if(cmd==='paste'){
        showStatus('貼り付けはセルで Ctrl+V を使ってください', 'info');
    }
}

function insertRowAfter(gridId, rowIndex){
    const table=document.getElementById(gridId);
    const tbody=table.querySelector('tbody');
    const def=gridDefs[gridId];
    const tr=document.createElement('tr');

    const rowh=document.createElement('td');
    rowh.className='rowhdr';
    rowh.textContent='*';
    tr.appendChild(rowh);

    for(let c=0;c<def.cols.length;c++){
        const td=document.createElement('td');
        td.className='cell';
        td.dataset.r='0'; td.dataset.c=String(c);
        const div=document.createElement('div');
        div.contentEditable='true';
        div.spellcheck=false;
        div.dataset.r='0'; div.dataset.c=String(c);
        div.addEventListener('focus', (e)=>{ 
            const rr = Number(e.target.dataset.r||0);
            const cc = Number(e.target.dataset.c||0);
            gridState.lastFocusedCell = {gridId, row: rr, col: cc};
            setActiveCell(gridId, rr, cc, true);
        });
        div.addEventListener('mousedown', (e)=> handleCellMouseDown(e, gridId, Number(e.target.dataset.r||0), Number(e.target.dataset.c||0)));
        div.addEventListener('mousemove', (e)=> handleCellMouseMove(e, gridId, Number(e.target.dataset.r||0), Number(e.target.dataset.c||0)));
        div.addEventListener('mouseup',   (e)=> handleCellMouseUp(e, gridId, Number(e.target.dataset.r||0), Number(e.target.dataset.c||0)));
        div.addEventListener('paste', (e)=> handlePaste(e, gridId, Number(e.target.dataset.r||0), Number(e.target.dataset.c||0)));
        div.addEventListener('input', ()=>{ scheduleAutosave(); updateProgress(); });
        td.appendChild(div);
        tr.appendChild(td);
    }
    const rows=tbody.querySelectorAll('tr');
    if(rowIndex>=rows.length-1) tbody.appendChild(tr);
    else tbody.insertBefore(tr, rows[rowIndex+1]);
    renumberRows(gridId);
    showStatus('行を挿入しました', 'success');
}

function renumberRows(gridId){
    const table=document.getElementById(gridId);
    table.querySelectorAll('tbody tr').forEach((tr, idx)=>{
        const rowh=tr.querySelector('td.rowhdr');
        if(rowh) rowh.textContent=String(idx+1);
        // update datasets
        const divs=tr.querySelectorAll('td.cell div[contenteditable="true"]');
        divs.forEach((d, cidx)=>{
            d.dataset.r=String(idx);
            d.dataset.c=String(cidx);
            d.onfocus=null;
        });
        tr.querySelectorAll('td.cell').forEach((td, cidx)=>{
            td.dataset.r=String(idx);
            td.dataset.c=String(cidx);
        });
    });
}

        // 既存のファイル入力を無効化し、入力グリッドに置換
        function setupFileInputs() {
            // build grids
            buildGrid('txGrid', gridDefs.txGrid.defaultRows);
            buildGrid('familyGrid', gridDefs.familyGrid.defaultRows);
            buildGrid('addressGrid', gridDefs.addressGrid.defaultRows);

            setupInputTabs();
            setupToolbarActions();
            injectExtraButtons();
            ensureFindModal();
            ensureCtxMenu();

            // 初期アクティブセル
            setActiveCell('txGrid', 0, 0);

            // load saved grid data (we reuse our own storage key)
            loadInputData();
            updateProgress();
        }

        // 進捗：3グリッドにデータが入ったら解析ボタンON
        function updateProgress() {
            const ok = gridHasData('txGrid') && gridHasData('familyGrid') && gridHasData('addressGrid');
            const btn = document.getElementById('analyzeBtn');
            if(btn) btn.disabled = !ok;

            // 既存UIの進捗表示があれば更新（無ければ無視）
            try{
                const p = document.getElementById('progressText');
                if(p) p.textContent = ok ? '入力準備完了' : '取引・家族・住所の入力が必要です';
            }catch(e){}
        }

        // 解析入口：ファイルではなくグリッドからrawDataを作る
        async function processAllFiles() {
            try {
                showStatus('分析中...', 'info');
                const txRaw = gridToRawData('txGrid');
                const familyRaw = gridToRawData('familyGrid');
                const addrRaw = gridToRawData('addressGrid');

                // systemData クリア
                resetSystemData();

                systemData.transactions = parseTransactionData(txRaw);
                systemData.family = parseFamilyData(familyRaw);
                systemData.addresses = parseAddressData(addrRaw);

                // 自動保存
                saveInputData();

                await analyzeData();

                // 結果操作ボタン表示（元コードに寄せる）
                document.getElementById('analysisContainer').style.display = 'block';
                document.getElementById('exportBtn').classList.remove('hidden');
                document.getElementById('exportAnnotatedBtn').classList.remove('hidden');
                document.getElementById('printBtn').classList.remove('hidden');

                updateAllViews();
                showStatus('分析が完了しました', 'success');
                document.getElementById('analysisContainer').scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                console.error(error);
                showStatus('エラー: ' + (error?.message ?? String(error)), 'error');
            }
        }

        // systemData reset helper
        const _defaultProcessedData = (() => {
            try { return JSON.parse(JSON.stringify(systemData.processedData || {})); } catch(e) { return {}; }
        })();

        function resetSystemData(){
            systemData.transactions = [];
            systemData.family = [];
            systemData.addresses = [];
            systemData.inheritanceDate = null;
            try { systemData.processedData = JSON.parse(JSON.stringify(_defaultProcessedData)); }
            catch(e){ systemData.processedData = {}; }
        }


        // 既存の保存ロジックはファイル前提なので、入力版ではこちらを優先
        function loadSavedData(){
            // 互換のため呼ばれても落ちないようにする
            loadInputData();
        }

        // データクリア：グリッドもクリア + localStorage削除
        const _origClearAllData = window.clearAllData;
        window.clearAllData = function(){
            try{
                clearGrid('txGrid');
                clearGrid('familyGrid');
                clearGrid('addressGrid');
                localStorage.removeItem(INPUT_STORAGE_KEY);
            }catch(e){}
            if(typeof _origClearAllData === 'function'){
                _origClearAllData();
            }
            updateProgress();
        };
